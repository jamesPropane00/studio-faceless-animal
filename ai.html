  <title>Faceless AI — Free AI Chat & Agent by DJ Faceless Animal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0b0f;
      --surface: #11131a;
      --card: rgba(28,29,39,0.94);
      --border: rgba(167,139,250,0.16);
      --text: #f3f3fa;
      --soft: #c9cae5;
      --dim: #9da0bc;
      --purple: #7c3aed;
      --bright: #a78bfa;
      --gold: #f5c451;
      --cyan: #22d3ee;
      --radius: 14px;
      --sidebar: 280px;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; flex-direction: column; }

    .app-layout { display: flex; flex: 1; overflow: hidden; padding-top: var(--nav-h, 72px); }
  /* ── Navbar (waffle style, matching dashboard) ── */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 12000;
    background: rgba(3, 4, 7, 0.9) !important;
    border-bottom: 1px solid rgba(33,244,208,0.13) !important;
    backdrop-filter: blur(18px);
    padding: 0 1rem; height: var(--nav-h, 72px);
  }
  .navbar-inner { height: 100%; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  .navbar-logo { font-size: 0.92rem; font-weight: 800; color: #fff; white-space: nowrap; text-decoration: none; letter-spacing: 0.01em; }
  .navbar-logo span { color: var(--gold); }
  .navbar-links { display: none !important; }
  .nav-cta {
    background: linear-gradient(135deg, #f9d97d, #f3d47a) !important;
    color: #08090d !important;
    padding: 0.42rem 1.1rem !important;
    border-radius: 6px !important;
    font-weight: 700 !important;
    font-size: 0.82rem !important;
    white-space: nowrap !important;
    text-decoration: none !important;
  }
  .nav-toggle {
    display: inline-flex !important;
    align-items: center; justify-content: center;
    width: 46px; height: 46px; padding: 0;
    border: 1px solid rgba(33,244,208,0.22) !important;
    background: rgba(255,255,255,0.045) !important;
    border-radius: 8px; cursor: pointer; position: relative; z-index: 12002;
    box-shadow: 0 14px 34px rgba(0,0,0,0.28);
    pointer-events: auto; touch-action: manipulation;
  }
  .nav-toggle span { display: block; width: 4px; height: 4px; border-radius: 50%; background: #21f4d0 !important; box-shadow: 8px 0 0 #21f4d0, 16px 0 0 #21f4d0 !important; }
  .nav-toggle:hover, .nav-toggle.open { border-color: rgba(33,244,208,0.52) !important; background: rgba(33,244,208,0.1) !important; box-shadow: 0 0 28px rgba(33,244,208,0.12); }
  .mobile-nav { display: none; }
  .mobile-nav.open {
    display: grid !important;
    position: fixed; top: calc(var(--nav-h, 72px) + 0.75rem);
    right: max(0.75rem, calc((100vw - 1180px) / 2)); left: auto; bottom: auto;
    width: min(320px, calc(100vw - 1.5rem)); z-index: 12040;
    padding: 0.72rem;
    border: 1px solid rgba(33,244,208,0.2) !important;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(33,244,208,0.08), rgba(139,92,246,0.08)), rgba(8,9,13,0.96) !important;
    box-shadow: 0 24px 80px rgba(0,0,0,0.55);
    backdrop-filter: blur(20px);
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.5rem;
  }
  .mobile-nav a {
    display: flex; min-height: 54px; align-items: center; justify-content: center;
    padding: 0.75rem 0.6rem !important;
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    background: rgba(255,255,255,0.035);
    color: #eef3ff !important; font-size: 0.76rem; font-weight: 900;
    letter-spacing: 0.08em; text-align: center; text-transform: uppercase;
    text-decoration: none;
  }
  .mobile-nav a:hover, .mobile-nav a:focus-visible { border-color: rgba(33,244,208,0.34); background: rgba(33,244,208,0.08); color: #fff !important; outline: none; transform: translateY(-1px); }
  .mobile-nav a[aria-current="page"] { border-color: rgba(139,92,246,0.42); background: rgba(139,92,246,0.14); }
  .mobile-nav .waffle-menu-cta { grid-column: 1 / -1; min-height: 48px; color: #08090d !important; background: linear-gradient(135deg, #f9d97d, #f3d47a); border-color: rgba(255,255,255,0.18); }

    /* ── SIDEBAR ── */
    .sidebar {
      position: fixed; top: var(--nav-h, 72px); left: 0; bottom: 0; z-index: 200;
      width: var(--sidebar); background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
      transform: translateX(-100%); transition: transform 0.25s ease;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header {
      padding: 0.85rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
    }
    .sidebar-brand { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .sidebar-brand .logo-text { font-size: 0.85rem; font-weight: 800; color: #fff; white-space: nowrap; }
    .sidebar-brand .logo-text span { color: var(--bright); }
    .new-chat-btn {
      width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--bright); font-size: 1.2rem; cursor: pointer;
      display: grid; place-items: center; flex-shrink: 0;
    }
    .new-chat-btn:hover { background: rgba(167,139,250,0.1); }
    .sidebar-conversations { flex: 1; overflow-y: auto; padding: 0.5rem; }
    .conv-item {
      padding: 0.65rem 0.75rem; border-radius: 10px; cursor: pointer; margin-bottom: 0.25rem;
      font-size: 0.82rem; line-height: 1.4; color: var(--soft);
      display: flex; flex-direction: column; gap: 0.2rem; position: relative;
    }
    .conv-item:hover { background: rgba(167,139,250,0.06); }
    .conv-item.active { background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.15); }
    .conv-item .conv-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-item .conv-meta { font-size: 0.68rem; color: var(--dim); }
    .conv-item .conv-del {
      position: absolute; right: 0.5rem; top: 0.5rem; opacity: 0; background: none; border: none;
      color: var(--dim); cursor: pointer; font-size: 0.75rem; padding: 0.2rem;
    }
    .conv-item:hover .conv-del { opacity: 1; }
    .sidebar-footer {
      padding: 0.75rem; border-top: 1px solid var(--border); font-size: 0.78rem;
    }
    .user-info { display: flex; align-items: center; gap: 0.5rem; }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--purple), var(--bright));
      display: grid; place-items: center; font-size: 0.75rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .user-name { color: var(--text); font-weight: 600; font-size: 0.8rem; }
    .user-plan { color: var(--gold); font-size: 0.68rem; }
    .sidebar-footer .logout-btn {
      background: none; border: none; color: var(--dim); cursor: pointer; font-size: 0.72rem; padding: 0;
    }
    .sidebar-footer .logout-btn:hover { color: var(--soft); }
    .login-prompt {
      padding: 1rem; text-align: center; color: var(--dim); font-size: 0.78rem; line-height: 1.6;
    }
    .login-prompt a { color: var(--bright); text-decoration: none; font-weight: 600; }
    .login-prompt .login-btn {
      display: inline-block; margin-top: 0.5rem; padding: 0.5rem 1.2rem; border-radius: 8px;
      background: linear-gradient(135deg, var(--purple), var(--bright)); color: #fff;
      text-decoration: none; font-weight: 600; font-size: 0.82rem;
    }

    /* ── CHAT MAIN ── */
    .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .chat-topbar {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border); background: var(--bg);
    }
    .menu-toggle {
      display: grid; width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--soft); cursor: pointer; font-size: 1rem;
      place-items: center; flex-shrink: 0;
    }
    .chat-topbar select {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.3rem 0.5rem; font-size: 0.75rem; outline: none;
    }
    .memory-badge {
      margin-left: auto; padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.72rem;
    }
    .memory-badge.on { background: rgba(74,222,128,0.1); color: #4ade80; }
    .memory-badge.off { background: rgba(255,255,255,0.03); color: var(--dim); }
    .settings-btn {
      width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--soft); cursor: pointer; font-size: 1rem;
      display: grid; place-items: center; flex-shrink: 0;
    }
    .settings-btn:hover { background: rgba(167,139,250,0.1); }

    /* Settings Panel */
    .settings-panel {
      position: fixed; top: var(--nav-h, 72px); right: 0; bottom: 0; width: 320px; max-width: 100vw;
      background: var(--surface); border-left: 1px solid var(--border); z-index: 250;
      transform: translateX(100%); transition: transform 0.25s ease;
      display: flex; flex-direction: column; overflow-y: auto;
    }
    .settings-panel.open { transform: translateX(0); }
    .settings-header { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
    .settings-header button { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 1.2rem; }
    .settings-body { padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
    .setting-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .setting-group label { font-size: 0.78rem; font-weight: 600; color: var(--soft); }
    .setting-group select, .setting-group input[type="range"] { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 0.4rem 0.5rem; font-size: 0.8rem; outline: none; }
    .setting-group select:focus { border-color: var(--bright); }
    .setting-row { display: flex; align-items: center; justify-content: space-between; }
    .setting-row label { margin: 0; }
    .toggle-switch { width: 40px; height: 22px; background: var(--border); border-radius: 11px; cursor: pointer; position: relative; transition: 0.2s; flex-shrink: 0; }
    .toggle-switch.on { background: var(--purple); }
    .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: 0.2s; }
    .toggle-switch.on::after { left: 20px; }
    .val-display { font-size: 0.78rem; color: var(--dim); min-width: 2rem; text-align: right; }

      .chat-messages {
      flex: 1; overflow-y: auto; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.75rem;
    }
    .msg { padding: 0.85rem; border-radius: var(--radius); max-width: 88%; line-height: 1.6; font-size: 0.92rem; animation: fade 0.2s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(167,139,250,0.15)); border: 1px solid rgba(167,139,250,0.2); }
    .msg.assistant { align-self: flex-start; background: var(--card); border: 1px solid var(--border); }
    .msg.system { align-self: center; background: rgba(245,196,81,0.08); border: 1px solid rgba(245,196,81,0.15); color: var(--gold); font-size: 0.82rem; text-align: center; max-width: 100%; }
    .msg .label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.3rem; display: block; }
    .speak-btn { background: none; border: 1px solid var(--border); color: var(--dim); cursor: pointer; font-size: 0.75rem; padding: 0.1rem 0.35rem; border-radius: 6px; margin-left: 0.4rem; vertical-align: middle; line-height: 1; }
    .speak-btn:hover { background: rgba(167,139,250,0.1); color: var(--bright); }
    .msg.user .label { color: var(--bright); }
    .msg.assistant .label { color: var(--cyan); }
    .msg.assistant img { max-width: 100%; border-radius: 10px; margin-top: 0.5rem; }
    .download-btn, .save-media-btn { display: inline-flex; align-items: center; padding: 0.4rem 0.8rem; border-radius: 8px; background: linear-gradient(135deg, var(--purple), var(--bright)); color: #fff; font-size: 0.78rem; font-weight: 600; text-decoration: none; cursor: pointer; font-family: inherit; margin-top: 0.3rem; transition: opacity 0.15s; border: none; }
    .download-btn:hover, .save-media-btn:hover { opacity: 0.85; }
    .save-media-btn:disabled { opacity: 0.5; cursor: wait; }
    .gen-image { transition: transform 0.15s; }
    .gen-image:hover { transform: scale(1.02); }
    .typing { display: flex; gap: 4px; padding: 0.4rem 0; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    .chat-input-area { border-top: 1px solid var(--border); padding: 0.75rem 1rem; background: var(--bg); }
    .input-row { display: flex; gap: 0.5rem; align-items: flex-end; }
    .input-row textarea {
      flex: 1; resize: none; padding: 0.75rem; border-radius: 12px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.92rem;
      outline: none; min-height: 48px; max-height: 150px; line-height: 1.5;
    }
    .input-row textarea:focus { border-color: var(--bright); }
    .input-row button {
      width: 48px; height: 48px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--purple), var(--bright));
      color: #fff; font-size: 1.2rem; cursor: pointer; flex: 0 0 auto;
      display: grid; place-items: center; transition: opacity 0.15s;
    }
    .input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
    .upload-wrap { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
    .upload-btn {
      width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--soft); cursor: pointer; font-size: 1.1rem;
      display: grid; place-items: center; flex-shrink: 0; transition: 0.15s;
    }
    .upload-btn:hover { background: rgba(167,139,250,0.1); color: var(--bright); }
    .file-preview {
      display: flex; align-items: center; gap: 0.3rem; max-width: 200px; overflow-x: auto;
      padding: 0.2rem 0; flex-shrink: 0;
    }
    .file-preview .file-chip {
      display: flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.5rem;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.7rem; color: var(--dim); white-space: nowrap; flex-shrink: 0;
    }
    .file-preview .file-chip img { width: 28px; height: 28px; border-radius: 4px; object-fit: cover; }
    .file-preview .file-chip .rm-file {
      background: none; border: none; color: var(--dim); cursor: pointer; font-size: 0.8rem; padding: 0;
      line-height: 1; margin-left: 0.2rem;
    }
    .file-preview .file-chip .rm-file:hover { color: #f87171; }

    .preview-btn {
      display: inline-block; margin: 0.3rem 0 0.5rem; padding: 0.3rem 0.8rem;
      border-radius: 8px; border: 1px solid var(--bright); background: rgba(167,139,250,0.1);
      color: var(--bright); font-size: 0.75rem; font-weight: 600; cursor: pointer;
    }
    .preview-btn:hover { background: rgba(167,139,250,0.2); }
    .overlay { position: fixed; inset: 0; top: var(--nav-h, 72px); background: rgba(0,0,0,0.5); z-index: 199; display: none; }
    .overlay.open { display: block; }

    /* ── Inline code editing ── */
    .code-toolbar { display: flex; gap: 0.3rem; justify-content: flex-end; margin-bottom: 0.3rem; }
    .code-toolbar button {
      background: rgba(167,139,250,0.1); border: 1px solid var(--border); color: var(--dim);
      border-radius: 6px; padding: 0.15rem 0.45rem; font-size: 0.68rem; cursor: pointer; font-family: inherit;
    }
    .code-toolbar button:hover { background: rgba(167,139,250,0.2); color: var(--bright); }
    pre { position: relative; }
    .msg.assistant pre { margin-top: 0.3rem; }
    pre code { display: block; padding: 0.6rem; overflow-x: auto; }
    .code-edit-textarea {
      width: 100%; min-height: 80px; background: var(--bg); color: var(--text); border: 1px solid var(--bright);
      border-radius: 8px; padding: 0.5rem; font-family: monospace; font-size: 0.82rem; outline: none; resize: vertical;
    }
    .code-edit-actions { display: flex; gap: 0.4rem; margin-top: 0.3rem; }
    .code-edit-actions button {
      padding: 0.25rem 0.7rem; border-radius: 6px; border: none; font-size: 0.75rem; font-weight: 600; cursor: pointer;
    }
    .code-edit-actions .save-btn { background: linear-gradient(135deg, var(--purple), var(--bright)); color: #fff; }
    .code-edit-actions .cancel-btn { background: rgba(255,255,255,0.05); color: var(--dim); border: 1px solid var(--border); }

    /* ── @-mention autocomplete ── */
    .mention-dropdown {
      position: absolute; bottom: 100%; left: 0; right: 0; z-index: 300; max-height: 200px; overflow-y: auto;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      display: none; margin-bottom: 0.25rem;
    }
    .mention-dropdown.open { display: block; }
    .mention-item {
      padding: 0.45rem 0.65rem; cursor: pointer; font-size: 0.78rem; display: flex; align-items: center; gap: 0.4rem;
      color: var(--soft); border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .mention-item:last-child { border-bottom: none; }
    .mention-item:hover, .mention-item.active { background: rgba(167,139,250,0.1); color: var(--text); }
    .mention-item .mention-icon { font-size: 0.85rem; flex-shrink: 0; }
    .mention-item .mention-name { font-weight: 600; }
    .mention-item .mention-path { font-size: 0.65rem; color: var(--dim); margin-left: auto; }

    /* ── Project tree ── */
    .sidebar-section { border-top: 1px solid var(--border); }
    .sidebar-section-header {
      padding: 0.6rem 0.85rem; font-size: 0.75rem; font-weight: 700; color: var(--dim); text-transform: uppercase;
      letter-spacing: 0.08em; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-section-header:hover { color: var(--soft); }
    .sidebar-section-body { padding: 0 0.5rem 0.5rem; max-height: 300px; overflow-y: auto; display: none; }
    .sidebar-section-body.open { display: block; }
    .tree-item {
      display: flex; align-items: center; gap: 0.35rem; padding: 0.25rem 0.4rem; border-radius: 6px;
      font-size: 0.75rem; color: var(--dim); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tree-item:hover { background: rgba(167,139,250,0.06); color: var(--soft); }
    .tree-item .tree-icon { flex-shrink: 0; font-size: 0.7rem; }
    .tree-item .tree-name { overflow: hidden; text-overflow: ellipsis; }
    .tree-item .tree-ref-btn {
      margin-left: auto; flex-shrink: 0; background: none; border: none; color: var(--dim);
      font-size: 0.65rem; cursor: pointer; padding: 0.1rem 0.3rem; border-radius: 4px; opacity: 0;
    }
    .tree-item:hover .tree-ref-btn { opacity: 1; }
    .tree-item .tree-ref-btn:hover { background: rgba(167,139,250,0.15); color: var(--bright); }
    .tree-nested { padding-left: 1rem; }

    /* ── Agent mode improvements ── */
    .agent-thinking {
      display: flex; align-items: center; gap: 0.4rem; padding: 0.3rem 0; font-size: 0.78rem; color: var(--bright);
    }
    .agent-thinking .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .agent-tool-call {
      margin: 0.3rem 0; padding: 0.4rem 0.6rem; background: rgba(167,139,250,0.04);
      border: 1px solid rgba(167,139,250,0.1); border-radius: 8px; font-size: 0.75rem;
    }
    .agent-tool-call .tool-name { color: var(--cyan); font-weight: 600; }
    .agent-tool-call .tool-result {
      margin-top: 0.2rem; padding: 0.25rem; background: rgba(0,0,0,0.15); border-radius: 6px;
      font-family: monospace; font-size: 0.7rem; color: var(--soft); max-height: 100px; overflow-y: auto; white-space: pre-wrap;
    }
    .agent-tool-call .tool-error { color: #f87171; }

    /* ── Streaming cursor ── */

      content: ''; display: inline-block; width: 2px; height: 1em; background: var(--bright);
      margin-left: 2px; animation: blink 0.7s step-end infinite; vertical-align: text-bottom;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <script>
    // ── AUTH STATE ──
    let currentUser = null;
    let currentConvId = null;
    const SESSION_ID = localStorage.getItem('fas_ai_session') || (function(){
      const id = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
      localStorage.setItem('fas_ai_session', id);
      return id;
    })();

    function getFasUser() {
      try { return JSON.parse(localStorage.getItem('fas_user') || 'null'); } catch { return null; }
    }

    const ADMIN_USERS = ['jamespropane00', 'jdot00'];

    function updateAuthUI() {
      currentUser = getFasUser();
      const loggedIn = currentUser && currentUser.username;
      const isAdmin = loggedIn && ADMIN_USERS.includes(currentUser.username);
      document.getElementById('agentModeGroup').style.display = loggedIn ? 'block' : 'none';
      document.getElementById('apiKeyGroup').style.display = isAdmin ? 'block' : 'none';
      if (isAdmin) {
        const savedKey = localStorage.getItem('fas_oc_api_key');
        if (savedKey) document.getElementById('ocApiKey').value = savedKey;
      }
      if (localStorage.getItem('fas_agent_mode') === 'true') {
        document.getElementById('agentModeToggle').classList.add('on');
      }
      // Label differently for users vs admin
      const label = document.querySelector('#agentModeGroup label');
      if (label) {
        label.innerHTML = isAdmin
          ? '⚡ Agent Mode <span style="font-size:0.68rem;color:var(--dim);font-weight:400;">(read/write/exec)</span>'
          : '🔍 Explore Mode <span style="font-size:0.68rem;color:var(--dim);font-weight:400;">(ask about the codebase)</span>';
      }
      document.getElementById('loginPrompt').style.display = loggedIn ? 'none' : 'block';
      document.getElementById('convItems').style.display = loggedIn ? 'block' : 'none';
      document.getElementById('sidebarFooter').style.display = loggedIn ? 'block' : 'none';

      if (loggedIn) {
        document.getElementById('userAvatar').textContent = (currentUser.display || currentUser.username)[0].toUpperCase();
        document.getElementById('userName').textContent = currentUser.display || currentUser.username;
        document.getElementById('userPlan').textContent = currentUser.plan || 'free member';
        loadConversations();
      }
    }

    function logOut() {
      localStorage.removeItem('fas_user');
      localStorage.removeItem('fas_member');
      currentUser = null;
      updateAuthUI();
      clearMessages();
      addMessage('system', 'Signed out. Your conversations are still saved — sign in again to access them.');
    }

    // ── SIDEBAR ──
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('open');
    }

    // ── MODELS ──
    let availableModels = [];
    function populateModels(models) {
      availableModels = models;
      const sel = document.getElementById('modelSelect');
      sel.innerHTML = '';
      const groups = {};
      models.forEach((m, i) => {
        const g = m.group || 'Other';
        if (!groups[g]) groups[g] = [];
        groups[g].push(i);
      });
      for (const [gName, indices] of Object.entries(groups)) {
        const grp = document.createElement('optgroup');
        grp.label = gName;
        indices.forEach(i => {
          const m = models[i];
          const opt = document.createElement('option');
          opt.value = i;
          opt.textContent = m.name;
          grp.appendChild(opt);
        });
        sel.appendChild(grp);
      }
    }

    // ── CONVERSATIONS ──
    let conversations = [];

    async function loadConversations() {
      try {
        const body = { list_conversations: true, session_id: SESSION_ID };
        if (currentUser && currentUser.username) body.username = currentUser.username;
        const res = await fetch('/api/ai/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) return;
        const data = await res.json();
        if (data.models) populateModels(data.models);
        if (data.conversations && Array.isArray(data.conversations)) {
          conversations = data.conversations;
          renderConversations();
        }
      } catch {}
    }

    function renderConversations() {
      const container = document.getElementById('convItems');
      container.innerHTML = '';
      conversations.forEach(c => {
        const el = document.createElement('div');
        el.className = 'conv-item' + (c.id === currentConvId ? ' active' : '');
        el.innerHTML = '<div class="conv-title">' + escHtml(c.title) + '</div><div class="conv-meta">' + c.messages + ' msgs &middot; ' + escHtml(c.model) + '</div>';
        el.onclick = () => loadConversation(c.id);
        container.appendChild(el);
      });
    }

    async function loadConversation(convId) {
      currentConvId = convId;
      renderConversations();
      clearMessages();
      showTyping();

      try {
        const body = { load_conversation: convId, session_id: SESSION_ID };
        if (currentUser && currentUser.username) body.username = currentUser.username;
        const res = await fetch('/api/ai/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        removeTyping();
        if (!res.ok) return;
        const data = await res.json();
        if (data.history && Array.isArray(data.history)) {
          data.history.forEach(msg => addMessage(msg.role, msg.content, true));
        }
      } catch { removeTyping(); }
    }

    function newConversation() {
      currentConvId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2);
      clearMessages();
      addMessage('system', 'New conversation started.');
      renderConversations();
      if (window.innerWidth <= 768) toggleSidebar();
      document.getElementById('input').focus();
    }

    function detectModel(text) {
      const lower = text.toLowerCase().trim();
      const visionKw = ['what is this','describe this','what does this say','read this','analyze this image',
        'what do you see','extract text','ocr','document'];
      const imgKw = ['draw','generate','create','make','paint','render','imagine',
        'image of','picture of','photo of','art of','a realistic','a cartoon',
        'a painting','a photo','a portrait','a landscape','a futuristic',
        'a fantasy','a sci-fi','a digital art','anime style','a sketch',
        'a drawing','a concept art','a low poly','a pixel art','a cyberpunk'];
      const audioKw = ['speak','say this','say out loud','read this aloud','voice','tts',
        'text to speech','talk','tell me out loud'];
      const videoKw = ['generate a video','make a video','create a video','animate',
        'video of','a video','generate video'];
      const musicKw = ['make a beat','make a drill beat','make some music','produce a beat',
        'create a beat','write a beat','drill beat','trap beat','make a melody',
        'create a melody','write a melody','create a song','make a song','make music',
        'generate music','generate a beat','produce music','create music',
        'make a track','write a track','produce a track','instrumental',
        'make a loop','create a loop','beats','make an instrumental'];
      if (musicKw.some(k => lower.includes(k))) return 'music';
      if (videoKw.some(k => lower.includes(k))) return 'video';
      if (visionKw.some(k => lower.includes(k))) return 'vision';
      if (imgKw.some(k => lower.includes(k))) return 'image';
      if (audioKw.some(k => lower.includes(k))) return 'audio';
      return null;
    }

    // ── FILE UPLOAD ──
    let pendingFiles = [];

    function onFileSelect(ev) {
      const files = Array.from(ev.target.files);
      pendingFiles = pendingFiles.concat(files);
      renderFilePreview();
      ev.target.value = '';
    }

    function removeFile(idx) {
      pendingFiles.splice(idx, 1);
      renderFilePreview();
    }

    function renderFilePreview() {
      const container = document.getElementById('filePreview');
      container.innerHTML = '';
      if (pendingFiles.length === 0) { container.style.display = 'none'; return; }
      container.style.display = 'flex';
      pendingFiles.forEach((f, i) => {
        const chip = document.createElement('div');
        chip.className = 'file-chip';
        if (f.type.startsWith('image/')) {
          const thumb = document.createElement('img');
          thumb.src = URL.createObjectURL(f);
          chip.appendChild(thumb);
        } else {
          const icon = document.createElement('span');
          icon.textContent = f.type.includes('pdf') ? '📄' : '🎵';
          chip.appendChild(icon);
        }
        const name = document.createElement('span');
        name.textContent = f.name.length > 15 ? f.name.slice(0, 12) + '..' : f.name;
        chip.appendChild(name);
        const rm = document.createElement('button');
        rm.className = 'rm-file';
        rm.textContent = '×';
        rm.onclick = () => removeFile(i);
        chip.appendChild(rm);
        container.appendChild(chip);
      });
    }

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result.split(',')[1]);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    // ── CHAT ──
    let streamMsgEl = null;
    let streamFullContent = '';

    async function sendStream() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';

      addMessage('user', text);
      document.getElementById('sendBtn').disabled = true;

      let modelIdx = parseInt(document.getElementById('modelSelect').value);
      const convId = currentConvId || 'default';
      let model = availableModels[modelIdx] || availableModels[0];

      // Auto-switch model based on prompt intent & attached files (unless disabled)
      const autoSwitch = localStorage.getItem('fas_autoswitch') !== 'false';
      const textIntent = autoSwitch ? detectModel(text) : null;
      const hasImageFile = pendingFiles.some(f => f.type.startsWith('image/'));
      let intent = textIntent;
      if (hasImageFile && !intent && (model.type === 'text' || model.type === 'book')) intent = 'vision';
      if (intent && model.type !== intent) {
        if (intent === 'image') {
          const fastIdx = availableModels.findIndex(m => m.id && m.id.includes('lightning'));
          modelIdx = fastIdx !== -1 ? fastIdx : availableModels.findIndex(m => m.type === 'image');
        } else if (intent === 'vision') {
          modelIdx = availableModels.findIndex(m => m.type === 'vision');
          if (modelIdx === -1) modelIdx = availableModels.findIndex(m => m.type === 'text');
        } else {
          modelIdx = availableModels.findIndex(m => m.type === intent);
        }
        if (modelIdx !== -1) {
          model = availableModels[modelIdx];
          document.getElementById('modelSelect').value = modelIdx;
          addMessage('system', 'Auto-switched to ' + model.name + ' for ' + intent + '.');
        }
      }

      let filesData = [];
      if (pendingFiles.length > 0) {
        for (const f of pendingFiles) {
          const b64 = await readFileAsBase64(f);
          filesData.push({ name: f.name, type: f.type, data: b64 });
        }
        pendingFiles = [];
        renderFilePreview();
      }

      // For non-text models, fall back to regular POST
      if (model.type !== 'text' && model.type !== 'book') {
        return sendFallback(text, modelIdx, convId, model, filesData);
      }

      streamFullContent = '';
      streamMsgEl = null;
      showStreamingMessage();

      const agentMode = localStorage.getItem('fas_agent_mode') === 'true';

      try {
        const body = { message: text, session_id: SESSION_ID, model: modelIdx, conversation_id: convId, mode: agentMode ? 'agent' : 'chat' };
        body.max_tokens = parseInt(document.getElementById('maxTokens').value) || 1024;
        body.history = getConversationHistory();
        body.username = (currentUser && currentUser.username) || undefined;
        if (filesData.length > 0) body.files = filesData;
        if (agentMode) {
          const searchKey = localStorage.getItem('fas_search_api_key');
          if (searchKey) body.search_api_key = searchKey;
        }
        const apiKey = localStorage.getItem('fas_oc_api_key');
        if (apiKey) body.oc_api_key = apiKey;

        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 75000);
        const res = await fetch('/api/ai/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          signal: controller.signal,
        });
        clearTimeout(timeout);
        if (!res.ok) {
          removeStreamingMessage();
          const errText = await res.text().catch(() => '');
          addMessage('system', 'Error: ' + (errText ? errText.slice(0, 200) : 'Request failed (' + res.status + ')'));
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (!payload || payload === '[DONE]') continue;
            try {
              const ev = JSON.parse(payload);
              handleStreamEvent(ev);
            } catch {}
          }
        }
        // Process remaining buffer
        if (buffer.startsWith('data: ')) {
          try {
            const ev = JSON.parse(buffer.slice(6));
            handleStreamEvent(ev);
          } catch {}
        }

        finalizeStreamMessage();
      } catch (e) {
        removeStreamingMessage();
        addMessage('system', e.name === 'AbortError'
          ? 'The AI took too long to answer. Try again or choose the Standard model.'
          : 'Error: ' + e.message);
      } finally {
        document.getElementById('sendBtn').disabled = false;
      }
    }

    function handleStreamEvent(ev) {
      switch (ev.type) {
        case 'meta':
          if (streamMsgEl) {
            const label = streamMsgEl.querySelector('.label');
            if (label) label.textContent = ev.model || 'Faceless AI';
          }
          break;
        case 'token':
          if (ev.content) {
            streamFullContent += ev.content;
            updateStreamContent(streamFullContent);
          }
          break;
        case 'tool_call':
          appendToolCall(ev);
          break;
        case 'tool_result':
          updateToolResult(ev);
          break;
        case 'done':
          if (ev.history) {
            // Replace streaming message with finalized one
            removeStreamingMessage();
            if (streamFullContent) {
              addMessage('assistant', streamFullContent, false, ev.tool_log || null);
            }
            // Update conversation ID if returned
            if (ev.conversation_id && currentConvId === null) {
              currentConvId = ev.conversation_id;
            }
            if (currentUser) loadConversations();
            // Auto-read
            if (streamFullContent && localStorage.getItem('fas_autoread') === 'true') {
              speakText(streamFullContent);
            }
          }
          break;
        case 'error':
          removeStreamingMessage();
          addMessage('system', 'Error: ' + (ev.error || 'Unknown error'));
          break;
      }
    }

    function showStreamingMessage() {
      const el = document.createElement('div');
      el.className = 'msg assistant';
      el.id = 'stream-msg';
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = 'Faceless AI';
      el.appendChild(label);
      const text = document.createElement('div');
      text.className = 'stream-cursor';
      text.textContent = '';
      el.appendChild(text);
      document.getElementById('messages').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth' });
      streamMsgEl = el;
    }

    function updateStreamContent(content) {
      if (!streamMsgEl) return;
      const textDiv = streamMsgEl.querySelector('div:last-child');
      if (!textDiv) return;
      textDiv.innerHTML = formatContent(content);
      textDiv.classList.add('stream-cursor');
      streamMsgEl.scrollIntoView({ behavior: 'smooth' });
    }

    function removeStreamingMessage() {
      const el = document.getElementById('stream-msg');
      if (el) el.remove();
      streamMsgEl = null;
    }

    function finalizeStreamMessage() {
      if (streamFullContent && streamMsgEl) {
        removeStreamingMessage();
        addMessage('assistant', streamFullContent);
        if (streamFullContent && localStorage.getItem('fas_autoread') === 'true') {
          speakText(streamFullContent);
        }
      }
      streamMsgEl = null;
    }

    function getConversationHistory() {

    // Fallback for non-text (image/audio/video) models
    async function sendFallback(text, modelIdx, convId, model, filesData) {
      showTyping();
      try {
        const body = { message: text, session_id: SESSION_ID, model: modelIdx, conversation_id: convId };
        body.max_tokens = parseInt(document.getElementById('maxTokens').value) || 1024;
        if (filesData.length > 0) body.files = filesData;
        if (currentUser && currentUser.username) body.username = currentUser.username;
        if (localStorage.getItem('fas_agent_mode') === 'true') {
          body.agent_mode = true;
        }
        const apiKey = localStorage.getItem('fas_oc_api_key');
        if (apiKey) body.oc_api_key = apiKey;
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 75000);
        const res = await fetch('/api/ai/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
          signal: controller.signal,
        });
        clearTimeout(timeout);
        removeTyping();
        if (!res.ok) {
          let errMsg = 'Request failed (' + res.status + ')';
          try { const err = await res.json(); errMsg = err.error || errMsg; } catch { try { errMsg = (await res.text()).slice(0, 200); } catch {} }
          addMessage('system', 'Error: ' + errMsg);
          return;
        }
        let data;
        try { data = await res.json(); } catch { addMessage('system', 'Error: Invalid response from server.'); return; }

        if (model.type === 'image' && data.image) {
          const ts = Date.now();
          addMessage('assistant', '<strong>' + model.name + ':</strong><br><img src="' + data.image + '" alt="Generated image" class="gen-image" onclick="openLightbox(this.src)" style="max-width:100%;border-radius:10px;margin-bottom:8px;cursor:pointer" /><br><div style="display:flex;gap:8px;flex-wrap:wrap"><a href="' + data.image + '" download="faceless-ai-' + ts + '.png" class="download-btn">Download Image</a><button class="save-media-btn" data-b64="' + data.image.split(',')[1] + '" data-name="faceless-ai-' + ts + '.png" data-type="image/png" onclick="saveGeneratedMedia(this)">Save to My Media</button></div>');
        } else if (model.type === 'video' && data.video) {
          const ts = Date.now();
          addMessage('assistant', '<strong>' + model.name + ':</strong><br><video src="' + data.video + '" controls style="max-width:100%;border-radius:10px;margin-bottom:8px"></video><br><div style="display:flex;gap:8px;flex-wrap:wrap"><a href="' + data.video + '" download="faceless-ai-' + ts + '.mp4" class="download-btn">Download Video</a><button class="save-media-btn" data-b64="' + data.video.split(',')[1] + '" data-name="faceless-ai-' + ts + '.mp4" data-type="video/mp4" onclick="saveGeneratedMedia(this)">Save to My Media</button></div>');
        } else if ((model.type === 'music' || model.type === 'audio') && data.audio) {
          const ext = data.audio.startsWith('data:audio/wav') ? '.wav' : data.audio.startsWith('data:audio/mpeg') ? '.mp3' : '.mp3';
          const ts = Date.now();
          const fn = 'faceless-ai-' + ts + ext;
          addMessage('assistant', '<strong>' + model.name + ':</strong><br><audio src="' + data.audio + '" controls style="width:100%;margin-bottom:8px"></audio><br><div style="display:flex;gap:8px;flex-wrap:wrap"><a href="' + data.audio + '" download="' + fn + '" class="download-btn">Download Audio</a><button class="save-media-btn" data-b64="' + data.audio.split(',')[1] + '" data-name="' + fn + '" data-type="' + (ext === '.wav' ? 'audio/wav' : 'audio/mpeg') + '" onclick="saveGeneratedMedia(this)">Save to My Media</button></div>');
        } else {
          addMessage('assistant', data.reply || 'No response.', false, data.tool_log);
        }
        if (data.reply && localStorage.getItem('fas_autoread') === 'true') speakText(data.reply);
        if (data.memory) {
          document.getElementById('memoryBadge').className = 'memory-badge on';
          document.getElementById('memoryBadge').textContent = '\u25CF memory on' + (data.username ? ' (' + data.username + ')' : '');
        }
        if (currentConvId === null && data.conversation_id) currentConvId = data.conversation_id;
        if (currentUser) loadConversations();
      } catch (e) {
        removeTyping();
        addMessage('system', e.name === 'AbortError'
          ? 'The AI took too long to answer. Try again with a shorter request.'
          : 'Error: ' + e.message);
      }
      finally { document.getElementById('sendBtn').disabled = false; }
    }

    // ── UI HELPERS ──
    function speakText(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const clean = text.replace(/<[^>]*>/g, '').replace(/```[\s\S]*?```/g, '');
      const utter = new SpeechSynthesisUtterance(clean.slice(0, 2000));
      const voiceIdx = parseInt(localStorage.getItem('fas_tts_voice') || '');
      if (voiceIdx >= 0 && ttsVoices[voiceIdx]) utter.voice = ttsVoices[voiceIdx];
      utter.rate = parseFloat(localStorage.getItem('fas_tts_rate') || '1');
      utter.pitch = 1.0;
      window.speechSynthesis.speak(utter);
    }

    function downloadText(content, filename) {
      const clean = content.replace(/<[^>]*>/g, '').replace(/<br\s*\/?>/g, '\n').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
      const blob = new Blob([clean], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename || 'faceless-ai-content.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    }

              const resultPreview = hasError ? '\u274C ' + (tc.result.error || tc.result.stderr).slice(0, 300) : hasContent ? (tc.result.content || tc.result.stdout).slice(0, 300) : tc.result.success ? '\u2705 Done' : '\uD83D\uDC4D OK';

    function formatContent(text) {
      let html = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => {
        const clean = escHtml(code);
        const id = 'c' + Date.now() + Math.random().toString(36).slice(2, 6);
        let buttons = '<div class="code-toolbar">';
        buttons += '<button onclick="copyCode(\'' + id + '\')" title="Copy code">\uD83D\uDCCB Copy</button>';
        buttons += '<button onclick="editCode(\'' + id + '\')" title="Edit code">\u270F\uFE0F Edit</button>';
        if (lang === 'html') {
          buttons += '<button class="preview-btn" onclick="previewHTML(this)" data-code="' + encodeURIComponent(code) + '">\u25B6 Preview</button>';
        }
        buttons += '</div>';
        return buttons + '<pre><code id="' + id + '">' + clean + '</code></pre>';
      });
      return html.replace(/`([^`]+)`/g, '<code>$1</code>').replace(/\n/g, '<br/>');
    }

    function copyCode(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const text = el.textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = el.closest('pre')?.previousElementSibling?.querySelector('button');
        if (btn) { const orig = btn.textContent; btn.textContent = '\u2705 Copied!'; setTimeout(() => { btn.textContent = orig; }, 1500); }
      }).catch(() => {});
    }

    function editCode(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const pre = el.closest('pre');
      if (!pre) return;
      const original = el.textContent;
      const textarea = document.createElement('textarea');
      textarea.className = 'code-edit-textarea';
      textarea.value = original;
      textarea.rows = Math.min(original.split('\n').length, 15);
      const actions = document.createElement('div');
      actions.className = 'code-edit-actions';
      const saveBtn = document.createElement('button');
      saveBtn.className = 'save-btn'; saveBtn.textContent = 'Save';
      saveBtn.onclick = function() {
        const newCode = textarea.value;
        pre.innerHTML = '<code id="' + id + '">' + escHtml(newCode) + '</code>';
        actions.remove();
        textarea.remove();
      };
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'cancel-btn'; cancelBtn.textContent = 'Cancel';
      cancelBtn.onclick = function() { textarea.remove(); actions.remove(); };
      actions.appendChild(saveBtn);
      actions.appendChild(cancelBtn);
      pre.style.display = 'none';
      pre.parentNode.insertBefore(textarea, pre);
      pre.parentNode.insertBefore(actions, pre);
      textarea.focus();
    }

    // ── @-mention autocomplete ──
    let mentionFiles = [];
    let mentionIdx = -1;

    function setupMentionAutocomplete() {
      const input = document.getElementById('input');
      if (!input) return;
      input.addEventListener('input', function() {
        const pos = this.selectionStart;
        const val = this.value;
        // Find the @ being typed
        const before = val.slice(0, pos);
        const atMatch = before.lastIndexOf('@');
        if (atMatch === -1 || (atMatch > 0 && !/\s/.test(val[atMatch - 1]))) {
          document.getElementById('mentionDropdown').classList.remove('open');
          mentionIdx = -1;
          return;
        }
        const query = val.slice(atMatch + 1, pos).toLowerCase();
        const matches = mentionFiles.filter(f =>
          f.name.toLowerCase().includes(query) || f.path.toLowerCase().includes(query)
        ).slice(0, 8);

        if (matches.length === 0) {
          document.getElementById('mentionDropdown').classList.remove('open');
          mentionIdx = -1;
          return;
        }

        const dd = document.getElementById('mentionDropdown');
        dd.innerHTML = '';
        matches.forEach((f, i) => {
          const item = document.createElement('div');
          item.className = 'mention-item' + (i === 0 ? ' active' : '');
          item.dataset.index = i;
          item.innerHTML = '<span class="mention-icon">' + (f.type === 'dir' ? '\uD83D\uDCC1' : '\uD83D\uDCC4') + '</span><span class="mention-name">' + escHtml(f.name) + '</span><span class="mention-path">' + escHtml(f.path) + '</span>';
          item.onclick = function() { selectMention(atMatch, val, pos, f.path || f.name); };
          dd.appendChild(item);
        });
        dd.classList.add('open');
        mentionIdx = 0;
      });

      input.addEventListener('keydown', function(e) {
        const dd = document.getElementById('mentionDropdown');
        if (!dd.classList.contains('open')) return;
        const items = dd.querySelectorAll('.mention-item');
        if (items.length === 0) return;

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          items[mentionIdx]?.classList.remove('active');
          mentionIdx = (mentionIdx + 1) % items.length;
          items[mentionIdx]?.classList.add('active');
          items[mentionIdx]?.scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          items[mentionIdx]?.classList.remove('active');
          mentionIdx = (mentionIdx - 1 + items.length) % items.length;
          items[mentionIdx]?.classList.add('active');
          items[mentionIdx]?.scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'Enter' || e.key === 'Tab') {
          if (mentionIdx >= 0 && mentionIdx < items.length) {
            e.preventDefault();
            items[mentionIdx]?.click();
          }
        } else if (e.key === 'Escape') {
          dd.classList.remove('open');
          mentionIdx = -1;
        }
      });
    }

    function selectMention(atIdx, val, pos, replacement) {
      const input = document.getElementById('input');
      const newVal = val.slice(0, atIdx) + '@' + replacement + ' ' + val.slice(pos);
      input.value = newVal;
      input.selectionStart = input.selectionEnd = atIdx + replacement.length + 2;
      input.focus();
      document.getElementById('mentionDropdown').classList.remove('open');
      mentionIdx = -1;
    }

    // ── Project tree ──
    async function loadProjectTree() {
      try {
        const res = await fetch('/api/project/tree');
        if (!res.ok) return;
        const data = await res.json();
        if (!data.tree) return;
        renderTree(data.tree, document.getElementById('projectTree'), '');
        // Flatten for mention autocomplete
        flattenTree(data.tree, '');
      } catch {}
    }

    function renderTree(items, container, basePath) {
      container.innerHTML = '';
      if (!items || items.length === 0) {
        container.innerHTML = '<div style="padding:0.5rem;font-size:0.72rem;color:var(--dim)">No files loaded.</div>';
        return;
      }
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'tree-item';
        const fullPath = basePath ? basePath + '/' + item.name : item.name;
        div.innerHTML = '<span class="tree-icon">' + (item.type === 'dir' ? '\uD83D\uDCC1' : '\uD83D\uDCC4') + '</span><span class="tree-name">' + escHtml(item.name) + '</span>';
        const refBtn = document.createElement('button');
        refBtn.className = 'tree-ref-btn';
        refBtn.textContent = '@';
        refBtn.title = 'Reference in chat';
        refBtn.onclick = function(e) {
          e.stopPropagation();
          const input = document.getElementById('input');
          input.value += (input.value ? ' ' : '') + '@' + fullPath + ' ';
          input.focus();
        };
        div.appendChild(refBtn);
        if (item.type === 'dir' && item.children) {
          div.style.cursor = 'pointer';
          const nested = document.createElement('div');
          nested.className = 'tree-nested';
          nested.style.display = 'none';
          const toggle = function() {
            if (nested.style.display === 'none') {
              nested.style.display = 'block';
              if (nested.children.length === 0) {
                renderTree(item.children, nested, fullPath);
              }
            } else {
              nested.style.display = 'none';
            }
          };
          div.onclick = toggle;
          container.appendChild(div);
          container.appendChild(nested);
        } else {
          container.appendChild(div);
        }
      });
    }

    function flattenTree(items, basePath) {
      items.forEach(item => {
        const fullPath = basePath ? basePath + '/' + item.name : item.name;
        mentionFiles.push({ name: item.name, path: fullPath, type: item.type });
        if (item.type === 'dir' && item.children) {
          flattenTree(item.children, fullPath);
        }
      });
    }

      document.getElementById('messages').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth' });
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    // ── INIT ──
    document.addEventListener('DOMContentLoaded', () => {
      updateAuthUI();

      // Load project tree and setup mentions
      loadProjectTree();
      setupMentionAutocomplete();

      addMessage('system', currentUser
        ? 'Welcome back to Faceless AI, ' + (currentUser.display || currentUser.username) + '. I\'m the central intelligence behind Faceless Animal Studios. What are we working on today?'
        : 'Welcome to Faceless AI.\n\nI\'m the central intelligence behind Faceless Animal Studios.\n\nI can help with coding, websites, creative projects, content creation, business ideas, music, comics, research, automation, design, and problem solving.\n\nWhether you\'re building something new or trying to figure out your next move, I\'m here to help.\n\nWhat are we working on today?');
      if (!currentUser) loadConversations();

      // Settings init
      const savedRate = localStorage.getItem('fas_tts_rate') || '1';
      document.getElementById('ttsRate').value = savedRate;
      document.getElementById('ttsRateVal').textContent = savedRate + 'x';
      document.getElementById('ttsRate').oninput = applySettings;
      document.getElementById('ttsVoice').onchange = function() { localStorage.setItem('fas_tts_voice', this.value); };
      if (localStorage.getItem('fas_autoread') === 'true') document.getElementById('autoReadToggle').classList.add('on');
      if (localStorage.getItem('fas_autoswitch') === 'false') document.getElementById('autoSwitchToggle').classList.remove('on');
      if (window.speechSynthesis) {
        loadVoices();
        window.speechSynthesis.onvoiceschanged = loadVoices;
      }

      const ta = document.getElementById('input');
      ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 150) + 'px'; });
      ta.focus();
    });
  </script>
