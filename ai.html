<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Faceless AI Chat — Run open source models from your browser. Powered by OpenRouter." />
  <title>Faceless AI — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0b0f;
      --surface: #11131a;
      --card: rgba(28,29,39,0.94);
      --border: rgba(167,139,250,0.16);
      --text: #f3f3fa;
      --soft: #c9cae5;
      --dim: #9da0bc;
      --purple: #7c3aed;
      --bright: #a78bfa;
      --gold: #f5c451;
      --cyan: #22d3ee;
      --radius: 14px;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; flex-direction: column; }
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(7,8,12,0.92); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
    }
    .navbar-inner {
      min-height: 56px; display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
    }
    .navbar-logo { font-size: 0.95rem; font-weight: 900; color: #fff; white-space: nowrap; }
    .navbar-logo span { color: var(--bright); }
    .navbar-links { display: flex; gap: 0.75rem; list-style: none; flex-wrap: wrap; }
    .navbar-links a { color: var(--soft); font-size: 0.82rem; font-weight: 600; text-decoration: none; }
    .navbar-links a:hover { color: #fff; }
    .nav-cta {
      padding: 0.5rem 0.85rem; border-radius: 999px;
      background: linear-gradient(120deg, var(--purple), var(--bright));
      color: #fff !important; font-size: 0.78rem !important;
    }
    main { flex: 1; display: flex; flex-direction: column; max-width: 820px; width: 100%; margin: 0 auto; padding: 0 0.75rem 0.75rem; }
    .chat-header { padding: 0.75rem 0; text-align: center; }
    .chat-header h1 { font-size: 1.1rem; font-weight: 800; }
    .chat-header h1 span { color: var(--bright); }
    .chat-header p { color: var(--dim); font-size: 0.78rem; margin-top: 0.2rem; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 0.5rem 0; display: flex; flex-direction: column; gap: 0.75rem; min-height: 0; }
    .msg { padding: 0.85rem; border-radius: var(--radius); max-width: 88%; line-height: 1.6; font-size: 0.92rem; animation: fade 0.2s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { align-self: flex-end; background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(167,139,250,0.15)); border: 1px solid rgba(167,139,250,0.2); }
    .msg.assistant { align-self: flex-start; background: var(--card); border: 1px solid var(--border); }
    .msg.system { align-self: center; background: rgba(245,196,81,0.08); border: 1px solid rgba(245,196,81,0.15); color: var(--gold); font-size: 0.82rem; text-align: center; max-width: 100%; }
    .msg.assistant pre { background: rgba(0,0,0,0.4); border-radius: 10px; padding: 0.75rem; overflow-x: auto; margin: 0.5rem 0; font-size: 0.82rem; }
    .msg.assistant code { font-family: 'Fira Code', monospace; font-size: 0.82rem; }
    .msg .label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.3rem; display: block; }
    .msg.user .label { color: var(--bright); }
    .msg.assistant .label { color: var(--cyan); }
    .typing { display: flex; gap: 4px; padding: 0.4rem 0; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    .chat-input-area { border-top: 1px solid var(--border); padding: 0.75rem 0; background: var(--bg); }
    .input-row { display: flex; gap: 0.5rem; align-items: flex-end; }
    .input-row textarea {
      flex: 1; resize: none; padding: 0.75rem; border-radius: 12px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.92rem;
      outline: none; min-height: 48px; max-height: 150px; line-height: 1.5;
    }
    .input-row textarea:focus { border-color: var(--bright); }
    .input-row button {
      width: 48px; height: 48px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, var(--purple), var(--bright));
      color: #fff; font-size: 1.2rem; cursor: pointer; flex: 0 0 auto;
      display: grid; place-items: center; transition: opacity 0.15s;
    }
    .input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
    .model-bar {
      display: flex; gap: 0.5rem; align-items: center; padding: 0.5rem 0 0.25rem;
      font-size: 0.75rem; color: var(--dim); flex-wrap: wrap;
    }
    .model-bar select {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.3rem 0.5rem; font-size: 0.75rem; outline: none;
    }
    .model-bar .key-status { margin-left: auto; cursor: pointer; padding: 0.25rem 0.5rem; border-radius: 6px; background: rgba(255,255,255,0.03); }
    .model-bar .key-status.set { color: var(--green, #4ade80); }
    .model-bar .key-status.unset { color: var(--gold); }
    .settings-modal {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.7); align-items: center; justify-content: center; padding: 1rem;
    }
    .settings-modal.open { display: flex; }
    .settings-panel {
      background: var(--card); border: 1px solid var(--border); border-radius: 20px;
      padding: 1.5rem; width: 100%; max-width: 400px;
    }
    .settings-panel h2 { font-size: 1rem; margin-bottom: 0.5rem; }
    .settings-panel p { font-size: 0.82rem; color: var(--dim); margin-bottom: 1rem; line-height: 1.5; }
    .settings-panel label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 0.3rem; color: var(--soft); }
    .settings-panel input {
      width: 100%; padding: 0.7rem; border-radius: 10px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); font-size: 0.9rem; outline: none; margin-bottom: 0.75rem;
    }
    .settings-panel input:focus { border-color: var(--bright); }
    .settings-actions { display: flex; gap: 0.5rem; }
    .settings-actions button {
      flex: 1; padding: 0.65rem; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 0.85rem;
    }
    .btn-primary { background: linear-gradient(135deg, var(--purple), var(--bright)); color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border) !important; }
    .scroll-top {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--card); border: 1px solid var(--border); border-radius: 999px;
      padding: 0.4rem 1rem; font-size: 0.75rem; color: var(--dim); cursor: pointer; z-index: 50;
      display: none; backdrop-filter: blur(8px);
    }
    @media (max-width: 600px) {
      .navbar-links a:not(.nav-cta) { display: none; }
      .msg { max-width: 95%; font-size: 0.88rem; }
      main { padding: 0 0.5rem 0.5rem; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-logo" style="text-decoration:none">Faceless <span>Animal</span> AI</a>
      <ul class="navbar-links">
        <li><a href="ai.html">Chat</a></li>
        <li><a href="index.html">Studios</a></li>
        <li><a href="login.html" class="nav-cta">Enter</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="chat-header">
      <h1>Faceless <span>AI</span></h1>
      <p>Open source models. No gatekeepers. Your key, your control.</p>
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="chat-input-area">
      <div class="model-bar">
        <select id="modelSelect"></select>
        <span class="key-status unset" id="keyStatus" onclick="openSettings()">&#9881; Set API Key</span>
      </div>
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Message..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
        <button id="sendBtn" onclick="send()">&#10148;</button>
      </div>
    </div>
  </main>

  <div class="settings-modal" id="settingsModal">
    <div class="settings-panel">
      <h2>API Settings</h2>
      <p>Get a free key from <a href="https://openrouter.ai/keys" target="_blank" style="color:var(--bright)">OpenRouter</a> to chat with open models. Your key stays on your device.</p>
      <label>OpenRouter API Key</label>
      <input type="password" id="apiKeyInput" placeholder="sk-or-v1-..." />
      <label>Custom Base URL (optional)</label>
      <input type="text" id="baseUrlInput" placeholder="https://openrouter.ai/api/v1" />
      <div class="settings-actions">
        <button class="btn-secondary" onclick="closeSettings()">Cancel</button>
        <button class="btn-primary" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <script>
    const API = 'https://openrouter.ai/api/v1';
    let models = [];
    let controller = null;

    const DEFAULT_MODELS = [
      { id: 'google/gemma-4:free', name: 'Gemma 4 (Free)' },
      { id: 'qwen/qwen3-coder:free', name: 'Qwen3-Coder (Free)' },
      { id: 'deepseek/deepseek-chat:free', name: 'DeepSeek Chat (Free)' },
      { id: 'mistralai/mistral-small-3.1:free', name: 'Mistral Small 3.1 (Free)' },
    ];

    function loadSettings() {
      return {
        key: localStorage.getItem('fa_ai_key') || '',
        baseUrl: localStorage.getItem('fa_ai_base') || API,
      };
    }

    function saveSettingsToLS(key, baseUrl) {
      localStorage.setItem('fa_ai_key', key);
      localStorage.setItem('fa_ai_base', baseUrl);
    }

    function openSettings() {
      const s = loadSettings();
      document.getElementById('apiKeyInput').value = s.key;
      document.getElementById('baseUrlInput').value = s.baseUrl;
      document.getElementById('settingsModal').classList.add('open');
    }

    function closeSettings() {
      document.getElementById('settingsModal').classList.remove('open');
    }

    function saveSettings() {
      const key = document.getElementById('apiKeyInput').value.trim();
      const baseUrl = document.getElementById('baseUrlInput').value.trim() || API;
      saveSettingsToLS(key, baseUrl);
      closeSettings();
      updateKeyStatus();
      loadModels();
    }

    function updateKeyStatus() {
      const s = loadSettings();
      const el = document.getElementById('keyStatus');
      if (s.key) { el.className = 'key-status set'; el.innerHTML = '&#10003; Key Set'; }
      else { el.className = 'key-status unset'; el.innerHTML = '&#9881; Set API Key'; }
    }

    async function loadModels() {
      const s = loadSettings();
      const sel = document.getElementById('modelSelect');
      sel.innerHTML = '<option value="">Loading...</option>';
      try {
        const res = await fetch(s.baseUrl.replace(/\/+$/,'') + '/models', {
          headers: s.key ? { 'Authorization': 'Bearer ' + s.key } : {}
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        models = (data.data || data).filter(m => m.id && !m.id.includes(':beta'));
        sel.innerHTML = '';
        if (models.length === 0) throw new Error('no models');
        models.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.id;
          sel.appendChild(opt);
        });
      } catch (e) {
        sel.innerHTML = '';
        DEFAULT_MODELS.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.name || m.id;
          sel.appendChild(opt);
        });
      }
    }

    function addMessage(role, content) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      if (role === 'system') { el.textContent = content; }
      else {
        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = role === 'user' ? 'You' : 'Faceless AI';
        el.appendChild(label);
        const text = document.createElement('div');
        text.innerHTML = formatContent(content);
        el.appendChild(text);
      }
      document.getElementById('messages').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth' });
    }

    function formatContent(text) {
      return text.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                 .replace(/`([^`]+)`/g, '<code>$1</code>')
                 .replace(/\n/g, '<br/>');
    }

    function showTyping() {
      const el = document.createElement('div');
      el.className = 'msg assistant';
      el.id = 'typing-indicator';
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = 'Faceless AI';
      el.appendChild(label);
      const dots = document.createElement('div');
      dots.className = 'typing';
      dots.innerHTML = '<span></span><span></span><span></span>';
      el.appendChild(dots);
      document.getElementById('messages').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth' });
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function send() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      input.style.height = 'auto';

      const s = loadSettings();
      const model = document.getElementById('modelSelect').value;

      if (!s.key) {
        addMessage('system', 'Set your OpenRouter API key first (click the key icon below). Free at openrouter.ai/keys.');
        return;
      }

      addMessage('user', text);
      showTyping();
      document.getElementById('sendBtn').disabled = true;

      controller = new AbortController();
      try {
        const res = await fetch((s.baseUrl || API).replace(/\/+$/,'') + '/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + s.key },
          body: JSON.stringify({
            model: model || 'google/gemma-4:free',
            messages: [{ role: 'user', content: text }],
            max_tokens: 4096,
          }),
          signal: controller.signal,
        });
        removeTyping();
        if (!res.ok) {
          const err = await res.text();
          addMessage('system', 'Error: ' + (err.length > 200 ? err.slice(0,200)+'...' : err));
          return;
        }
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || 'No response.';
        addMessage('assistant', reply);
      } catch (e) {
        removeTyping();
        if (e.name !== 'AbortError') addMessage('system', 'Error: ' + e.message);
      } finally {
        document.getElementById('sendBtn').disabled = false;
        controller = null;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateKeyStatus();
      loadModels();
      const ta = document.getElementById('input');
      ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 150) + 'px'; });
    });

    document.getElementById('settingsModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeSettings();
    });
  </script>
</body>
</html>
