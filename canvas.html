<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Studio — Mobile video editor. Timeline, AI generation, export, and share." />
  <title>Studio — Faceless Animal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #0a0b10; --surface: #12141e; --surface2: #181b2a; --surface3: #1e2235;
      --border: rgba(167,139,250,0.15); --border2: rgba(167,139,250,0.08);
      --text: #f3f3fa; --dim: #9da0bc; --bright: #a78bfa; --purple: #7c3aed;
      --gold: #f5c451; --cyan: #22d3ee; --green: #4ade80; --pink: #f472b6;
      --radius: 12px; --radius-sm: 8px;
      --tracks-h: 70px; --bar-h: 50px; --bottom-bar-h: 56px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; font-size: 14px; -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }
    input, textarea, select { font-family: inherit; }

    /* ── APP BAR (compact on mobile) ── */
    .app-bar {
      display: flex; align-items: center; gap: 0.3rem; padding: 0.3rem 0.5rem;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .app-bar::-webkit-scrollbar { display: none; }
    .app-bar .brand { font-size: 0.75rem; font-weight: 800; color: #fff; margin-right: 0.25rem; white-space: nowrap; }
    .app-bar .brand span { color: var(--gold); }
    .app-bar .sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
    .app-bar .tool-group { display: flex; align-items: center; gap: 0.2rem; flex-shrink: 0; }

    .tool-btn {
      display: inline-flex; align-items: center; gap: 0.2rem; white-space: nowrap;
      padding: 0.35rem 0.5rem; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: transparent; color: var(--dim); font-size: 0.68rem; font-weight: 600;
      transition: 0.12s; flex-shrink: 0; min-height: 34px; touch-action: manipulation;
    }
    .tool-btn:active { transform: scale(0.96); }
    .tool-btn.primary { background: linear-gradient(135deg, var(--purple), var(--bright)); color: #fff; border-color: transparent; }
    .tool-btn.gold { background: linear-gradient(135deg, #b8860b, var(--gold)); color: #000; border-color: transparent; }
    .tool-btn.green { background: linear-gradient(135deg, #16a34a, var(--green)); color: #fff; border-color: transparent; }
    .tool-btn.cyan { background: linear-gradient(135deg, #0891b2, var(--cyan)); color: #000; border-color: transparent; }
    .tool-btn.pink { background: linear-gradient(135deg, #db2777, var(--pink)); color: #fff; border-color: transparent; }
    .tool-btn:disabled { opacity: 0.4; }

    /* ── MAIN LAYOUT ── */
    .main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; min-height: 0; }

    /* ── CANVAS WRAP (takes remaining space above bottom bar) ── */
    .canvas-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0;
      background: radial-gradient(circle at 50% 50%, rgba(167,139,250,0.03), transparent), var(--bg);
      position: relative; overflow: hidden; padding: 0.5rem;
    }
    .canvas-wrap .ratio-box {
      position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    }
    .canvas-container {
      border-radius: 6px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      max-width: 100%; max-height: 100%; touch-action: none;
    }
    #playbackBadge {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff; font-size: 0.7rem; font-weight: 700;
      padding: 0.2rem 0.6rem; border-radius: 99px; display: none; pointer-events: none; z-index: 5;
      backdrop-filter: blur(4px); letter-spacing: 0.05em;
    }

    /* ── TIMELINE ── */
    .timeline-wrap {
      flex-shrink: 0; background: var(--surface); border-top: 1px solid var(--border);
      position: relative; user-select: none;
    }
    .timeline-tbar {
      display: flex; align-items: center; gap: 0.25rem; padding: 0.2rem 0.4rem;
      border-bottom: 1px solid var(--border2); flex-shrink: 0;
    }
    .tl-btn {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border);
      background: transparent; color: var(--dim); font-size: 0.75rem;
      display: flex; align-items: center; justify-content: center; touch-action: manipulation;
    }
    .tl-btn:active { background: rgba(167,139,250,0.15); }
    .tl-btn.active { background: rgba(167,139,250,0.15); color: var(--bright); border-color: var(--bright); }
    .tl-time { font-size: 0.65rem; color: var(--dim); font-variant-numeric: tabular-nums; margin-left: auto; white-space: nowrap; min-width: 75px; text-align: right; }
    .tl-zoom { display: flex; align-items: center; gap: 0.15rem; }
    .tl-zoom input[type="range"] { width: 50px; height: 3px; accent-color: var(--bright); }

    .timeline-tracks {
      height: var(--tracks-h); overflow-x: auto; overflow-y: hidden; position: relative;
      background: var(--surface2); -webkit-overflow-scrolling: touch;
    }
    .timeline-tracks::-webkit-scrollbar { height: 3px; }
    .timeline-tracks::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .timeline-clips { position: relative; height: 100%; min-height: 100%; }

    .tl-ruler {
      height: 18px; background: var(--surface); border-bottom: 1px solid var(--border2);
      position: relative; overflow: hidden; flex-shrink: 0;
    }
    .tl-ruler .tick { position: absolute; top: 0; width: 1px; height: 8px; background: rgba(255,255,255,0.08); }
    .tl-ruler .tick.major { height: 12px; background: rgba(255,255,255,0.18); }
    .tl-ruler .tick-label { position: absolute; top: 11px; font-size: 0.5rem; color: var(--dim); transform: translateX(-50%); white-space: nowrap; }

    .tl-clip {
      position: absolute; height: 44px; top: calc((var(--tracks-h) - 44px) / 2);
      border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 0.55rem; font-weight: 600; overflow: hidden; transition: box-shadow 0.1s; min-width: 24px;
      border: 1.5px solid rgba(255,255,255,0.1); touch-action: manipulation;
    }
    .tl-clip:active { opacity: 0.85; }
    .tl-clip.active { box-shadow: 0 0 0 2.5px var(--bright); z-index: 2; border-color: var(--bright); }
    .tl-clip .thumb-el { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.35; pointer-events: none; }
    .tl-clip .label { position: relative; z-index: 1; text-shadow: 0 1px 4px rgba(0,0,0,0.9); padding: 0 4px; text-align: center; line-height: 1.15; font-size: 0.55rem; }
    .tl-clip .dur { position: absolute; bottom: 2px; right: 5px; font-size: 0.48rem; opacity: 0.7; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

    .tl-playhead {
      position: absolute; top: 0; left: 0; width: 2.5px; height: 100%; background: var(--gold);
      z-index: 10; pointer-events: none; will-change: left;
    }
    .tl-playhead::before {
      content: ''; position: absolute; top: 0; left: -6px; width: 14px; height: 10px;
      background: var(--gold); clip-path: polygon(50% 100%, 0 0, 100% 0);
    }

    .tl-empty {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: var(--dim); font-size: 0.7rem; opacity: 0.5; gap: 4px;
    }

    .tl-clip .resize-handle {
      position: absolute; top: 0; bottom: 0; width: 14px; z-index: 3; touch-action: none;
    }
    .tl-clip .resize-handle.left { left: 0; cursor: ew-resize; }
    .tl-clip .resize-handle.right { right: 0; cursor: ew-resize; }

    /* ── MEDIA POOL (horizontal strip) ── */
    .media-pool {
      display: flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.4rem;
      border-bottom: 1px solid var(--border2); overflow-x: auto; flex-shrink: 0;
      min-height: 42px; -webkit-overflow-scrolling: touch;
    }
    .media-pool::-webkit-scrollbar { height: 2px; }
    .media-pool::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .media-item {
      width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      overflow: hidden; flex-shrink: 0; position: relative; background: var(--surface2); touch-action: manipulation;
    }
    .media-item:active { border-color: var(--bright); }
    .media-item img, .media-item video { width: 100%; height: 100%; object-fit: cover; }
    .media-item .type-badge { position: absolute; bottom: 1px; right: 1px; font-size: 0.4rem; background: rgba(0,0,0,0.75); color: #fff; padding: 0 2px; border-radius: 2px; }
    .add-media-btn {
      width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1px dashed var(--border);
      background: transparent; color: var(--dim); font-size: 1.1rem; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; touch-action: manipulation;
    }
    .add-media-btn:active { border-color: var(--bright); color: var(--text); }

    /* ── BOTTOM BAR (CapCut-style) ── */
    .bottom-bar {
      flex-shrink: 0; display: flex; align-items: center; justify-content: space-around;
      height: var(--bottom-bar-h); padding: 0 0.25rem calc(var(--safe-bottom) + 0.25rem);
      background: var(--surface); border-top: 1px solid var(--border); z-index: 10;
    }
    .b-btn {
      display: flex; flex-direction: column; align-items: center; gap: 1px; padding: 0.2rem 0.5rem;
      background: transparent; border: none; color: var(--dim); font-size: 0.55rem; font-weight: 600;
      touch-action: manipulation; min-width: 48px;
    }
    .b-btn .icon { font-size: 1.15rem; line-height: 1.2; }
    .b-btn:active { color: var(--bright); transform: scale(0.92); }
    .b-btn.active { color: var(--bright); }

    /* ── AI BOTTOM DRAWER ── */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 9998; background: rgba(0,0,0,0.5);
      display: none; backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    }
    .drawer-overlay.open { display: block; }

    .ai-drawer {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
      background: var(--surface); border-radius: 16px 16px 0 0;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 80vh; display: flex; flex-direction: column;
      box-shadow: 0 -8px 40px rgba(0,0,0,0.4); padding-bottom: var(--safe-bottom);
    }
    .ai-drawer.open { transform: translateY(0); }
    .ai-drawer .handle {
      width: 36px; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.15);
      margin: 8px auto 4px; flex-shrink: 0;
    }
    .ai-drawer .tabs {
      display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto;
    }
    .ai-drawer .tabs::-webkit-scrollbar { display: none; }
    .ai-drawer .tab-btn {
      flex: 1; min-width: 60px; padding: 0.55rem 0.4rem; background: transparent; border: none;
      color: var(--dim); font-size: 0.68rem; font-weight: 600; cursor: pointer;
      border-bottom: 2px solid transparent; white-space: nowrap; touch-action: manipulation;
    }
    .ai-drawer .tab-btn.active { color: var(--bright); border-bottom-color: var(--bright); }
    .ai-drawer .tab-panel { flex: 1; overflow-y: auto; padding: 0.65rem; display: none; -webkit-overflow-scrolling: touch; }
    .ai-drawer .tab-panel.active { display: block; }
    .ai-drawer h3 { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); margin-bottom: 0.4rem; }
    .ai-drawer textarea {
      width: 100%; min-height: 60px; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); padding: 0.45rem; font-size: 0.78rem;
      resize: vertical; outline: none; margin-bottom: 0.4rem;
    }
    .ai-drawer textarea:focus { border-color: var(--bright); }
    .ai-drawer select { width: 100%; margin-bottom: 0.4rem; }
    .ai-drawer .gen-preview { max-width: 100%; max-height: 130px; border-radius: var(--radius-sm); margin-bottom: 0.4rem; display: none; }
    .ai-drawer .gen-preview.show { display: block; }
    .ai-drawer .thumb-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.35rem; }
    .ai-drawer .thumb-grid .item {
      aspect-ratio: 1; border-radius: var(--radius-sm); border: 1px solid var(--border);
      overflow: hidden; cursor: pointer; position: relative; background: var(--surface2); touch-action: manipulation;
    }
    .ai-drawer .thumb-grid .item:active { border-color: var(--bright); }
    .ai-drawer .thumb-grid .item img, .ai-drawer .thumb-grid .item video { width: 100%; height: 100%; object-fit: cover; }

    /* ── OVERLAY MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 99999; background: rgba(0,0,0,0.7);
      display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 0 0;
      padding: 1.2rem 1rem calc(1rem + var(--safe-bottom)); width: 100%; max-width: 480px;
      max-height: 85vh; overflow-y: auto; box-shadow: 0 -8px 60px rgba(0,0,0,0.5);
    }
    .modal h2 { font-size: 1.05rem; font-weight: 800; margin-bottom: 0.2rem; }
    .modal p { font-size: 0.78rem; color: var(--dim); margin-bottom: 0.6rem; line-height: 1.4; }
    .modal label { font-size: 0.68rem; color: var(--dim); display: block; margin-bottom: 0.15rem; }
    .modal input, .modal textarea, .modal select {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); padding: 0.5rem; font-size: 0.82rem; outline: none; margin-bottom: 0.5rem;
    }
    .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--bright); }
    .modal .actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.6rem; }
    .export-progress { display: none; text-align: center; padding: 0.75rem; }
    .export-progress.show { display: block; }
    .export-progress .bar { height: 5px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 0.4rem 0; }
    .export-progress .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--purple), var(--bright)); border-radius: 4px; transition: width 0.3s; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.15); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; bottom: calc(var(--bottom-bar-h) + var(--safe-bottom) + 0.75rem);
      left: 50%; transform: translateX(-50%); z-index: 999999;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.5rem 1rem; font-size: 0.75rem; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: none; white-space: nowrap; pointer-events: none;
    }

    /* ── responsively larger on desktop ── */
    @media (min-width: 768px) {
      :root { --tracks-h: 80px; }
      .canvas-wrap { padding: 1rem; }
      .app-bar { padding: 0.4rem 1rem; gap: 0.5rem; }
      .bottom-bar { display: none; }
      .ai-drawer { max-width: 400px; right: 0; left: auto; top: 0; bottom: 0; border-radius: 0; max-height: 100vh; transform: translateX(100%); transition: transform 0.2s; padding-bottom: 0; }
      .ai-drawer.open { transform: translateX(0); }
      .ai-drawer .handle { display: none; }
      .drawer-overlay.open { display: none; }
    }

    @media (max-width: 767px) {
      .app-bar .tool-group.hide-mobile { display: none; }
    }
  </style>
</head>
<body>

  <!-- ─── APP BAR ─── -->
  <div class="app-bar">
    <a href="dashboard.html" class="brand">Faceless <span>Animal</span></a>
    <span class="sep"></span>
    <div class="tool-group">
      <button class="tool-btn" onclick="importMedia()" title="Import video/image/audio">📁 Import</button>
    </div>
    <span class="sep"></span>
    <div class="tool-group">
      <button class="tool-btn" onclick="openDrawer('tabImage')" title="AI Generate">✨ AI</button>
      <button class="tool-btn" onclick="addTextClip()" title="Add text">T Text</button>
    </div>
    <span class="sep hide-mobile"></span>
    <div class="tool-group hide-mobile">
      <span id="objCount" style="font-size:0.62rem;color:var(--dim);">0 clips</span>
      <span id="tlDuration" style="font-size:0.62rem;color:var(--dim);">00:00</span>
    </div>
    <div style="margin-left:auto;display:flex;gap:0.2rem;">
      <button class="tool-btn" onclick="saveToMedia()" title="Save">💾</button>
      <button class="tool-btn green" onclick="postToDirectory()" title="Post">📡</button>
    </div>
  </div>

  <!-- ─── MAIN ─── -->
  <div class="main-area">

    <!-- Media pool -->
    <div class="media-pool" id="mediaPool">
      <button class="add-media-btn" onclick="importMedia()">+</button>
    </div>

    <!-- Canvas preview -->
    <div class="canvas-wrap" id="canvasWrap">
      <div class="ratio-box" id="ratioBox">
        <canvas id="canvas" width="1080" height="1920"></canvas>
        <div id="playbackBadge">▶ PLAYING</div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="timeline-wrap">
      <div class="timeline-tbar">
        <button class="tl-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="tl-btn" onclick="stopPlayback()">⏹</button>
        <span class="sep" style="width:1px;height:18px;background:var(--border);margin:0 2px;"></span>
        <button class="tl-btn" onclick="clearTimeline()">✕</button>
        <div class="tl-zoom">
          <input type="range" id="zoomRange" min="15" max="250" value="100" oninput="setZoom(+this.value)" />
        </div>
        <span class="tl-time" id="tlTimeDisplay">00:00 / 00:00</span>
      </div>
      <div class="tl-ruler" id="tlRuler"></div>
      <div class="timeline-tracks" id="timelineTracks">
        <div class="tl-empty" id="tlEmpty">
          <span style="font-size:1.2rem;">🎬</span>
          <span>Import or generate media to start</span>
        </div>
        <div class="timeline-clips" id="timelineClips"></div>
        <div class="tl-playhead" id="tlPlayhead"></div>
      </div>
    </div>

    <!-- Bottom bar (mobile) -->
    <div class="bottom-bar" id="bottomBar">
      <button class="b-btn" onclick="importMedia()"><span class="icon">📁</span>Import</button>
      <button class="b-btn" onclick="openDrawer('tabImage')"><span class="icon">✨</span>AI</button>
      <button class="b-btn" onclick="addTextClip()"><span class="icon">T</span>Text</button>
      <button class="b-btn" onclick="exportVideo()"><span class="icon">🎬</span>Export</button>
      <button class="b-btn" onclick="postToDirectory()"><span class="icon">📡</span>Post</button>
    </div>
  </div>

  <!-- ─── DRAWER OVERLAY ─── -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

  <!-- ─── AI DRAWER (bottom sheet mobile / sidebar desktop) ─── -->
  <div class="ai-drawer" id="aiDrawer">
    <div class="handle"></div>
    <div class="tabs">
      <button class="tab-btn active" data-panel="panelImage" onclick="switchPanel('panelImage')">🖼 Image</button>
      <button class="tab-btn" data-panel="panelMusic" onclick="switchPanel('panelMusic')">🎵 Music</button>
      <button class="tab-btn" data-panel="panelVideo" onclick="switchPanel('panelVideo')">🎬 Video</button>
      <button class="tab-btn" data-panel="panelMedia" onclick="switchPanel('panelMedia');loadUserMedia()">📁 Media</button>
    </div>

    <!-- Image Gen -->
    <div class="tab-panel active" id="panelImage">
      <h3>Generate Image</h3>
      <textarea id="aiImagePrompt" placeholder="Describe the image..." rows="2"></textarea>
      <select class="tool-select" id="aiImageModel" style="width:100%;margin-bottom:0.4rem;"></select>
      <button class="tool-btn primary" onclick="generateImage()" style="width:100%;justify-content:center;padding:0.5rem;">
        <span id="aiImageBtnText">Generate & Add to Timeline</span>
      </button>
      <img class="gen-preview" id="aiImagePreview" />
      <div id="aiImageResults" class="thumb-grid" style="margin-top:0.4rem;"></div>
    </div>

    <!-- Music Gen -->
    <div class="tab-panel" id="panelMusic">
      <h3>Generate Music</h3>
      <textarea id="aiMusicPrompt" placeholder="Describe the music..." rows="2"></textarea>
      <select class="tool-select" id="aiMusicModel" style="width:100%;margin-bottom:0.4rem;"></select>
      <button class="tool-btn primary" onclick="generateMusic()" style="width:100%;justify-content:center;padding:0.5rem;">
        <span id="aiMusicBtnText">Generate & Add to Timeline</span>
      </button>
      <div id="aiMusicResults" style="margin-top:0.4rem;"></div>
    </div>

    <!-- Video Gen -->
    <div class="tab-panel" id="panelVideo">
      <h3>Generate Video</h3>
      <textarea id="aiVideoPrompt" placeholder="Describe the video..." rows="2"></textarea>
      <select class="tool-select" id="aiVideoModel" style="width:100%;margin-bottom:0.4rem;"></select>
      <button class="tool-btn primary" onclick="generateVideo()" style="width:100%;justify-content:center;padding:0.5rem;">
        <span id="aiVideoBtnText">Generate & Add to Timeline</span>
      </button>
      <div id="aiVideoResults" style="margin-top:0.4rem;"></div>
    </div>

    <!-- Media Browser -->
    <div class="tab-panel" id="panelMedia">
      <h3>Your Media</h3>
      <div id="mediaBrowserList" class="thumb-grid"></div>
      <button class="tool-btn" onclick="loadUserMedia()" style="width:100%;justify-content:center;margin-top:0.4rem;">🔄 Refresh</button>
    </div>
  </div>

  <!-- ─── POST MODAL ─── -->
  <div class="modal-overlay" id="postModal">
    <div class="modal">
      <h2>📡 Post</h2>
      <p>Post your video to the Signal directory.</p>
      <label>Caption</label>
      <textarea id="postCaption" placeholder="Write a caption..." rows="2"></textarea>
      <div id="postPreview" style="display:none;margin-bottom:0.4rem;">
        <video id="postVideoPreview" controls style="width:100%;max-height:180px;border-radius:8px;"></video>
      </div>
      <div id="postProgress" class="export-progress">
        <div class="bar"><div class="bar-fill" id="postProgressFill"></div></div>
        <span id="postProgressText" style="font-size:0.75rem;color:var(--dim);">Exporting video...</span>
      </div>
      <div class="actions">
        <button class="tool-btn" onclick="closeModal('postModal')">Cancel</button>
        <button class="tool-btn green" id="postBtn" onclick="confirmPost()">Post</button>
      </div>
    </div>
  </div>

  <!-- ─── EXPORT MODAL ─── -->
  <div class="modal-overlay" id="exportModal">
    <div class="modal">
      <h2>🎬 Export Video</h2>
      <p>Render and download your project.</p>
      <label>Quality</label>
      <select id="exportQuality">
        <option value="0.6">Standard</option>
        <option value="1" selected>High</option>
      </select>
      <label>FPS</label>
      <select id="exportFps">
        <option value="15">15</option>
        <option value="24" selected>24</option>
        <option value="30">30</option>
      </select>
      <div id="exportProgress" class="export-progress">
        <div class="bar"><div class="bar-fill" id="exportProgressFill"></div></div>
        <span id="exportProgressText" style="font-size:0.75rem;color:var(--dim);">Preparing...</span>
      </div>
      <div class="actions">
        <button class="tool-btn" onclick="closeModal('exportModal')">Cancel</button>
        <button class="tool-btn cyan" id="exportBtn" onclick="startExport()">Export</button>
      </div>
    </div>
  </div>

  <!-- ─── TOAST ─── -->
  <div class="toast" id="toast"></div>

  <script>
    // ────────────────────────────────────────────────────────────
    //  STATE
    // ────────────────────────────────────────────────────────────
    const STATE = {
      clips: [],
      mediaPool: [],
      playing: false,
      playhead: 0,
      duration: 10,
      fps: 24,
      zoom: 100,
      _cid: 1,
      _mid: 1,
      exportedBlob: null,
      exportedVideoURL: null,
    };

    // ────────────────────────────────────────────────────────────
    //  CANVAS
    // ────────────────────────────────────────────────────────────
    const canvasEl = document.getElementById('canvas');
    const canvas = new fabric.Canvas('canvas', {
      backgroundColor: '#1a1c26',
      selection: true,
      preserveObjectStacking: true,
    });

    let availableModels = [];
    let animFrame = null;
    const imgCache = {};

    // ────────────────────────────────────────────────────────────
    //  LAYOUT
    // ────────────────────────────────────────────────────────────
    function fitCanvas() {
      const wrap = document.getElementById('canvasWrap');
      const w = wrap.clientWidth - 16;
      const h = wrap.clientHeight - 16;
      if (w <= 0 || h <= 0) return;
      const cw = canvas.width, ch = canvas.height;
      const scale = Math.min(w / cw, h / ch, 1);
      const dw = Math.round(cw * scale), dh = Math.round(ch * scale);
      canvas.setWidth(dw); canvas.setHeight(dh);
      canvas.calcOffset(); canvas.renderAll();
    }
    window.addEventListener('resize', fitCanvas);
    setTimeout(fitCanvas, 100);

    // ────────────────────────────────────────────────────────────
    //  MODELS
    // ────────────────────────────────────────────────────────────
    async function loadModels() {
      try {
        const res = await fetch('/api/ai/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: '', list_conversations: true, session_id: 'studio' }),
        });
        if (!res.ok) return;
        const data = await res.json();
        if (data.models) {
          availableModels = data.models;
          populateSelect('aiImageModel', ['image', 'img2img']);
          populateSelect('aiMusicModel', ['music', 'audio']);
          populateSelect('aiVideoModel', ['video']);
        }
      } catch {}
    }

    function populateSelect(id, types) {
      const sel = document.getElementById(id);
      const filtered = availableModels.filter(m => types.includes(m.type));
      if (!filtered.length) { sel.innerHTML = '<option>No models</option>'; return; }
      const groups = {};
      filtered.forEach((m, i) => { const g = m.group||'Other'; if (!groups[g]) groups[g]=[]; groups[g].push(i); });
      sel.innerHTML = '';
      for (const [g, idxs] of Object.entries(groups)) {
        const grp = document.createElement('optgroup'); grp.label = g;
        idxs.forEach(i => { const m=filtered[i]; const o=document.createElement('option'); o.value=availableModels.indexOf(m); o.textContent=m.name; grp.appendChild(o); });
        sel.appendChild(grp);
      }
    }

    loadModels();

    // ────────────────────────────────────────────────────────────
    //  DRAWER
    // ────────────────────────────────────────────────────────────
    let drawerOpen = false;

    function openDrawer(tab) {
      drawerOpen = true;
      document.getElementById('aiDrawer').classList.add('open');
      document.getElementById('drawerOverlay').classList.add('open');
      if (tab) switchPanel(tab);
    }

    function closeDrawer() {
      drawerOpen = false;
      document.getElementById('aiDrawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.remove('open');
    }

    function switchPanel(id) {
      document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelector(`[data-panel="${id}"]`).classList.add('active');
    }

    // ────────────────────────────────────────────────────────────
    //  MEDIA IMPORT
    // ────────────────────────────────────────────────────────────
    function importMedia() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*,video/*,audio/*';
      input.multiple = true;
      input.onchange = (e) => {
        for (const file of e.target.files) {
          if (!file) continue;
          const reader = new FileReader();
          const isVid = file.type.startsWith('video/');
          const isAud = file.type.startsWith('audio/');
          const isImg = file.type.startsWith('image/');
          reader.onload = (ev) => {
            const id = 'm' + (STATE._mid++);
            const item = { id, type: isVid ? 'video' : isAud ? 'music' : 'image', src: ev.target.result, label: file.name };
            STATE.mediaPool.push(item);
            renderMediaPool();
            const dur = isVid ? 6 : isAud ? 10 : 4;
            addClip({ type: item.type, src: item.src, label: item.label, duration: dur });
          };
          reader.readAsDataURL(file);
        }
      };
      input.click();
    }

    function renderMediaPool() {
      const pool = document.getElementById('mediaPool');
      pool.innerHTML = '';
      const add = document.createElement('button');
      add.className = 'add-media-btn'; add.textContent = '+'; add.onclick = importMedia;
      pool.appendChild(add);
      STATE.mediaPool.forEach(item => {
        const el = document.createElement('div'); el.className = 'media-item';
        if (item.type === 'image') { const i = document.createElement('img'); i.src = item.src; el.appendChild(i); }
        else if (item.type === 'video') { const v = document.createElement('video'); v.src = item.src; v.muted = true; el.appendChild(v); }
        else { const s = document.createElement('span'); s.textContent = '🎵'; s.style.cssText = 'display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:1.1rem;'; el.appendChild(s); }
        const b = document.createElement('span'); b.className = 'type-badge';
        b.textContent = item.type === 'video' ? 'vid' : item.type === 'music' ? 'aud' : 'img';
        el.appendChild(b);
        el.onclick = () => addClip({ type: item.type, src: item.src, label: item.label, duration: item.type === 'video' ? 6 : item.type === 'music' ? 10 : 4 });
        pool.appendChild(el);
      });
    }

    // ────────────────────────────────────────────────────────────
    //  CLIPS
    // ────────────────────────────────────────────────────────────
    function addClip(opts) {
      const clip = {
        id: 'c' + (STATE._cid++),
        type: opts.type || 'image',
        src: opts.src || '',
        label: opts.label || 'Clip',
        duration: opts.duration || 4,
        startTime: STATE.duration,
        _text: opts.text || null,
        _fontSize: opts.fontSize || 48,
        _fill: opts.fill || '#ffffff',
      };
      // Detect actual video duration if video type
      if (clip.type === 'video' && clip.src) {
        const tmp = document.createElement('video');
        tmp.preload = 'metadata';
        tmp.onloadedmetadata = () => {
          const d = tmp.duration;
          if (d && isFinite(d) && d > 0) { clip.duration = Math.min(d, 30); recalcDuration(); renderTimeline(); }
        };
        tmp.src = clip.src;
      }
      STATE.clips.push(clip);
      recalcDuration(); renderTimeline(); selectClip(clip.id);
      // Close drawer on mobile if open and AI gen was the source
      if (window.innerWidth <= 767 && drawerOpen) closeDrawer();
    }

    function addTextClip() {
      const label = prompt('Text:', 'Hello');
      if (!label) return;
      addClip({ type: 'text', label: label.slice(0, 30), text: label, fontSize: 48, fill: '#ffffff', duration: 4 });
    }

    function removeClip(id) {
      STATE.clips = STATE.clips.filter(c => c.id !== id);
      recalcDuration(); renderTimeline();
      if (!STATE.clips.length) { canvas.clear(); canvas.backgroundColor = '#1a1c26'; canvas.renderAll(); }
    }

    function selectClip(id) {
      STATE.clips.forEach(c => c._active = c.id === id);
      renderTimeline(); renderFrame();
    }

    function recalcDuration() {
      if (!STATE.clips.length) { STATE.duration = 10; return; }
      STATE.duration = Math.max(STATE.clips.reduce((m, c) => Math.max(m, c.startTime + c.duration), 0), 1);
    }

    // ────────────────────────────────────────────────────────────
    //  TIMELINE RENDER
    // ────────────────────────────────────────────────────────────
    function renderTimeline() {
      const container = document.getElementById('timelineClips');
      const empty = document.getElementById('tlEmpty');
      if (!STATE.clips.length) {
        container.innerHTML = ''; empty.style.display = 'flex';
        updateTimeDisplay(); renderRuler(); return;
      }
      empty.style.display = 'none';
      const px = (STATE.zoom / 100) * 80;
      const totalW = Math.max(STATE.duration, 1) * px;
      container.style.width = totalW + 'px';

      const colors = ['#7c3aed','#22d3ee','#f5c451','#f472b6','#4ade80','#fb923c','#818cf8','#34d399'];
      let html = '';
      STATE.clips.forEach((clip, i) => {
        const l = clip.startTime * px;
        const w = clip.duration * px;
        const c = colors[i % colors.length];
        let thumb = '';
        if ((clip.type==='image'||clip.type==='video') && clip.src)
          thumb = `<img class="thumb-el" src="${clip.src}" />`;
        html += `<div class="tl-clip${clip._active?' active':''}" data-id="${clip.id}"
          style="left:${l}px;width:${Math.max(w,22)}px;background:${c}22;border-color:${c}66;"
          onclick="selectClip('${clip.id}')">
          ${thumb}
          <span class="label">${esc(clip.label||clip.type)}</span>
          <span class="dur">${clip.duration.toFixed(1)}s</span>
          <div class="resize-handle left" data-id="${clip.id}" data-side="left"></div>
          <div class="resize-handle right" data-id="${clip.id}" data-side="right"></div>
          <div style="position:absolute;top:1px;right:3px;z-index:4;">
            <button class="del" data-id="${clip.id}" style="width:18px;height:18px;border-radius:50%;border:none;background:rgba(0,0,0,0.7);color:#fff;font-size:0.5rem;display:flex;align-items:center;justify-content:center;">✕</button>
          </div>
        </div>`;
      });
      container.innerHTML = html;

      // Wire delete buttons
      container.querySelectorAll('.del').forEach(b => {
        b.onclick = (e) => { e.stopPropagation(); removeClip(b.dataset.id); };
      });
      // Wire resize handles
      container.querySelectorAll('.resize-handle').forEach(h => {
        h.addEventListener('mousedown', onResizeStart);
        h.addEventListener('touchstart', onResizeStart, { passive: false });
      });

      autoScrollTimeline();
      updatePlayhead();
      updateTimeDisplay();
      renderRuler();
    }

    function renderRuler() {
      const ruler = document.getElementById('tlRuler');
      const px = (STATE.zoom / 100) * 80;
      const totalW = Math.max(STATE.duration, 1) * px;
      ruler.style.width = totalW + 'px'; ruler.innerHTML = '';
      const step = px >= 40 ? 1 : px >= 20 ? 2 : 5;
      for (let t = 0; t <= STATE.duration; t += step) {
        const x = t * px;
        const major = t % Math.max(step, 5) === 0;
        const tick = document.createElement('div');
        tick.className = 'tick' + (major ? ' major' : '');
        tick.style.left = x + 'px'; ruler.appendChild(tick);
        if (major) {
          const lbl = document.createElement('div');
          lbl.className = 'tick-label'; lbl.style.left = x + 'px';
          lbl.textContent = fmt(t); ruler.appendChild(lbl);
        }
      }
    }

    function updatePlayhead() {
      const px = (STATE.zoom / 100) * 80;
      document.getElementById('tlPlayhead').style.left = (STATE.playhead * px) + 'px';
    }

    function updateTimeDisplay() {
      document.getElementById('tlTimeDisplay').textContent = fmt(STATE.playhead) + ' / ' + fmt(STATE.duration);
      document.getElementById('tlDuration').textContent = fmt(STATE.duration);
      document.getElementById('objCount').textContent = STATE.clips.length + ' clips';
    }

    function autoScrollTimeline() {
      const tracks = document.getElementById('timelineTracks');
      const px = (STATE.zoom / 100) * 80;
      const ph = STATE.playhead * px;
      const vl = tracks.scrollLeft, vr = vl + tracks.clientWidth;
      if (ph > vr - 50) tracks.scrollLeft = ph - tracks.clientWidth * 0.3;
      else if (ph < vl + 30) tracks.scrollLeft = Math.max(0, ph - 30);
    }

    // ────────────────────────────────────────────────────────────
    //  TIMELINE TOUCH / MOUSE
    // ────────────────────────────────────────────────────────────
    // Seek
    function seekFromXY(clientX) {
      if (clientX == null) return;
      const tracks = document.getElementById('timelineTracks');
      const r = tracks.getBoundingClientRect();
      const x = clientX - r.left + tracks.scrollLeft;
      const px = (STATE.zoom / 100) * 80;
      STATE.playhead = Math.max(0, Math.min(STATE.duration, x / px));
      renderFrame(); updatePlayhead(); updateTimeDisplay();
    }

    document.getElementById('timelineTracks').addEventListener('click', (e) => {
      if (e.target.closest('.tl-clip')) return;
      seekFromXY(e.clientX);
    });
    document.getElementById('timelineTracks').addEventListener('touchstart', (e) => {
      if (e.target.closest('.tl-clip')) return;
      seekFromXY(e.touches[0].clientX);
    });

    // Resize
    let rez = null;
    function onResizeStart(e) {
      e.preventDefault(); e.stopPropagation();
      const h = e.currentTarget;
      const id = h.dataset.id, side = h.dataset.side;
      const clip = STATE.clips.find(c => c.id === id);
      if (!clip) return;
      const px = (STATE.zoom / 100) * 80;
      const sx = e.clientX || (e.touches && e.touches[0].clientX);
      if (sx == null) return;
      const oS = clip.startTime, oD = clip.duration;

      function move(ev) {
        const cx = ev.clientX || (ev.touches && ev.touches[0].clientX) || 0;
        const dx = (cx - sx) / px;
        if (side === 'left') {
          const ns = Math.max(0, oS + dx);
          clip.startTime = ns;
          clip.duration = Math.max(0.5, oD - (ns - oS));
        } else {
          clip.duration = Math.max(0.5, oD + dx);
        }
        recalcDuration(); renderTimeline();
      }

      function up() {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
        document.removeEventListener('touchmove', move);
        document.removeEventListener('touchend', up);
      }
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
      document.addEventListener('touchmove', move, { passive: false });
      document.addEventListener('touchend', up);
    }

    function setZoom(v) { STATE.zoom = v; renderTimeline(); }
    function clearTimeline() {
      if (!STATE.clips.length) return;
      if (!confirm('Clear all clips?')) return;
      STATE.clips = []; STATE.playhead = 0;
      recalcDuration(); renderTimeline();
      canvas.clear(); canvas.backgroundColor = '#1a1c26'; canvas.renderAll();
    }

    // ────────────────────────────────────────────────────────────
    //  PLAYBACK
    // ────────────────────────────────────────────────────────────
    function togglePlay() {
      STATE.playing ? pausePlay() : play();
    }

    function play() {
      if (!STATE.clips.length) return;
      if (STATE.playhead >= STATE.duration) STATE.playhead = 0;
      STATE.playing = true;
      document.getElementById('playBtn').textContent = '⏸';
      document.getElementById('playbackBadge').style.display = 'block';
      let last = performance.now(), acc = 0;
      const step = 1 / STATE.fps;

      function tick(now) {
        if (!STATE.playing) return;
        const dt = (now - last) / 1000; last = now; acc += dt;
        while (acc >= step) { acc -= step; STATE.playhead += step; if (STATE.playhead >= STATE.duration) { STATE.playhead = STATE.duration; pause(); renderFrame(); updatePlayhead(); updateTimeDisplay(); return; } }
        renderFrame(); updatePlayhead(); updateTimeDisplay(); autoScrollTimeline();
        animFrame = requestAnimationFrame(tick);
      }
      animFrame = requestAnimationFrame(tick);
    }

    function pause() {
      STATE.playing = false;
      document.getElementById('playBtn').textContent = '▶';
      document.getElementById('playbackBadge').style.display = 'none';
      if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    }

    function stopPlayback() { pause(); STATE.playhead = 0; renderFrame(); updatePlayhead(); updateTimeDisplay(); }

    // ────────────────────────────────────────────────────────────
    //  VIDEO FRAME RENDERING
    // ────────────────────────────────────────────────────────────
    const videoEls = {};

    function getOrCreateVideo(src) {
      if (videoEls[src]) return videoEls[src];
      const v = document.createElement('video');
      v.crossOrigin = 'anonymous';
      v.preload = 'auto';
      v.muted = true;
      v.playsInline = true;
      v.src = src;
      v.load();
      videoEls[src] = v;
      return v;
    }

    function renderFrame() {
      const t = STATE.playhead;
      const active = STATE.clips.filter(c => t >= c.startTime && t < c.startTime + c.duration);
      canvas.clear();
      canvas.backgroundColor = '#1a1c26';
      if (!active.length) { canvas.renderAll(); return; }

      active.forEach(clip => {
        const localT = t - clip.startTime;

        if ((clip.type === 'image') && clip.src) {
          if (imgCache[clip.src] instanceof HTMLImageElement && imgCache[clip.src].complete) {
            const img = new fabric.Image(imgCache[clip.src], { originX: 'center', originY: 'center', selectable: false, evented: false });
            const s = Math.min(canvas.width / imgCache[clip.src].naturalWidth * 0.92, canvas.height / imgCache[clip.src].naturalHeight * 0.92);
            img.set({ scaleX: s, scaleY: s, left: canvas.width/2, top: canvas.height/2 });
            canvas.add(img); canvas.renderAll();
          } else {
            fabric.Image.fromURL(clip.src, (img) => {
              if (!img) return;
              const s = Math.min(canvas.width / img.width * 0.92, canvas.height / img.height * 0.92);
              img.set({ scaleX: s, scaleY: s, left: canvas.width/2, top: canvas.height/2, originX: 'center', originY: 'center', selectable: false, evented: false });
              canvas.add(img); canvas.renderAll();
            }, { crossOrigin: 'anonymous' });
          }
        }

        if (clip.type === 'video' && clip.src) {
          const v = getOrCreateVideo(clip.src);
          // Seek to correct time
          try {
            if (Math.abs(v.currentTime - localT) > 0.1) {
              v.currentTime = localT;
            }
            if (v.readyState >= 2) {
              const img = new fabric.Image(v, { originX: 'center', originY: 'center', selectable: false, evented: false });
              const s = Math.min(canvas.width / (v.videoWidth||1920) * 0.92, canvas.height / (v.videoHeight||1080) * 0.92);
              img.set({ scaleX: s, scaleY: s, left: canvas.width/2, top: canvas.height/2 });
              canvas.add(img); canvas.renderAll();
            }
          } catch {}
        }

        if (clip.type === 'text') {
          const text = new fabric.IText(clip._text || clip.label, {
            left: canvas.width/2, top: canvas.height/2, fontSize: clip._fontSize||48,
            fill: clip._fill||'#ffffff', fontFamily: 'Inter, sans-serif', fontWeight: 700,
            originX: 'center', originY: 'center', textAlign: 'center', selectable: false, evented: false,
          });
          canvas.add(text); canvas.renderAll();
        }
      });
    }

    // Preload images
    function preloadImages() {
      const ps = [];
      STATE.clips.forEach(c => {
        if ((c.type==='image'||c.type==='video') && c.src && !imgCache[c.src]) {
          if (c.type === 'image') {
            ps.push(new Promise(res => {
              const i = new Image(); i.crossOrigin = 'anonymous';
              i.onload = () => { imgCache[c.src]=i; res(); };
              i.onerror = () => res(); i.src = c.src;
            }));
          }
        }
      });
      return Promise.allSettled(ps);
    }

    // ────────────────────────────────────────────────────────────
    //  AI IMAGE
    // ────────────────────────────────────────────────────────────
    async function generateImage() {
      const prompt = document.getElementById('aiImagePrompt').value.trim();
      if (!prompt) return toast('Enter a prompt');
      const idx = parseInt(document.getElementById('aiImageModel').value);
      if (isNaN(idx) || !availableModels[idx]) return toast('Select a model');
      const btn = document.getElementById('aiImageBtnText');
      btn.innerHTML = '<span class="spinner"></span>'; btn.style.pointerEvents = 'none';
      try {
        const r = await fetch('/api/ai/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: prompt, model: idx, session_id: 's-img-'+Date.now() }),
        });
        if (!r.ok) { const e = await r.json().catch(()=>{}); toast('Failed: ' + ((e&&e.error)||r.status)); return; }
        const d = await r.json();
        if (d.image) {
          const prev = document.getElementById('aiImagePreview');
          prev.src = d.image; prev.className = 'gen-preview show';
          addResult('aiImageResults', 'image', d.image, prompt);
          addClip({ type: 'image', src: d.image, label: prompt.slice(0, 28), duration: 4 });
          toast('Image added to timeline');
        } else toast('No image returned');
      } catch(e) { toast('Error: '+e.message); }
      finally { btn.textContent = 'Generate & Add to Timeline'; btn.style.pointerEvents = ''; }
    }

    // ────────────────────────────────────────────────────────────
    //  AI MUSIC
    // ────────────────────────────────────────────────────────────
    async function generateMusic() {
      const prompt = document.getElementById('aiMusicPrompt').value.trim();
      if (!prompt) return toast('Enter a prompt');
      const idx = parseInt(document.getElementById('aiMusicModel').value);
      if (isNaN(idx) || !availableModels[idx]) return toast('Select a model');
      const btn = document.getElementById('aiMusicBtnText');
      btn.innerHTML = '<span class="spinner"></span>'; btn.style.pointerEvents = 'none';
      try {
        const r = await fetch('/api/ai/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: prompt, model: idx, session_id: 's-mus-'+Date.now() }),
        });
        if (!r.ok) { const e = await r.json().catch(()=>{}); toast('Failed: ' + ((e&&e.error)||r.status)); return; }
        const d = await r.json();
        if (d.audio) {
          addResult('aiMusicResults', 'music', d.audio, prompt);
          addClip({ type: 'music', src: d.audio, label: prompt.slice(0, 28), duration: 10 });
          toast('Music added to timeline');
        } else toast('No audio returned');
      } catch(e) { toast('Error: '+e.message); }
      finally { btn.textContent = 'Generate & Add to Timeline'; btn.style.pointerEvents = ''; }
    }

    // ────────────────────────────────────────────────────────────
    //  AI VIDEO
    // ────────────────────────────────────────────────────────────
    async function generateVideo() {
      const prompt = document.getElementById('aiVideoPrompt').value.trim();
      if (!prompt) return toast('Enter a prompt');
      const idx = parseInt(document.getElementById('aiVideoModel').value);
      if (isNaN(idx) || !availableModels[idx]) return toast('Select a model');
      const btn = document.getElementById('aiVideoBtnText');
      btn.innerHTML = '<span class="spinner"></span>'; btn.style.pointerEvents = 'none';
      try {
        const r = await fetch('/api/ai/chat', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: prompt, model: idx, session_id: 's-vid-'+Date.now() }),
        });
        if (!r.ok) { const e = await r.json().catch(()=>{}); toast('Failed: ' + ((e&&e.error)||r.status)); return; }
        const d = await r.json();
        let videoUrl = null;
        if (d.pending && d.request_id) {
          toast('Video queued, waiting...');
          const res = await pollVideo(d.request_id, d.video_provider, d.job_path);
          if (res && res.video) videoUrl = res.video;
        } else if (d.video) videoUrl = d.video;
        if (videoUrl) {
          addResult('aiVideoResults', 'video', videoUrl, prompt);
          addClip({ type: 'video', src: videoUrl, label: prompt.slice(0, 28), duration: 5 });
          toast('Video added to timeline');
        } else toast('No video returned');
      } catch(e) { toast('Error: '+e.message); }
      finally { btn.textContent = 'Generate & Add to Timeline'; btn.style.pointerEvents = ''; }
    }

    async function pollVideo(reqId, prov, path) {
      for (let i = 0; i < 60; i++) {
        await new Promise(r => setTimeout(r, 5000));
        try {
          const c = new AbortController(); const t = setTimeout(() => c.abort(), 20000);
          const r = await fetch('/api/ai/chat', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action:'video_status', request_id:reqId, video_provider:prov||'huggingface', job_path:path||'', session_id:'s-poll' }),
            signal: c.signal,
          });
          clearTimeout(t);
          if (!r.ok) continue;
          const d = await r.json();
          if (!d.pending && d.video) return d;
        } catch {}
      }
      return null;
    }

    // ────────────────────────────────────────────────────────────
    //  RESULTS HELPER
    // ────────────────────────────────────────────────────────────
    function addResult(containerId, type, src, label) {
      const container = document.getElementById(containerId);
      const item = document.createElement('div'); item.className = 'item';
      if (type === 'image') {
        const i = document.createElement('img'); i.src = src; item.appendChild(i);
        item.onclick = () => addClip({ type:'image', src, label:(label||'').slice(0,28), duration:4 });
      } else if (type === 'music') {
        const a = document.createElement('audio'); a.src = src; a.controls = true; a.style.cssText = 'width:100%;margin-bottom:4px;';
        const b = document.createElement('button'); b.className = 'tool-btn'; b.textContent = '+ Add';
        b.onclick = () => addClip({ type:'music', src, label:(label||'').slice(0,28), duration:10 });
        item.style.cssText = 'grid-column:1/-1;padding:0.4rem;background:var(--surface2);border-radius:var(--radius-sm);';
        item.appendChild(a); item.appendChild(b);
      } else {
        const v = document.createElement('video'); v.src = src; v.muted = true; v.loop = true;
        v.style.cssText = 'width:100%;aspect-ratio:16/9;'; item.appendChild(v); v.play().catch(()=>{});
        item.onclick = () => addClip({ type:'video', src, label:(label||'').slice(0,28), duration:5 });
      }
      container.insertBefore(item, container.firstChild);
    }

    // ────────────────────────────────────────────────────────────
    //  USER MEDIA
    // ────────────────────────────────────────────────────────────
    async function loadUserMedia() {
      const c = document.getElementById('mediaBrowserList');
      c.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--dim);font-size:0.7rem;"><span class="spinner"></span></div>';
      try {
        const s = JSON.parse(localStorage.getItem('fas_user')||'null');
        const u = s && s.username;
        if (!u) { c.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--dim);font-size:0.7rem;">Log in to see media</div>'; return; }
        const r = await fetch('/api/media/list?username='+encodeURIComponent(u));
        if (!r.ok) throw Error();
        const items = await r.json();
        c.innerHTML = '';
        if (!items||!items.length) { c.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--dim);font-size:0.7rem;">No media</div>'; return; }
        items.forEach(item => {
          const el = document.createElement('div'); el.className = 'item';
          const isImg = item.content_type && item.content_type.startsWith('image/');
          const isVid = item.content_type && item.content_type.startsWith('video/');
          const url = item.public_url || item.url;
          if (isImg) { const i = document.createElement('img'); i.src = url; el.appendChild(i); }
          else if (isVid) { const v = document.createElement('video'); v.src = url; v.muted = true; el.appendChild(v); }
          else { el.textContent = '🎵'; el.style.cssText = 'display:flex;align-items:center;justify-content:center;font-size:1.3rem;'; }
          el.onclick = () => { addClip({ type: isImg?'image':isVid?'video':'music', src:url, label:item.filename||'Media', duration: isVid?6:isImg?4:10 }); toast('Added to timeline!'); if (window.innerWidth<=767) closeDrawer(); };
          c.appendChild(el);
        });
      } catch { c.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--dim);font-size:0.7rem;">Error loading</div>'; }
    }

    // ────────────────────────────────────────────────────────────
    //  EXPORT
    // ────────────────────────────────────────────────────────────
    function exportVideo() {
      if (!STATE.clips.length) return toast('Add clips first');
      document.getElementById('exportModal').classList.add('open');
      document.getElementById('exportProgress').className = 'export-progress';
      document.getElementById('exportProgressFill').style.width = '0%';
      document.getElementById('exportProgressText').textContent = 'Ready';
      document.getElementById('exportBtn').disabled = false;
    }

    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    async function startExport() {
      const btn = document.getElementById('exportBtn');
      btn.disabled = true;
      const fps = parseInt(document.getElementById('exportFps').value) || 24;
      const quality = parseFloat(document.getElementById('exportQuality').value) || 1;
      const totalFrames = Math.ceil(STATE.duration * fps);
      const fill = document.getElementById('exportProgressFill');
      const txt = document.getElementById('exportProgressText');
      document.getElementById('exportProgress').className = 'export-progress show';

      // Preload images
      txt.textContent = 'Preloading...';
      await preloadImages();

      // Setup recorder
      const stream = canvasEl.captureStream(fps);
      const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
      const mr = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: Math.round(quality * 5000000) });
      const chunks = [];
      mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      const done = new Promise(res => { mr.onstop = () => res(new Blob(chunks, { type: 'video/webm' })); });

      mr.start();
      const origPH = STATE.playhead;
      STATE.playhead = 0;
      const step = 1 / fps;

      for (let f = 0; f <= totalFrames; f++) {
        STATE.playhead = Math.min(f * step, STATE.duration);
        renderFrame();
        // Wait for async renders to catch up
        await new Promise(r => setTimeout(r, 1000 / fps / 3));
        if (f % 5 === 0) {
          const pct = Math.min(100, (f / totalFrames) * 100);
          fill.style.width = pct + '%';
          txt.textContent = `Frame ${f}/${totalFrames} (${Math.round(pct)}%)`;
        }
      }

      mr.stop();
      txt.textContent = 'Finalizing...';

      STATE.exportedBlob = await done;
      STATE.exportedVideoURL = URL.createObjectURL(STATE.exportedBlob);

      STATE.playhead = origPH;
      renderFrame(); updatePlayhead(); updateTimeDisplay();

      const a = document.createElement('a');
      a.href = STATE.exportedVideoURL; a.download = 'studio-'+Date.now()+'.webm';
      a.click();

      fill.style.width = '100%';
      txt.textContent = '✅ Done! Video downloaded.';
      btn.disabled = false;
      toast('Exported!');
    }

    // ────────────────────────────────────────────────────────────
    //  SAVE TO MEDIA
    // ────────────────────────────────────────────────────────────
    async function saveToMedia() {
      if (STATE.exportedBlob) {
        await saveBlob(STATE.exportedBlob, 'studio-'+Date.now()+'.webm', 'video/webm'); return;
      }
      const d = canvas.toDataURL({ format:'png', multiplier:2 });
      const b64 = d.split(',')[1];
      const body = { data:b64, filename:'studio-'+Date.now()+'.png', contentType:'image/png' };
      const s = JSON.parse(localStorage.getItem('fas_user')||'null');
      if (s&&s.username) body.username = s.username;
      try {
        const r = await fetch('/api/media/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        if (!r.ok) throw Error(); toast('Saved!');
      } catch { toast('Save failed'); }
    }

    async function saveBlob(blob, name, type) {
      const r = new FileReader();
      const b64 = await new Promise(res => { r.onload = () => res(r.result.split(',')[1]); r.readAsDataURL(blob); });
      const body = { data:b64, filename:name, contentType:type };
      const s = JSON.parse(localStorage.getItem('fas_user')||'null');
      if (s&&s.username) body.username = s.username;
      try {
        const r2 = await fetch('/api/media/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
        if (!r2.ok) throw Error(); toast('Saved to My Media!');
      } catch { toast('Save failed'); }
    }

    // ────────────────────────────────────────────────────────────
    //  POST TO DIRECTORY
    // ────────────────────────────────────────────────────────────
    async function postToDirectory() {
      const s = JSON.parse(localStorage.getItem('fas_user')||'null');
      if (!s||!s.username) return toast('Log in first');
      if (!STATE.exportedBlob) {
        if (STATE.clips.length) { toast('Export first, then post'); exportVideo(); return; }
        return toast('Create something first');
      }
      document.getElementById('postModal').classList.add('open');
      document.getElementById('postProgress').className = 'export-progress';
      document.getElementById('postProgressFill').style.width = '0%';
      document.getElementById('postProgressText').textContent = 'Ready';
      document.getElementById('postBtn').disabled = false;
      const prev = document.getElementById('postVideoPreview');
      prev.src = STATE.exportedVideoURL;
      document.getElementById('postPreview').style.display = 'block';
    }

    async function confirmPost() {
      const session = JSON.parse(localStorage.getItem('fas_user')||'null');
      if (!session||!session.username) return toast('Log in');
      const btn = document.getElementById('postBtn'); btn.disabled = true;
      const fill = document.getElementById('postProgressFill');
      const txt = document.getElementById('postProgressText');
      document.getElementById('postProgress').className = 'export-progress show';
      try {
        let mediaUrl = null;
        if (STATE.exportedBlob) {
          txt.textContent = 'Uploading video...';
          fill.style.width = '30%';
          const r = new FileReader();
          const b64 = await new Promise(res => { r.onload = () => res(r.result.split(',')[1]); r.readAsDataURL(STATE.exportedBlob); });
          const body = { data:b64, filename:'post-'+Date.now()+'.webm', contentType:'video/webm' };
          if (session.username) body.username = session.username;
          const r2 = await fetch('/api/media/save', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
          if (r2.ok) { const saved = await r2.json(); mediaUrl = saved.public_url || saved.url || null; }
          fill.style.width = '60%';
        }
        txt.textContent = 'Posting to directory...';
        const caption = document.getElementById('postCaption').value.trim() || 'Posted from Studio';
        const SUPABASE_URL = localStorage.getItem('fas_supabase_url') || 'https://ghufaozjwondqcrcucjs.supabase.co';
        const SUPABASE_ANON_KEY = localStorage.getItem('fas_supabase_anon_key') || '';
        const payload = { author_username:String(session.username).toLowerCase(), post_type:'video', category:'video', body_text:caption, media_url:mediaUrl, moderation_state:'approved', visibility:'public' };
        let ok = false;
        const r = await fetch(SUPABASE_URL+'/rest/v1/signal_posts', {
          method:'POST', headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
          body:JSON.stringify(payload),
        });
        if (r.ok) ok = true;
        else {
          const r2 = await fetch(SUPABASE_URL+'/rest/v1/board_posts', {
            method:'POST', headers:{'apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json','Prefer':'return=representation'},
            body:JSON.stringify({ username:String(session.username).toLowerCase(), post_text:caption, category:'video', image_url:mediaUrl, is_approved:true, visibility_status:'visible' }),
          });
          if (r2.ok) ok = true;
        }
        if (ok) { fill.style.width = '100%'; txt.textContent = '✅ Posted!'; toast('Posted to directory!'); setTimeout(()=>closeModal('postModal'), 1500); }
        else throw Error('Post failed');
      } catch(e) { txt.textContent = '❌ '+e.message; toast('Post failed'); }
      finally { btn.disabled = false; }
    }

    // ────────────────────────────────────────────────────────────
    //  UTILS
    // ────────────────────────────────────────────────────────────
    function fmt(s) { const m = Math.floor(s/60), sec = Math.floor(s%60); return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function toast(msg) {
      const el = document.getElementById('toast'); el.textContent = msg; el.style.display = 'block';
      clearTimeout(el._h); el._h = setTimeout(() => { el.style.display = 'none'; }, 2500);
    }

    // Delete key
    document.addEventListener('keydown', (e) => {
      if ((e.key === 'Delete'||e.key==='Backspace') && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
        const act = canvas.getActiveObject();
        if (act) {
          if (act.type === 'activeSelection') act.forEachObject(o => canvas.remove(o));
          else canvas.remove(act);
          canvas.discardActiveObject(); canvas.renderAll(); return;
        }
        const sel = STATE.clips.find(c => c._active);
        if (sel) removeClip(sel.id);
      }
      if (e.key === ' ') { e.preventDefault(); togglePlay(); }
      if (e.key === 'Escape') { canvas.discardActiveObject(); canvas.renderAll(); closeDrawer(); }
    });

    // ────────────────────────────────────────────────────────────
    //  INIT
    // ────────────────────────────────────────────────────────────
    renderMediaPool();
    renderTimeline();
    updateTimeDisplay();
    fitCanvas();
    console.log('Studio ready');
  </script>
</body>
