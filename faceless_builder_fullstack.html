  <script type="module">
    import { openMediaPicker } from './assets/js/media-picker.js';

    // Hide topbar if loaded in an iframe (dashboard shell)
    if (window.self !== window.top) {
      const topbar = document.getElementById('topbar');
      if (topbar) topbar.style.display = 'none';
      document.body.style.background = 'transparent';
    }

    // Minimal builder logic (no Supabase, just local editing)
    let editor = null;
    function initEditor() {
      editor = grapesjs.init({
        container: '#editor',
        height: '60vh',
        storageManager: false,
        blockManager: { appendTo: null },
      });

      // Add Insert Image button logic
      const insertImageBtn = document.getElementById('insertImageBtn');
      if (insertImageBtn) {
        insertImageBtn.onclick = () => {
          openMediaPicker({
            onSelect: (media) => {
              if (!media || !media.url) return;
              // Insert image at current selection or as a new block
              const imageComponent = editor.addComponents({
                type: 'image',
                src: media.url,
                alt: media.alt || '',
                style: 'max-width:100%;height:auto;border-radius:0.5em;box-shadow:0 2px 8px rgba(0,0,0,0.07);margin:0.5em auto;display:block;'
              });
              if (imageComponent && imageComponent.length && editor.select) {
                editor.select(imageComponent[0]);
              }
            }
          });
        };
      }
    }

    document.getElementById('saveBtn').onclick = function() {
      if (!editor) initEditor();
      const html = editor.getHtml();
      const css = editor.getCss();
      let fasUser = null;
      try { fasUser = JSON.parse(localStorage.getItem('fas_user')); } catch(e) {}
      const data = {
        html,
        css,
        updated_at: new Date().toISOString(),
        account_id: fasUser && fasUser.account_id ? fasUser.account_id : null,
        signal_id: fasUser && fasUser.signal_id ? fasUser.signal_id : null,
        username: fasUser && fasUser.username ? fasUser.username : null
      };
      localStorage.setItem('faceless-builder-project', JSON.stringify(data));
      alert('Page saved locally!');
    };
    document.getElementById('loadBtn').onclick = function() {
      if (!editor) initEditor();
      const raw = localStorage.getItem('faceless-builder-project');
      if (!raw) return alert('No local project found');
      const data = JSON.parse(raw);
      editor.setComponents(data.html);
      editor.setStyle(data.css);
      alert('Loaded from local storage!');
    };
    initEditor();

    // --- Page state and actions (save, publish, etc.) ---
    let pageState = {
      is_published: false,
      slug: '',
      updated_at: null
    };

    function updatePageStatusUI() {
      const statusEl = document.getElementById('pageStatus');
      const viewBtn = document.getElementById('viewLivePageBtn');
      if (pageState.is_published) {
        statusEl.textContent = 'Published';
        statusEl.style.color = '#22c55e';
        viewBtn.disabled = false;
        viewBtn.textContent = 'View Live Page';
      } else {
        statusEl.textContent = 'Draft';
        statusEl.style.color = 'var(--gold-bright)';
        viewBtn.disabled = true;
        viewBtn.textContent = 'Publish first';
      }
    }

    document.getElementById('saveDraftBtn').onclick = async () => {
      if (!editor) initEditor();
      const fasUser = JSON.parse(localStorage.getItem('fas_user') || 'null');
      const html = editor.getHtml();
      const css = editor.getCss();
      const slug = document.getElementById('pageSlug').value.trim();
      const title = document.getElementById('pageTitle').value.trim();
      const data = {
        html, css, title, slug,
        is_published: false,
        updated_at: new Date().toISOString(),
        account_id: fasUser && fasUser.account_id ? fasUser.account_id : null,
        signal_id: fasUser && fasUser.signal_id ? fasUser.signal_id : null,
        username: fasUser && fasUser.username ? fasUser.username : null
      };
      localStorage.setItem('faceless-builder-project', JSON.stringify(data));
      pageState = { is_published: false, slug, updated_at: data.updated_at };
      updatePageStatusUI();
      alert('Draft saved!');
    };

    document.getElementById('publishPageBtn').onclick = async () => {
      if (!editor) initEditor();
      const fasUser = JSON.parse(localStorage.getItem('fas_user') || 'null');
      const html = editor.getHtml();
      const css = editor.getCss();
      const slug = document.getElementById('pageSlug').value.trim();
      const title = document.getElementById('pageTitle').value.trim();
      const data = {
        html, css, title, slug,
        is_published: true,
        updated_at: new Date().toISOString(),
        account_id: fasUser && fasUser.account_id ? fasUser.account_id : null,
        signal_id: fasUser && fasUser.signal_id ? fasUser.signal_id : null,
        username: fasUser && fasUser.username ? fasUser.username : null
      };
      localStorage.setItem('faceless-builder-project', JSON.stringify(data));
      pageState = { is_published: true, slug, updated_at: data.updated_at };
      updatePageStatusUI();
      alert('Page published!');
    };

    document.getElementById('unpublishPageBtn').onclick = async () => {
      const raw = localStorage.getItem('faceless-builder-project');
      if (!raw) return alert('No project found');
      const data = JSON.parse(raw);
      data.is_published = false;
      data.updated_at = new Date().toISOString();
      localStorage.setItem('faceless-builder-project', JSON.stringify(data));
      pageState = { is_published: false, slug: data.slug, updated_at: data.updated_at };
      updatePageStatusUI();
      alert('Page unpublished.');
    };

    document.getElementById('viewLivePageBtn').onclick = () => {
      if (!pageState.is_published) return;
      const fasUser = JSON.parse(localStorage.getItem('fas_user') || 'null');
      if (!fasUser || !fasUser.account_id) {
        window.location.replace('login.html');
        return;
      }
      const publicHandle = fasUser.username || fasUser.signal_id;
      let url = `/${publicHandle}`;
      if (pageState.slug) url = `/${publicHandle}/${pageState.slug}`;
      window.open(url, '_blank');
    };

    function loadPageStateFromStorage() {
      const raw = localStorage.getItem('faceless-builder-project');
      if (!raw) return;
      const data = JSON.parse(raw);
      pageState = {
        is_published: !!data.is_published,
        slug: data.slug || '',
        updated_at: data.updated_at || null
      };
      updatePageStatusUI();
    }
