  <script>
    // Member session bootstrap: only allow access if fas_user exists and is valid
    if (!window.sessionBootstrap || !window.sessionBootstrap()) {
      // sessionBootstrap() will redirect if not valid
      throw new Error('Not signed in');
    }
  </script>


<div id="topbar">
  <button id="saveBtn">Save</button>
  <button id="loadBtn">Load</button>
</div>
<div id="editor"></div>

<script>
async function bootApp() {
  try {
    await window.loadSupabase;

    // --- Automated Supabase config ---
    let supabaseUrl = "https://YOUR_PROJECT.supabase.co";
    let supabaseKey = "YOUR_ANON_KEY";
    if (window.__FAS_CONFIG && window.__FAS_CONFIG.ready) {
      supabaseUrl = window.__FAS_CONFIG.supabaseUrl;
      supabaseKey = window.__FAS_CONFIG.supabaseAnonKey;
    }
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const editor = grapesjs.init({
      container: '#editor',
      height: '100%',
      storageManager: false
    });

    let currentId = null;

    async function savePage() {
      const data = {
        id: currentId,
        project_data: editor.getProjectData(),
        html: editor.getHtml(),
        css: editor.getCss()
      };
      const { data: res, error } = await supabase
        .from('builder_pages')
        .upsert(data)
        .select()
        .single();
      if (error) return alert("Save failed");
      currentId = res.id;
      alert("Saved");
    }

    async function loadPage() {
      const { data, error } = await supabase
        .from('builder_pages')
        .select('*')
        .limit(1)
        .single();
      if (error) return alert("Load failed");
      currentId = data.id;
      editor.loadProjectData(data.project_data);
    }

    // Helper: Show SQL to create builder_pages table
    window.showTableSQL = function() {
      const sql = `create table builder_pages (\n  id uuid primary key default gen_random_uuid(),\n  project_data jsonb,\n  html text,\n  css text,\n  created_at timestamptz default now()\n);`;
      prompt("Run this SQL in Supabase SQL editor to create the table:", sql);
    };

    document.getElementById('saveBtn').onclick = savePage;
    document.getElementById('loadBtn').onclick = loadPage;

    // Optionally, auto-load on boot
    // await loadPage();

    console.log('Supabase ready:', !!supabase);
  } catch (err) {
    console.error(err);
    alert('Supabase failed to load');
  }
}

bootApp();
</script>
