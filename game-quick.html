<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Quick Tap — Faceless Animal Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #070010;
      --purple: #7c3aed;
      --bright: #a78bfa;
      --gold:   #d4af37;
      --green:  #4ade80;
      --text:   #f0eeff;
      --sub:    rgba(240,238,255,0.55);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    /* ── Nav ── */
    .g-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.4);
      flex-shrink: 0;
    }
    .g-nav-logo { font-size: 0.78rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: var(--bright); text-decoration: none; }
    .g-nav-logo span { color: var(--gold); }
    .g-nav-back { font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.35); text-decoration: none; letter-spacing: 0.04em; }
    .g-nav-back:hover { color: var(--bright); }
    .g-free-tag { font-size: 0.6rem; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.25); border-radius: 20px; padding: 0.2rem 0.6rem; }

    /* ── Game area ── */
    .g-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* ── Screens ── */
    .g-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.75rem;
      max-width: 360px;
      width: 100%;
    }
    .g-screen-eyebrow { font-size: 0.64rem; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: var(--bright); }
    .g-screen-title { font-size: 2.8rem; font-weight: 900; line-height: 1; }
    .g-screen-title em { color: var(--bright); font-style: normal; }
    .g-screen-sub { font-size: 0.9rem; color: var(--sub); line-height: 1.7; }
    .g-screen-stat { font-size: 3.5rem; font-weight: 900; color: var(--bright); line-height: 1; }
    .g-screen-stat-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.35); }

    /* ── Buttons ── */
    .g-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.9rem 2.25rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: transform 0.08s, opacity 0.1s;
      text-decoration: none;
    }
    .g-btn:active { transform: scale(0.95); }
    .g-btn--primary { background: var(--purple); color: #fff; }
    .g-btn--primary:hover { background: var(--bright); }
    .g-btn--ghost { background: rgba(255,255,255,0.07); color: var(--text); border: 1px solid rgba(255,255,255,0.12); }
    .g-btn--ghost:hover { background: rgba(255,255,255,0.12); }

    /* ── HUD ── */
    .g-hud {
      position: absolute;
      top: 1rem;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 2.5rem;
    }
    .g-hud-item { text-align: center; }
    .g-hud-label { font-size: 0.56rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.3); display: block; }
    .g-hud-value { font-size: 1.1rem; font-weight: 900; color: var(--text); line-height: 1; }

    /* ── Target ── */
    #tap-target {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #a78bfa, #7c3aed);
      box-shadow: 0 0 40px rgba(139,92,246,0.6), 0 0 80px rgba(139,92,246,0.2);
      cursor: pointer;
      transition: transform 0.05s;
      display: none;
    }
    #tap-target:active { transform: scale(0.88); }
    #tap-target.variant-gold {
      background: radial-gradient(circle at 35% 35%, #fbbf24, #d4af37);
      box-shadow: 0 0 40px rgba(212,175,55,0.6), 0 0 80px rgba(212,175,55,0.2);
    }
    #tap-target.variant-green {
      background: radial-gradient(circle at 35% 35%, #4ade80, #16a34a);
      box-shadow: 0 0 40px rgba(74,222,128,0.6), 0 0 80px rgba(74,222,128,0.2);
    }

    /* ── Countdown pulse ── */
    #countdown-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5rem;
      font-weight: 900;
      color: var(--bright);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    /* ── Result flash ── */
    #result-flash {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.2rem;
      font-weight: 900;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    /* ── Leaderboard list ── */
    .g-result-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      width: 100%;
      max-width: 280px;
    }
    .g-result-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.75rem;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      font-size: 0.82rem;
    }
    .g-result-round { color: rgba(255,255,255,0.4); font-size: 0.72rem; }
    .g-result-time { font-weight: 800; color: var(--bright); }
  </style>
</head>
<body>

  <nav class="g-nav" role="banner">
    <a href="games.html" class="g-nav-back">← Games</a>
    <span class="g-free-tag">Free to Play</span>
    <a href="index.html" class="g-nav-logo">FA <span>Studios</span></a>
  </nav>

  <div class="g-wrap" id="g-wrap">

    <!-- HUD (hidden until game starts) -->
    <div class="g-hud" id="g-hud" style="display:none;" role="status" aria-live="polite">
      <div class="g-hud-item">
        <span class="g-hud-label">Round</span>
        <span class="g-hud-value" id="hud-round">1 / 5</span>
      </div>
      <div class="g-hud-item">
        <span class="g-hud-label">Best</span>
        <span class="g-hud-value" id="hud-best" style="color:var(--gold);">—</span>
      </div>
    </div>

    <!-- Target -->
    <div id="tap-target" aria-label="Tap this!" role="button" tabindex="0"></div>

    <!-- Countdown text -->
    <div id="countdown-ring" aria-hidden="true"></div>

    <!-- Flash feedback -->
    <div id="result-flash" aria-hidden="true"></div>

    <!-- Start screen -->
    <div class="g-screen" id="screen-start">
      <p class="g-screen-eyebrow">Free Game · No Login</p>
      <h1 class="g-screen-title">Quick<br /><em>Tap.</em></h1>
      <p class="g-screen-sub">When the circle appears — tap it as fast as you can. 5 rounds. We track your reaction time. No excuses.</p>
      <button class="g-btn g-btn--primary" id="btn-start">Start →</button>
      <a href="games.html" class="g-btn g-btn--ghost">← Back</a>
    </div>

    <!-- Game over screen (injected by JS) -->
    <div class="g-screen" id="screen-over" style="display:none;"></div>

    <!-- Waiting state text -->
    <p id="wait-text" style="display:none;font-size:1rem;color:var(--sub);letter-spacing:0.04em;">Get ready…</p>

  </div>

  <script>
    (function () {
      var ROUNDS    = 5;
      var round     = 0;
      var times     = [];
      var waiting   = false;
      var waitTimer = null;

      var wrap     = document.getElementById('g-wrap');
      var hud      = document.getElementById('g-hud');
      var target   = document.getElementById('tap-target');
      var hudRound = document.getElementById('hud-round');
      var hudBest  = document.getElementById('hud-best');
      var screenStart = document.getElementById('screen-start');
      var screenOver  = document.getElementById('screen-over');
      var waitText    = document.getElementById('wait-text');
      var flashEl     = document.getElementById('result-flash');
      var countEl     = document.getElementById('countdown-ring');

      var tapStart = 0;
      var COLORS   = ['', 'variant-gold', 'variant-green'];

      function randomPos(r) {
        var W = wrap.clientWidth,  H = wrap.clientHeight;
        var minX = r + 10, minY = r + 60;
        var maxX = W - r - 10, maxY = H - r - 10;
        return {
          x: minX + Math.random() * (maxX - minX),
          y: minY + Math.random() * (maxY - minY)
        };
      }

      function showTarget() {
        waiting = false;
        waitText.style.display = 'none';

        var r = Math.min(wrap.clientWidth, wrap.clientHeight) * 0.12;
        r = Math.max(32, Math.min(r, 56));
        var pos = randomPos(r);

        target.style.width  = (r * 2) + 'px';
        target.style.height = (r * 2) + 'px';
        target.style.left   = (pos.x - r) + 'px';
        target.style.top    = (pos.y - r) + 'px';
        target.className = COLORS[Math.floor(Math.random() * COLORS.length)];
        target.style.display = 'block';
        tapStart = performance.now();
      }

      function scheduleTarget() {
        waiting = true;
        waitText.style.display = 'block';
        waitText.textContent = 'Get ready…';
        var delay = 1000 + Math.random() * 2500;
        waitTimer = setTimeout(showTarget, delay);
      }

      function flash(text, color) {
        flashEl.textContent = text;
        flashEl.style.color = color;
        flashEl.style.opacity = '1';
        setTimeout(function() { flashEl.style.opacity = '0'; }, 600);
      }

      function updateHud() {
        hudRound.textContent = (round + 1) + ' / ' + ROUNDS;
        var best = times.length ? Math.min.apply(null, times) : null;
        hudBest.textContent  = best ? best + 'ms' : '—';
      }

      function showGameOver() {
        target.style.display = 'none';
        hud.style.display    = 'none';
        waitText.style.display = 'none';

        var avg  = Math.round(times.reduce(function(a,b){return a+b;},0) / times.length);
        var best = Math.min.apply(null, times);

        var grade = avg < 220 ? '🔥 Lightning' : avg < 320 ? '⚡ Fast' : avg < 450 ? '👍 Solid' : '🐢 Keep Going';

        var rows = times.map(function(t, i) {
          return '<div class="g-result-row"><span class="g-result-round">Round ' + (i+1) + '</span><span class="g-result-time">' + t + 'ms</span></div>';
        }).join('');

        screenOver.innerHTML =
          '<p class="g-screen-eyebrow">Quick Tap · Result</p>' +
          '<h2 class="g-screen-title" style="font-size:2rem;">' + grade + '</h2>' +
          '<div><p class="g-screen-stat-label">Average</p><p class="g-screen-stat">' + avg + '<span style="font-size:1.5rem;">ms</span></p></div>' +
          '<p style="font-size:0.78rem;color:rgba(255,255,255,0.35);">Best round: ' + best + 'ms</p>' +
          '<div class="g-result-list">' + rows + '</div>' +
          '<button class="g-btn g-btn--primary" id="btn-replay">Play Again →</button>' +
          '<a href="games.html" class="g-btn g-btn--ghost">← All Games</a>' +
          '<div style="padding:1rem;background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.2);border-radius:10px;max-width:280px;">' +
          '<p style="font-size:0.72rem;color:rgba(255,255,255,0.5);margin-bottom:0.5rem;letter-spacing:0.06em;text-transform:uppercase;font-weight:800;">Want harder games?</p>' +
          '<p style="font-size:0.8rem;color:rgba(255,255,255,0.65);margin-bottom:0.75rem;line-height:1.6;">Beat Tap and more are waiting behind a platform membership.</p>' +
          '<a href="pricing.html" class="g-btn g-btn--primary" style="padding:0.65rem 1.5rem;font-size:0.8rem;width:100%;">Buy Now →</a>' +
          '</div>';

        screenOver.style.display = 'flex';
        document.getElementById('btn-replay') && document.getElementById('btn-replay').addEventListener('click', startGame);
      }

      target.addEventListener('click', onTap);
      target.addEventListener('touchend', function(e) { e.preventDefault(); onTap(); }, { passive: false });
      target.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.key === ' ') onTap(); });

      function onTap() {
        if (target.style.display === 'none') return;
        var ms = Math.round(performance.now() - tapStart);
        times.push(ms);
        target.style.display = 'none';
        flash(ms + 'ms', ms < 250 ? '#4ade80' : ms < 400 ? '#fbbf24' : '#f87171');
        round++;
        if (round >= ROUNDS) {
          setTimeout(showGameOver, 500);
        } else {
          updateHud();
          setTimeout(scheduleTarget, 800);
        }
      }

      function startGame() {
        round  = 0;
        times  = [];
        screenStart.style.display = 'none';
        screenOver.style.display  = 'none';
        target.style.display = 'none';
        hud.style.display = 'flex';
        updateHud();

        var count = 3;
        countEl.textContent = count;
        countEl.style.opacity = '1';
        var ci = setInterval(function() {
          count--;
          if (count > 0) {
            countEl.textContent = count;
          } else {
            countEl.style.opacity = '0';
            countEl.textContent = '';
            clearInterval(ci);
            scheduleTarget();
          }
        }, 800);
      }

      document.getElementById('btn-start').addEventListener('click', startGame);

    }());
  </script>
</body>
</html>
