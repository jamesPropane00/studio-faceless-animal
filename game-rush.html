<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Number Rush — Faceless Animal Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070010; --purple: #7c3aed; --bright: #a78bfa;
      --gold: #d4af37; --green: #4ade80; --red: #f87171;
      --text: #f0eeff; --sub: rgba(240,238,255,0.55);
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; min-height: 100dvh;
      display: flex; flex-direction: column;
      user-select: none; -webkit-user-select: none; touch-action: manipulation;
    }
    .g-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.4); flex-shrink: 0;
    }
    .g-nav-logo { font-size: 0.78rem; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: var(--bright); text-decoration: none; }
    .g-nav-logo span { color: var(--gold); }
    .g-nav-back { font-size: 0.72rem; font-weight: 700; color: rgba(255,255,255,0.35); text-decoration: none; }
    .g-nav-back:hover { color: var(--bright); }
    .g-free-tag { font-size: 0.6rem; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.25); border-radius: 20px; padding: 0.2rem 0.6rem; }

    .g-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 1rem 1rem 2rem; }

    .g-screen { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.85rem; max-width: 400px; width: 100%; margin: auto; }
    .g-eyebrow { font-size: 0.64rem; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; color: var(--bright); }
    .g-title { font-size: 2.8rem; font-weight: 900; line-height: 1; }
    .g-title em { color: var(--bright); font-style: normal; }
    .g-sub { font-size: 0.9rem; color: var(--sub); line-height: 1.7; }
    .g-btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.9rem 2.25rem; border-radius: 10px;
      font-size: 0.9rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; border: none; font-family: inherit;
      transition: transform 0.08s; text-decoration: none;
    }
    .g-btn:active { transform: scale(0.95); }
    .g-btn--primary { background: var(--purple); color: #fff; }
    .g-btn--primary:hover { background: var(--bright); }
    .g-btn--ghost { background: rgba(255,255,255,0.07); color: var(--text); border: 1px solid rgba(255,255,255,0.12); }

    /* HUD bar */
    .g-hud { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; padding: 0.75rem 0; width: 100%; max-width: 400px; }
    .g-hud-item { text-align: center; }
    .g-hud-label { font-size: 0.56rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.3); display: block; }
    .g-hud-value { font-size: 1.1rem; font-weight: 900; color: var(--text); }
    .g-hud-value.warn { color: var(--red); animation: blink 0.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }

    /* Grid */
    #num-grid {
      display: grid;
      gap: 0.5rem;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }
    .num-btn {
      aspect-ratio: 1;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 900;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s, border-color 0.1s, transform 0.06s;
      display: flex; align-items: center; justify-content: center;
    }
    .num-btn:hover { background: rgba(139,92,246,0.15); border-color: rgba(139,92,246,0.4); }
    .num-btn:active { transform: scale(0.9); }
    .num-btn--next  { background: rgba(74,222,128,0.15); border-color: var(--green); color: var(--green); }
    .num-btn--hit   { background: rgba(74,222,128,0.08); border-color: rgba(74,222,128,0.15); color: rgba(74,222,128,0.25); cursor: default; }
    .num-btn--wrong { background: rgba(248,113,113,0.15); border-color: var(--red); animation: shake 0.25s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)} }
    .num-btn:disabled { cursor: default; }

    .next-label { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    #next-num { font-size: 1.4rem; font-weight: 900; color: var(--green); }
    .g-score-big { font-size: 4rem; font-weight: 900; color: var(--bright); line-height: 1; }
    .g-score-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

  <nav class="g-nav" role="banner">
    <a href="games.html" class="g-nav-back">← Games</a>
    <span class="g-free-tag">Free to Play</span>
    <a href="index.html" class="g-nav-logo">FA <span>Studios</span></a>
  </nav>

  <div class="g-wrap">

    <div class="g-screen" id="screen-start">
      <p class="g-eyebrow">Free Game · No Login</p>
      <h1 class="g-title">Number<br /><em>Rush.</em></h1>
      <p class="g-sub">Numbers 1–25 scattered on screen. Click them in order — as fast as possible. One mistake adds time. Beat your best.</p>
      <button class="g-btn g-btn--primary" id="btn-start">Start →</button>
      <a href="games.html" class="g-btn g-btn--ghost">← Back</a>
    </div>

    <div id="game-ui" style="display:none;width:100%;flex-direction:column;align-items:center;gap:0.75rem;">
      <div class="g-hud" role="status" aria-live="polite">
        <div class="g-hud-item">
          <span class="g-hud-label">Time</span>
          <span class="g-hud-value" id="hud-time">0.0s</span>
        </div>
        <div class="g-hud-item">
          <span class="g-hud-label">Next</span>
          <span id="next-num" class="g-hud-value" style="color:var(--green);">1</span>
        </div>
        <div class="g-hud-item">
          <span class="g-hud-label">Errors</span>
          <span class="g-hud-value" id="hud-errors" style="color:var(--red);">0</span>
        </div>
      </div>
      <div id="num-grid"></div>
    </div>

    <div class="g-screen" id="screen-over" style="display:none;"></div>

  </div>

  <script>
    (function () {
      var COUNT = 25;
      var COLS  = 5;
      var nextNum   = 1;
      var errors    = 0;
      var startTime = 0;
      var timerRAF  = null;
      var running   = false;
      var bestTime  = Infinity;
      var btns      = [];

      var screenStart = document.getElementById('screen-start');
      var screenOver  = document.getElementById('screen-over');
      var gameUI      = document.getElementById('game-ui');
      var numGrid     = document.getElementById('num-grid');
      var nextEl      = document.getElementById('next-num');
      var errorsEl    = document.getElementById('hud-errors');
      var timeEl      = document.getElementById('hud-time');

      function shuffle(arr) {
        var a = arr.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i]; a[i] = a[j]; a[j] = t;
        }
        return a;
      }

      function updateTimer() {
        if (!running) return;
        var elapsed = (performance.now() - startTime) / 1000;
        timeEl.textContent = elapsed.toFixed(1) + 's';
        if (elapsed > 60) timeEl.classList.add('warn');
        timerRAF = requestAnimationFrame(updateTimer);
      }

      function buildGrid() {
        numGrid.innerHTML = '';
        btns = [];
        numGrid.style.gridTemplateColumns = 'repeat(' + COLS + ', 1fr)';
        var numbers = shuffle(Array.from({length: COUNT}, function(_, i) { return i + 1; }));
        numbers.forEach(function(n) {
          var btn = document.createElement('button');
          btn.className = 'num-btn';
          btn.textContent = n;
          btn.dataset.num = n;
          btn.addEventListener('click', function() { onTap(n, btn); });
          numGrid.appendChild(btn);
          btns.push(btn);
        });
        highlightNext();
      }

      function highlightNext() {
        btns.forEach(function(b) {
          if (parseInt(b.dataset.num) === nextNum && !b.disabled) {
            b.classList.add('num-btn--next');
          } else {
            b.classList.remove('num-btn--next');
          }
        });
      }

      function onTap(n, btn) {
        if (!running || btn.disabled) return;
        if (n === nextNum) {
          btn.classList.remove('num-btn--next');
          btn.classList.add('num-btn--hit');
          btn.disabled = true;
          nextNum++;
          nextEl.textContent = nextNum <= COUNT ? nextNum : '🎉';
          highlightNext();
          if (nextNum > COUNT) {
            running = false;
            cancelAnimationFrame(timerRAF);
            var elapsed = (performance.now() - startTime) / 1000;
            showGameOver(elapsed);
          }
        } else {
          errors++;
          errorsEl.textContent = errors;
          startTime -= 2000;
          btn.classList.add('num-btn--wrong');
          setTimeout(function() { btn.classList.remove('num-btn--wrong'); }, 300);
        }
      }

      function showGameOver(elapsed) {
        gameUI.style.display = 'none';
        var secs = elapsed.toFixed(2);
        if (elapsed < bestTime) bestTime = elapsed;
        var grade = elapsed < 20 ? '🔥 Beast Mode' : elapsed < 35 ? '⚡ Sharp' : elapsed < 60 ? '👍 Solid Run' : '📈 Keep Pushing';
        screenOver.innerHTML =
          '<p class="g-eyebrow">Number Rush · Result</p>' +
          '<h2 class="g-title" style="font-size:1.75rem;">' + grade + '</h2>' +
          '<div><p class="g-score-label">Your Time</p><p class="g-score-big">' + secs + '<span style="font-size:1.5rem;">s</span></p></div>' +
          '<p style="font-size:0.78rem;color:rgba(255,255,255,0.35);">Errors: ' + errors + ' (each added 2s)</p>' +
          '<button class="g-btn g-btn--primary" id="btn-replay">Play Again →</button>' +
          '<a href="games.html" class="g-btn g-btn--ghost">← All Games</a>' +
          '<div style="padding:1rem;background:rgba(139,92,246,0.08);border:1px solid rgba(139,92,246,0.2);border-radius:10px;max-width:300px;text-align:center;">' +
          '<p style="font-size:0.72rem;color:rgba(255,255,255,0.5);margin-bottom:0.4rem;letter-spacing:0.06em;text-transform:uppercase;font-weight:800;">Want more?</p>' +
          '<p style="font-size:0.8rem;color:rgba(255,255,255,0.6);margin-bottom:0.75rem;line-height:1.6;">Beat Tap and the full member game library unlock with a platform membership.</p>' +
          '<a href="pricing.html" class="g-btn g-btn--primary" style="padding:0.65rem 1.5rem;font-size:0.8rem;width:100%;">Buy Now →</a>' +
          '</div>';
        screenOver.style.display = 'flex';
        document.getElementById('btn-replay') && document.getElementById('btn-replay').addEventListener('click', startGame);
      }

      function startGame() {
        nextNum = 1; errors = 0;
        screenStart.style.display = 'none';
        screenOver.style.display  = 'none';
        gameUI.style.display = 'flex';
        timeEl.textContent = '0.0s';
        timeEl.classList.remove('warn');
        errorsEl.textContent = '0';
        nextEl.textContent   = '1';
        buildGrid();
        startTime = performance.now();
        running   = true;
        cancelAnimationFrame(timerRAF);
        timerRAF = requestAnimationFrame(updateTimer);
      }

      document.getElementById('btn-start').addEventListener('click', startGame);
    }());
  </script>
</body>
</html>
