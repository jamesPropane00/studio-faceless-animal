<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faceless Animal Radio Miner</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Main Styles -->
  <link rel="stylesheet" href="assets/style.css?v=20260322" />

  <style>
    :root {
      --radio-bg: #06080f;
      --radio-panel: #10162a;
      --radio-accent: #59d5ff;
      --radio-text: #f4f7ff;
      --radio-muted: #99a8cf;
      --radio-btn: #27d37e;
      --radio-btn-hover: #1fa366;
    }

    body {
      background: linear-gradient(180deg, #05070d 0%, #080b16 48%, #0a0d19 100%);
      color: var(--radio-text);
      font-family: 'Exo 2', sans-serif;
      margin: 0;
      min-height: 100vh;
    }

    .miner-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1rem 4rem;
    }

    .radio-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem;
      text-align: center;
      margin-bottom: 0.3rem;
    }

    .radio-sub {
      color: var(--radio-muted);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .radio-card {
      background: var(--radio-panel);
      border-radius: 22px;
      padding: 2rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    .radio-play-btn {
      background: var(--radio-btn);
      border: none;
      border-radius: 999px;
      padding: 0.9rem 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: 0.2s;
    }

    .radio-play-btn:hover {
      background: var(--radio-btn-hover);
    }

    .radio-info {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .radio-balance,
    .radio-timer,
    .radio-status {
      background: rgba(89,213,255,0.08);
      padding: 0.7rem 1rem;
      border-radius: 10px;
      min-width: 120px;
      text-align: center;
    }

    .radio-feed {
      max-width: 420px;
      width: 100%;
      background: rgba(16,22,42,0.7);
      border-radius: 10px;
      padding: 1rem;
      font-size: 0.9rem;
      color: var(--radio-muted);
    }
  </style>
</head>

<body>
  <main class="miner-wrap">
    <h1 class="radio-title">Faceless Animal Radio</h1>
    <p class="radio-sub">Tune in. Collect Signal Coin. One click, once a day.</p>

    <div class="radio-card">
      <button id="claimSignalBtn" class="radio-play-btn">
        ▶ Play & Collect 60 SC
      </button>
    </div>

    <div class="radio-info">
      <div class="radio-balance">Balance: <span id="vaultBalance">0</span> SC</div>
      <div class="radio-timer">Next claim: <span id="cycleTimer">READY</span></div>
      <div class="radio-status" id="veilEngineStatus">Ready to collect</div>
    </div>

    <div class="radio-feed">
      <div id="liveFeed"></div>
    </div>
  </main>

  <!-- JS -->
  <script type="module" src="assets/js/miner.js"></script>
</body>
</html>
