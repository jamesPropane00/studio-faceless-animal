<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Newsletter Admin — Faceless Animal Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #f0f0f0; padding: 1.5rem; max-width: 800px; margin: 0 auto; }
    h1 { font-size: 1.2rem; margin-bottom: 0.25rem; }
    p { color: #888; font-size: 0.82rem; margin-bottom: 1rem; }
    label { display: block; font-size: 0.78rem; font-weight: 600; margin-bottom: 0.3rem; color: #ccc; }
    input, textarea, select { width: 100%; padding: 0.5rem 0.65rem; border-radius: 6px; border: 1px solid #333; background: #111; color: #f0f0f0; font-size: 0.85rem; font-family: inherit; margin-bottom: 0.75rem; }
    textarea { min-height: 120px; resize: vertical; }
    input[type="file"] { padding: 0.4rem; }
    input[type="color"] { width: 60px; height: 36px; padding: 2px; cursor: pointer; }
    button { padding: 0.55rem 1.2rem; border-radius: 6px; border: none; background: linear-gradient(135deg, #7c3aed, #a78bfa); color: #fff; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
    button.danger { background: #dc2626; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .status { margin-top: 0.75rem; font-size: 0.82rem; }
    .image-preview { margin: 0.5rem 0 0.75rem; display: none; }
    .image-preview img { max-width: 100%; max-height: 200px; border-radius: 6px; border: 1px solid #333; }
    .articles { margin-top: 1.5rem; }
    .article-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #222; font-size: 0.82rem; }
    .article-row strong { flex: 1; }
    .article-row span { color: #666; font-size: 0.72rem; margin: 0 0.5rem; }
    a { color: #a78bfa; text-decoration: none; }
    .back { display: inline-block; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <a class="back" href="news.html">&larr; Back to News</a>
  <h1>Newsletter Admin</h1>
  <p>Create and manage Signal Wire articles.</p>

  <form id="article-form">
    <label for="article-title">Title</label>
    <input id="article-title" maxlength="200" required />

    <label for="article-dek">Subtitle / Deck</label>
    <input id="article-dek" maxlength="300" placeholder="Brief summary or subtitle" />

    <label for="article-body">Body</label>
    <textarea id="article-body"></textarea>

    <label for="article-category">Category</label>
    <select id="article-category">
      <option value="General">General</option>
      <option value="Music">Music</option>
      <option value="Tech">Tech</option>
      <option value="Culture">Culture</option>
      <option value="Release">Release</option>
    </select>

    <div class="form-row">
      <div>
        <label for="article-accent">Accent Color</label>
        <input id="article-accent" type="color" value="#c9a96e" />
      </div>
      <div></div>
    </div>

    <label for="article-image">Upload Image</label>
    <input id="article-image" type="file" accept="image/*" />
    <div class="image-preview" id="image-preview"><img id="image-preview-img" alt="Preview" /></div>

    <label for="article-media">Or paste Media URL (optional)</label>
    <input id="article-media" placeholder="https://example.com/image.jpg" />

    <label for="article-link">External Link (optional)</label>
    <input id="article-link" placeholder="https://example.com" />

    <button type="submit">Publish Article</button>
    <div class="status" id="article-status"></div>
  </form>

  <div class="articles">
    <h2>Recent Articles</h2>
    <div id="article-list"></div>
  </div>

  <script>
    (function () {
      var supabaseUrl = 'https://ghufaozjwondqcrcucjs.supabase.co';
      var supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdodWZhb3pqd29uZHFjcmN1Y2pzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NDg2MTcsImV4cCI6MjA4OTMyNDYxN30.YxAgndazRJxFX-XQJ2VllxgzxPHHd3zPSfDnfnFlD38';
      var STORAGE_BUCKET = 'article-media';

      function esc(s) { return String(s).replace(/[&<>"']/g, function(c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }

      var statusEl = document.getElementById('article-status');
      var listEl = document.getElementById('article-list');
      var form = document.getElementById('article-form');
      var titleInput = document.getElementById('article-title');
      var dekInput = document.getElementById('article-dek');
      var bodyInput = document.getElementById('article-body');
      var categoryInput = document.getElementById('article-category');
      var accentInput = document.getElementById('article-accent');
      var imageInput = document.getElementById('article-image');
      var mediaInput = document.getElementById('article-media');
      var linkInput = document.getElementById('article-link');
      var imagePreview = document.getElementById('image-preview');
      var imagePreviewImg = document.getElementById('image-preview-img');

      imageInput.addEventListener('change', function() {
        var file = imageInput.files && imageInput.files[0];
        if (!file) { imagePreview.style.display = 'none'; return; }
        var reader = new FileReader();
        reader.onload = function(e) {
          imagePreviewImg.src = e.target.result;
          imagePreview.style.display = '';
        };
        reader.readAsDataURL(file);
      });

      function loadArticles() {
        fetch(supabaseUrl + '/rest/v1/signal_wire_posts?select=id,title,category,published_at&order=published_at.desc&limit=20', {
          headers: { apikey: supabaseKey, Authorization: 'Bearer ' + supabaseKey }
        }).then(function (r) { return r.json(); }).then(function (data) {
          if (!Array.isArray(data)) return;
          listEl.innerHTML = data.length ? data.map(function (a) {
            return '<div class="article-row"><strong>' + esc(a.title || 'Untitled') + '</strong><span>' + esc(a.category || '') + '</span><span>' + (a.published_at ? a.published_at.slice(0, 10) : '') + '</span></div>';
          }).join('') : '<p style="color:#666;">No articles yet.</p>';
        }).catch(function () {});
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        var title = titleInput.value.trim();
        if (!title) { statusEl.textContent = 'Title is required.'; return; }
        var session = null;
        try { session = JSON.parse(localStorage.getItem('fas_user') || 'null'); } catch (_) {}
        if (!session) {
          statusEl.textContent = 'Sign in as the studio admin before publishing.';
          return;
        }

        var submitButton = form.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        submitButton.textContent = 'Publishing...';
        statusEl.textContent = 'Uploading and publishing article...';
        var data = new FormData();
        data.append('title', title);
        data.append('dek', dekInput.value.trim());
        data.append('body', bodyInput.value.trim());
        data.append('category', categoryInput.value);
        data.append('accent_color', accentInput.value);
        data.append('media_url', mediaInput.value.trim());
        data.append('link_url', linkInput.value.trim());
        var file = imageInput.files && imageInput.files[0];
        if (file) data.append('image', file, file.name);

        fetch('/api/news/publish', {
          method: 'POST',
          headers: { 'x-fas-user': JSON.stringify(session) },
          body: data
        }).then(function (r) {
          return r.json().then(function (payload) { return { ok: r.ok, payload: payload }; });
        }).then(function (result) {
          if (!result.ok) throw new Error(result.payload.error || 'Publish failed.');
          statusEl.textContent = result.payload.board_posted
            ? 'Article published and posted to the community!'
            : 'Article published. Community post warning: ' + (result.payload.board_error || 'not posted');
          form.reset();
          imagePreview.style.display = 'none';
          loadArticles();
        }).catch(function (err) {
          statusEl.textContent = err.message || 'Publish failed.';
        }).finally(function () {
          submitButton.disabled = false;
          submitButton.textContent = 'Publish Article';
        });
      });

      loadArticles();
    })();
  </script>
</body>
</html>
