<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="The World — Faceless Animal Studios. A living breathing multiplayer simulation." />
  <title>The World — Faceless Animal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
  <script>window.__FAS_CONFIG = window.__FAS_CONFIG || {}</script>
  <script src="/assets/js/env.js" onerror="void 0"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#090909;--surface:#12141e;--surface2:#181b2a;--surface3:#1e2235;
      --border:rgba(167,139,250,0.15);--border2:rgba(167,139,250,0.08);
      --text:#f0f0f0;--dim:#8a8a8a;--bright:#a78bfa;--purple:#7c3aed;
      --gold:#f5c451;--cyan:#22d3ee;--green:#4ade80;--pink:#f472b6;--red:#ef4444;
      --radius:12px;--radius-sm:8px;
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --safe-top:env(safe-area-inset-top,0px);
    }
    html,body{height:100%;overflow:hidden;touch-action:none}
    body{
      font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
      display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;
      user-select:none;-webkit-user-select:none;
    }
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

    #gameCanvas{
      display:block;width:100%;height:100%;
      image-rendering:pixelated;image-rendering:crisp-edges;
      touch-action:none;
    }

    .hud{position:fixed;pointer-events:none;z-index:10}
    .hud>*{pointer-events:auto}

    .hud-top{
      top:calc(8px + var(--safe-top));left:8px;right:8px;
      display:flex;justify-content:space-between;align-items:flex-start;gap:8px;
    }
    .hud-bottom{
      bottom:calc(8px + var(--safe-bottom));left:8px;right:8px;
      display:flex;justify-content:space-between;align-items:flex-end;
    }

    .panel{
      background:rgba(18,20,30,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:var(--radius);
      padding:0.6rem 0.8rem;font-size:0.72rem;
    }

    .brand-badge{
      display:flex;align-items:center;gap:0.4rem;
      background:rgba(18,20,30,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:var(--radius);
      padding:0.4rem 0.7rem;
    }
    .brand-badge .logo{font-size:0.82rem;font-weight:900;color:#fff;letter-spacing:-0.02em}
    .brand-badge .logo span{color:var(--gold)}
    .brand-badge .tag{font-size:0.55rem;font-weight:700;color:var(--bright);text-transform:uppercase;letter-spacing:0.1em;
      background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);border-radius:4px;padding:0.1rem 0.35rem}

    .stats-panel{display:flex;flex-direction:column;gap:0.3rem;min-width:120px}
    .stat-row{display:flex;align-items:center;gap:0.4rem;font-size:0.68rem}
    .stat-icon{font-size:0.8rem;width:18px;text-align:center}
    .stat-label{color:var(--dim);font-weight:600;min-width:44px}
    .stat-value{color:var(--text);font-weight:800}
    .stat-value.gold{color:var(--gold)}
    .stat-value.green{color:var(--green)}
    .stat-value.cyan{color:var(--cyan)}

    .rep-bar-wrap{display:flex;flex-direction:column;gap:0.15rem;padding:0.2rem 0}
    .rep-bar-level{font-size:0.6rem;font-weight:800;color:var(--bright);text-transform:uppercase;letter-spacing:0.05em}
    .rep-bar-outer{width:100%;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
    .rep-bar-inner{height:100%;background:linear-gradient(90deg,var(--bright),var(--purple));border-radius:3px;transition:width 0.3s ease}
    .rep-bar-progress{font-size:0.55rem;color:var(--dim);font-weight:600}

    .minimap-wrap{
      background:rgba(18,20,30,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:var(--radius);
      padding:4px;overflow:hidden;
    }
    #minimapCanvas{display:block;border-radius:6px;image-rendering:pixelated}

    .joystick-zone{
      position:fixed;bottom:calc(20px + var(--safe-bottom));left:20px;
      width:130px;height:130px;z-index:20;
      display:none;
    }
    .joystick-base{
      position:absolute;inset:0;
      background:rgba(18,20,30,0.6);border:2px solid var(--border);
      border-radius:50%;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    }
    .joystick-knob{
      position:absolute;width:52px;height:52px;
      left:50%;top:50%;transform:translate(-50%,-50%);
      background:radial-gradient(circle,rgba(167,139,250,0.5),rgba(124,58,237,0.3));
      border:2px solid rgba(167,139,250,0.5);border-radius:50%;
      transition:transform 0.05s;
    }

    .action-buttons{
      position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;
      display:flex;flex-direction:column;gap:10px;z-index:20;
      display:none;
    }
    .action-btn{
      width:52px;height:52px;border-radius:50%;
      background:rgba(18,20,30,0.7);border:2px solid var(--border);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;
      font-size:1.2rem;transition:transform 0.1s,background 0.15s;
    }
    .action-btn:active{transform:scale(0.9);background:rgba(124,58,237,0.3)}
    .action-btn.primary-action{border-color:rgba(167,139,250,0.5)}

    .player-list{
      position:fixed;top:calc(60px + var(--safe-top));right:8px;
      max-height:calc(100vh - 200px);overflow-y:auto;
      z-index:10;display:none;
    }
    .player-list.open{display:block}
    .player-list-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:0.4rem;padding-bottom:0.3rem;border-bottom:1px solid var(--border);
    }
    .player-list-header h3{font-size:0.7rem;font-weight:800;color:var(--bright)}
    .player-list-header span{font-size:0.6rem;color:var(--dim)}
    .player-entry{
      display:flex;align-items:center;gap:0.4rem;
      padding:0.25rem 0;font-size:0.65rem;
    }
    .player-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .player-name{font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
    .player-role{font-size:0.55rem;color:var(--dim);font-weight:600}

    .chat-panel{
      position:fixed;bottom:calc(80px + var(--safe-bottom));left:8px;
      width:280px;max-width:calc(100vw - 16px);z-index:15;display:none;
    }
    .chat-panel.open{display:block}
    .chat-messages{
      max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:0.2rem;
      margin-bottom:0.4rem;padding:0.4rem;
      background:rgba(9,9,9,0.5);border-radius:var(--radius-sm);
    }
    .chat-msg{font-size:0.65rem;line-height:1.4}
    .chat-msg .author{font-weight:800;color:var(--bright)}
    .chat-msg .text{color:var(--dim)}
    .chat-msg.system .text{color:var(--gold);font-style:italic}
    .chat-input-row{display:flex;gap:4px}
    .chat-input{
      flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border);
      border-radius:var(--radius-sm);color:var(--text);font-family:inherit;
      font-size:0.7rem;padding:0.4rem 0.6rem;outline:none;
    }
    .chat-input:focus{border-color:rgba(139,92,246,0.4)}
    .chat-send{
      width:32px;height:32px;border-radius:var(--radius-sm);
      background:var(--purple);color:#fff;font-size:0.8rem;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }

    .toolbar{
      position:fixed;top:calc(60px + var(--safe-top));right:8px;
      display:flex;flex-direction:column;gap:6px;z-index:15;
    }
    .tool-btn{
      width:40px;height:40px;border-radius:var(--radius-sm);
      background:rgba(18,20,30,0.85);border:1px solid var(--border);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:flex;align-items:center;justify-content:center;
      font-size:1rem;transition:background 0.15s,border-color 0.15s;
    }
    .tool-btn:hover,.tool-btn:active{background:rgba(124,58,237,0.2);border-color:rgba(167,139,250,0.4)}
    .tool-btn.active{background:rgba(124,58,237,0.3);border-color:var(--bright)}

    .time-indicator{
      position:fixed;top:calc(8px + var(--safe-top));left:50%;transform:translateX(-50%);
      z-index:10;
    }
    .time-badge{
      display:flex;align-items:center;gap:0.35rem;
      background:rgba(18,20,30,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:20px;
      padding:0.3rem 0.7rem;font-size:0.65rem;font-weight:700;
    }
    .time-icon{font-size:0.85rem}
    .time-text{color:var(--dim)}

    .toast{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      z-index:100;opacity:0;transition:opacity 0.3s;pointer-events:none;
    }
    .toast.show{opacity:1}
    .toast-content{
      background:rgba(18,20,30,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border:1px solid var(--border);border-radius:var(--radius);
      padding:0.8rem 1.2rem;text-align:center;
    }
    .toast-title{font-size:0.85rem;font-weight:900;color:var(--gold);margin-bottom:0.2rem}
    .toast-desc{font-size:0.7rem;color:var(--dim)}

    .loading-screen{
      position:fixed;inset:0;z-index:1000;
      background:var(--bg);display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:1.5rem;
      transition:opacity 0.5s;
    }
    .loading-screen.hidden{opacity:0;pointer-events:none}
    .loading-logo{font-size:1.6rem;font-weight:900;color:#fff;letter-spacing:-0.02em}
    .loading-logo span{color:var(--gold)}
    .loading-bar-wrap{width:200px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
    .loading-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--purple),var(--bright));border-radius:2px;transition:width 0.3s}
    .loading-text{font-size:0.7rem;color:var(--dim);font-weight:600}

    .zoom-controls{
      position:fixed;right:8px;bottom:calc(50% - 40px);
      display:flex;flex-direction:column;gap:4px;z-index:15;
    }
    .zoom-btn{
      width:36px;height:36px;border-radius:var(--radius-sm);
      background:rgba(18,20,30,0.85);border:1px solid var(--border);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;font-weight:700;color:var(--dim);
    }
    .zoom-btn:active{background:rgba(124,58,237,0.2);color:var(--text)}

    .coord-display{
      position:fixed;bottom:calc(8px + var(--safe-bottom));left:50%;transform:translateX(-50%);
      z-index:10;
    }
    .coord-badge{
      background:rgba(18,20,30,0.8);border:1px solid var(--border2);border-radius:6px;
      padding:0.2rem 0.5rem;font-size:0.58rem;font-weight:600;color:var(--dim);
      font-variant-numeric:tabular-nums;
    }

    @media(pointer:coarse){
      .joystick-zone{display:block}
      .action-buttons{display:flex}
      .toolbar{top:auto;bottom:calc(170px + var(--safe-bottom));right:8px;left:auto;flex-direction:row}
      .zoom-controls{display:none}
    }
    @media(pointer:fine){
      .joystick-zone{display:none!important}
      .action-buttons{display:none!important}
    }
    @media(max-width:480px){
      .chat-panel{width:calc(100vw - 16px)}
      .player-list{right:4px;max-width:160px}
      .brand-badge .tag{display:none}

    
    .acct-foot:empty,.acct-foot .acct-btn[hidden]{display:none}
      .build-panel, .god-panel {
        padding: 1rem;
        min-width: 280px;
        max-width: 95vw;
      }
      .build-grid, .god-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 0.5rem;
      }
      .build-item, .god-item {
        padding: 0.5rem;
      }
      .build-icon, .god-icon {
        font-size: 1.5rem;
        margin-bottom: 0.3rem;
      }
      .build-name, .god-name {
        font-size: 0.75rem;
        margin-bottom: 0.2rem;
      }
      .build-cost, .god-cost {
        font-size: 0.65rem;
      }
      .build-desc, .god-desc {
        font-size: 0.6rem;
        margin-top: 0.15rem;
      }
    }

    .build-panel, .god-panel, .income-panel, .job-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(18, 20, 30, 0.95);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      z-index: 100;
      display: none;
      min-width: 320px;
      max-width: 90vw;
    }
    .build-panel.open, .god-panel.open, .income-panel.open, .job-panel.open { display: block; }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
    }
    .panel-close {
      font-size: 1.5rem;
      color: var(--dim);
      cursor: pointer;
      line-height: 1;
    }
    .panel-close:hover { color: var(--text); }
    .build-grid, .god-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }
    .build-item, .god-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .build-item:hover, .god-item:hover {
      background: rgba(167, 139, 250, 0.1);
      border-color: var(--bright);
    }
    .build-item.selected, .god-item.selected {
      background: rgba(167, 139, 250, 0.2);
      border-color: var(--bright);
    }
    .build-icon, .god-icon {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .build-name, .god-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.25rem;
    }
    .build-cost, .god-cost {
      font-size: 0.75rem;
      color: var(--gold);
      text-align: center;
      font-weight: 600;
    }
    .build-desc, .god-desc {
      font-size: 0.7rem;
      color: var(--dim);
      text-align: center;
      margin-top: 0.25rem;
    }
    .mode-indicator {
      position: fixed;
      top: calc(8px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(167, 139, 250, 0.9);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 700;
      z-index: 50;
      display: none;
    }
    .mode-indicator.open { display: block; }
    .income-info, .job-info {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .income-building-name, .job-building-name {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
      text-align: center;
    }
    .income-amount, .job-pay, .job-duration {
      font-size: 0.85rem;
      color: var(--dim);
      text-align: center;
    }
    .income-amount span, .job-pay span {
      color: var(--gold);
      font-weight: 700;
    }
    .income-rate {
      font-size: 0.75rem;
      color: var(--dim);
      text-align: center;
    }
    .income-rate span {
      color: var(--bright);
      font-weight: 600;
    }
    .income-collect-btn, .job-start-btn {
      background: linear-gradient(135deg, var(--purple), var(--bright));
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .income-collect-btn:hover, .job-start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }
    .income-collect-btn:disabled, .job-start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .job-progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .job-progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .job-progress-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--bright));
      border-radius: 4px;
      transition: width 0.1s linear;
    }
    .job-progress-text {
      font-size: 0.75rem;
      color: var(--dim);
      text-align: center;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">FACELESS <span>ANIMAL</span></div>
  <div style="font-size:0.7rem;color:var(--dim);font-weight:700;letter-spacing:0.15em;text-transform:uppercase">The World</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
  <div class="loading-text" id="loadingText">Generating world...</div>
</div>

<canvas id="gameCanvas"></canvas>

<div class="hud hud-top">
  <div class="brand-badge">
    <div class="logo">FA<span>.</span></div>
    <div class="tag">THE WORLD</div>
  </div>

  <div class="panel stats-panel" id="statsPanel">
    <div class="stat-row"><span class="stat-icon">&#x1F4B0;</span><span class="stat-label">Coins</span><span class="stat-value gold" id="statCoins">0</span></div>
    <div class="stat-row"><span class="stat-icon">&#x2B50;</span><span class="stat-label">Rep</span><span class="stat-value cyan" id="statRep">0</span></div>
    <div class="rep-bar-wrap">
      <div class="rep-bar-level" id="repLevelName">Nobody</div>
      <div class="rep-bar-outer">
        <div class="rep-bar-inner" id="repBarInner" style="width:0%"></div>
      </div>
      <div class="rep-bar-progress" id="repProgress">0/50</div>
    </div>
    <div class="stat-row"><span class="stat-icon">&#x1F30D;</span><span class="stat-label">Online</span><span class="stat-value green" id="statOnline">1</span></div>
  </div>
</div>

<div class="time-indicator">
  <div class="time-badge">
    <span class="time-icon" id="timeIcon">&#x2600;&#xFE0F;</span>
    <span class="time-text" id="timeText">12:00</span>
    <span style="margin-left:0.3rem;color:var(--dim);font-size:0.6rem" id="weatherIcon"></span>
  </div>
</div>

<div class="toolbar" id="toolbar">
  <button class="tool-btn" id="btnChat" title="Chat">&#x1F4AC;</button>
  <button class="tool-btn" id="btnPlayers" title="Players">&#x1F465;</button>
  <button class="tool-btn" id="btnMinimap" title="Map">&#x1F5FA;&#xFE0F;</button>
  <button class="tool-btn" id="btnBuild" title="Build">&#x1F3D7;&#xFE0F;</button>
  <button class="tool-btn" id="btnGod" title="God Powers">&#x26A1;</button>
</div>

<div class="mode-indicator" id="modeIndicator">Build Mode: Click to place</div>

<div class="zoom-controls">
  <button class="zoom-btn" id="btnZoomIn">+</button>
  <button class="zoom-btn" id="btnZoomOut">-</button>
</div>

<div class="hud hud-bottom">
  <div></div>
  <div class="minimap-wrap" id="minimapWrap" style="display:none">
    <canvas id="minimapCanvas" width="140" height="140"></canvas>
  </div>
</div>

<div class="coord-display">
  <div class="coord-badge" id="coordBadge">0, 0</div>
</div>

<div class="joystick-zone" id="joystickZone">
  <div class="joystick-base"></div>
  <div class="joystick-knob" id="joystickKnob"></div>
</div>

<div class="action-buttons" id="actionButtons">
  <button class="action-btn primary-action" id="btnAction1" title="Interact">&#x270B;</button>
  <button class="action-btn" id="btnAction2" title="God Power">&#x26A1;</button>
</div>

<div class="chat-panel panel" id="chatPanel">
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-row">
    <input class="chat-input" id="chatInput" placeholder="Say something..." maxlength="200" autocomplete="off" />
    <button class="chat-send" id="chatSend">&#x27A4;</button>
  </div>
</div>

<div class="player-list panel" id="playerList">
  <div class="player-list-header">
    <h3>ONLINE</h3>
    <span id="playerCount">0</span>
  </div>
  <div id="playerListBody"></div>
</div>

<div class="build-panel" id="buildPanel">
  <div class="panel-header">
    <div class="panel-title">Build Mode</div>
    <div class="panel-close" id="buildPanelClose">&times;</div>
  </div>
  <div class="build-grid" id="buildGrid"></div>
</div>

<div class="god-panel" id="godPanel">
  <div class="panel-header">
    <div class="panel-title">God Powers</div>
    <div class="panel-close" id="godPanelClose">&times;</div>
  </div>
  <div class="god-grid" id="godGrid"></div>
</div>

<div class="income-panel" id="incomePanel">
  <div class="panel-header">
    <div class="panel-title">Collect Income</div>
    <div class="panel-close" id="incomePanelClose">&times;</div>
  </div>
  <div class="income-info">
    <div class="income-building-name" id="incomeBuildingName">Shop</div>
    <div class="income-amount">Accumulated: <span id="incomeAmount">0</span> coins</div>
    <div class="income-rate">Rate: <span id="incomeRate">1</span> coin/min</div>
    <button class="income-collect-btn" id="incomeCollectBtn">Collect</button>
  </div>
</div>

<div class="job-panel" id="jobPanel">
  <div class="panel-header">
    <div class="panel-title">Work</div>
    <div class="panel-close" id="jobPanelClose">&times;</div>
  </div>
  <div class="job-info">
    <div class="job-building-name" id="jobBuildingName">Shop</div>
    <div class="job-pay">Pay: <span id="jobPay">2</span> coins</div>
    <div class="job-duration">Duration: 30 seconds</div>
    <div class="job-progress-wrap" id="jobProgressWrap" style="display:none">
      <div class="job-progress-bar">
        <div class="job-progress-inner" id="jobProgressInner" style="width:0%"></div>
      </div>
      <div class="job-progress-text" id="jobProgressText">0s / 30s</div>
    </div>
    <button class="job-start-btn" id="jobStartBtn">Start Work</button>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-content">
    <div class="toast-title" id="toastTitle"></div>
    <div class="toast-desc" id="toastDesc"></div>
  </div>
</div>

<script type="module">
import { supabase, SUPABASE_READY } from '/assets/js/supabase-client.js'
import { mountWorldAccount } from '/assets/js/world-account.js'
mountWorldAccount({ state, showToast, fetchPlayerState })
init()
</script>

</body>
</html>
