<html lang="en">
<head>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#090909;--surface:#12141e;--surface2:#181b2a;--surface3:#1e2235;
      --border:rgba(167,139,250,0.15);--border2:rgba(167,139,250,0.08);
      --text:#f0f0f0;--dim:#8a8a8a;--bright:#a78bfa;--purple:#7c3aed;
      --gold:#f5c451;--cyan:#22d3ee;--green:#4ade80;--pink:#f472b6;--red:#ef4444;
      --radius:12px;--radius-sm:8px;
      --safe-bottom:env(safe-area-inset-bottom,0px);
      --safe-top:env(safe-area-inset-top,0px);
    }
    html,body{height:100%;overflow:hidden;touch-action:none}
    body{
      font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
      display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;
      user-select:none;-webkit-user-select:none;
    }
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

    #gameCanvas{
      display:block;width:100%;height:100%;
      image-rendering:pixelated;image-rendering:crisp-edges;
      touch-action:none;
    }

    .hud{position:fixed;pointer-events:none;z-index:10}
    .hud>*{pointer-events:auto}

    .hud-top{
      top:calc(8px + var(--safe-top));left:8px;right:8px;
      display:flex;justify-content:space-between;align-items:flex-start;gap:8px;
    }
    .hud-bottom{
      bottom:calc(8px + var(--safe-bottom));left:8px;right:8px;
      display:flex;justify-content:space-between;align-items:flex-end;
    }

    .panel{
      background:rgba(18,20,30,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:var(--radius);
      padding:0.6rem 0.8rem;font-size:0.72rem;
    }

    .brand-badge{
      display:flex;align-items:center;gap:0.4rem;
      background:rgba(18,20,30,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:var(--radius);
      padding:0.4rem 0.7rem;
    }
    .brand-badge .logo{font-size:0.82rem;font-weight:900;color:#fff;letter-spacing:-0.02em}
    .brand-badge .logo span{color:var(--gold)}
    .brand-badge .tag{font-size:0.55rem;font-weight:700;color:var(--bright);text-transform:uppercase;letter-spacing:0.1em;
      background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);border-radius:4px;padding:0.1rem 0.35rem}

    .stats-panel{display:flex;flex-direction:column;gap:0.3rem;min-width:120px}
    .stat-row{display:flex;align-items:center;gap:0.4rem;font-size:0.68rem}
    .stat-icon{font-size:0.8rem;width:18px;text-align:center}
    .stat-label{color:var(--dim);font-weight:600;min-width:44px}
    .stat-value{color:var(--text);font-weight:800}
    .stat-value.gold{color:var(--gold)}
    .stat-value.green{color:var(--green)}
    .stat-value.cyan{color:var(--cyan)}

    .rep-bar-wrap{display:flex;flex-direction:column;gap:0.15rem;padding:0.2rem 0}
    .rep-bar-level{font-size:0.6rem;font-weight:800;color:var(--bright);text-transform:uppercase;letter-spacing:0.05em}
    .rep-bar-outer{width:100%;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
    .rep-bar-inner{height:100%;background:linear-gradient(90deg,var(--bright),var(--purple));border-radius:3px;transition:width 0.3s ease}
    .rep-bar-progress{font-size:0.55rem;color:var(--dim);font-weight:600}

    .minimap-wrap{
      background:rgba(18,20,30,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:var(--radius);
      padding:4px;overflow:hidden;
    }
    #minimapCanvas{display:block;border-radius:6px;image-rendering:pixelated}

    .joystick-zone{
      position:fixed;bottom:calc(20px + var(--safe-bottom));left:20px;
      width:130px;height:130px;z-index:20;
      display:none;
    }
    .joystick-base{
      position:absolute;inset:0;
      background:rgba(18,20,30,0.6);border:2px solid var(--border);
      border-radius:50%;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    }
    .joystick-knob{
      position:absolute;width:52px;height:52px;
      left:50%;top:50%;transform:translate(-50%,-50%);
      background:radial-gradient(circle,rgba(167,139,250,0.5),rgba(124,58,237,0.3));
      border:2px solid rgba(167,139,250,0.5);border-radius:50%;
      transition:transform 0.05s;
    }

    .action-buttons{
      position:fixed;bottom:calc(20px + var(--safe-bottom));right:20px;
      display:flex;flex-direction:column;gap:10px;z-index:20;
      display:none;
    }
    .action-btn{
      width:52px;height:52px;border-radius:50%;
      background:rgba(18,20,30,0.7);border:2px solid var(--border);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      display:flex;align-items:center;justify-content:center;
      font-size:1.2rem;transition:transform 0.1s,background 0.15s;
    }
    .action-btn:active{transform:scale(0.9);background:rgba(124,58,237,0.3)}
    .action-btn.primary-action{border-color:rgba(167,139,250,0.5)}

    .player-list{
      position:fixed;top:calc(60px + var(--safe-top));right:8px;
      max-height:calc(100vh - 200px);overflow-y:auto;
      z-index:10;display:none;
    }
    .player-list.open{display:block}
    .player-list-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:0.4rem;padding-bottom:0.3rem;border-bottom:1px solid var(--border);
    }
    .player-list-header h3{font-size:0.7rem;font-weight:800;color:var(--bright)}
    .player-list-header span{font-size:0.6rem;color:var(--dim)}
    .player-entry{
      display:flex;align-items:center;gap:0.4rem;
      padding:0.25rem 0;font-size:0.65rem;
    }
    .player-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .player-name{font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px}
    .player-role{font-size:0.55rem;color:var(--dim);font-weight:600}

    .chat-panel{
      position:fixed;bottom:calc(80px + var(--safe-bottom));left:8px;
      width:280px;max-width:calc(100vw - 16px);z-index:15;display:none;
    }
    .chat-panel.open{display:block}
    .chat-messages{
      max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:0.2rem;
      margin-bottom:0.4rem;padding:0.4rem;
      background:rgba(9,9,9,0.5);border-radius:var(--radius-sm);
    }
    .chat-msg{font-size:0.65rem;line-height:1.4}
    .chat-msg .author{font-weight:800;color:var(--bright)}
    .chat-msg .text{color:var(--dim)}
    .chat-msg.system .text{color:var(--gold);font-style:italic}
    .chat-input-row{display:flex;gap:4px}
    .chat-input{
      flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border);
      border-radius:var(--radius-sm);color:var(--text);font-family:inherit;
      font-size:0.7rem;padding:0.4rem 0.6rem;outline:none;
    }
    .chat-input:focus{border-color:rgba(139,92,246,0.4)}
    .chat-send{
      width:32px;height:32px;border-radius:var(--radius-sm);
      background:var(--purple);color:#fff;font-size:0.8rem;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;
    }

    .toolbar{
      position:fixed;top:calc(60px + var(--safe-top));right:8px;
      display:flex;flex-direction:column;gap:6px;z-index:15;
    }
    .tool-btn{
      width:40px;height:40px;border-radius:var(--radius-sm);
      background:rgba(18,20,30,0.85);border:1px solid var(--border);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:flex;align-items:center;justify-content:center;
      font-size:1rem;transition:background 0.15s,border-color 0.15s;
    }
    .tool-btn:hover,.tool-btn:active{background:rgba(124,58,237,0.2);border-color:rgba(167,139,250,0.4)}
    .tool-btn.active{background:rgba(124,58,237,0.3);border-color:var(--bright)}

    .time-indicator{
      position:fixed;top:calc(8px + var(--safe-top));left:50%;transform:translateX(-50%);
      z-index:10;
    }
    .time-badge{
      display:flex;align-items:center;gap:0.35rem;
      background:rgba(18,20,30,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:20px;
      padding:0.3rem 0.7rem;font-size:0.65rem;font-weight:700;
    }
    .time-icon{font-size:0.85rem}
    .time-text{color:var(--dim)}

    .toast{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      z-index:100;opacity:0;transition:opacity 0.3s;pointer-events:none;
    }
    .toast.show{opacity:1}
    .toast-content{
      background:rgba(18,20,30,0.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      border:1px solid var(--border);border-radius:var(--radius);
      padding:0.8rem 1.2rem;text-align:center;
    }
    .toast-title{font-size:0.85rem;font-weight:900;color:var(--gold);margin-bottom:0.2rem}
    .toast-desc{font-size:0.7rem;color:var(--dim)}

    .loading-screen{
      position:fixed;inset:0;z-index:1000;
      background:var(--bg);display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:1.5rem;
      transition:opacity 0.5s;
    }
    .loading-screen.hidden{opacity:0;pointer-events:none}
    .loading-logo{font-size:1.6rem;font-weight:900;color:#fff;letter-spacing:-0.02em}
    .loading-logo span{color:var(--gold)}
    .loading-bar-wrap{width:200px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
    .loading-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--purple),var(--bright));border-radius:2px;transition:width 0.3s}
    .loading-text{font-size:0.7rem;color:var(--dim);font-weight:600}

    .zoom-controls{
      position:fixed;right:8px;bottom:calc(50% - 40px);
      display:flex;flex-direction:column;gap:4px;z-index:15;
    }
    .zoom-btn{
      width:36px;height:36px;border-radius:var(--radius-sm);
      background:rgba(18,20,30,0.85);border:1px solid var(--border);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      display:flex;align-items:center;justify-content:center;
      font-size:1.1rem;font-weight:700;color:var(--dim);
    }
    .zoom-btn:active{background:rgba(124,58,237,0.2);color:var(--text)}

    .coord-display{
      position:fixed;bottom:calc(8px + var(--safe-bottom));left:50%;transform:translateX(-50%);
      z-index:10;
    }
    .coord-badge{
      background:rgba(18,20,30,0.8);border:1px solid var(--border2);border-radius:6px;
      padding:0.2rem 0.5rem;font-size:0.58rem;font-weight:600;color:var(--dim);
      font-variant-numeric:tabular-nums;
    }

    @media(pointer:coarse){
      .joystick-zone{display:block}
      .action-buttons{display:flex}
      .toolbar{top:auto;bottom:calc(170px + var(--safe-bottom));right:8px;left:auto;flex-direction:row}
      .zoom-controls{display:none}
    }
    @media(pointer:fine){
      .joystick-zone{display:none!important}
      .action-buttons{display:none!important}
    }
    @media(max-width:480px){
      .chat-panel{width:calc(100vw - 16px)}
      .player-list{right:4px;max-width:160px}
      .brand-badge .tag{display:none}

    /* Account button (next to brand) */
    .account-btn {
      display:inline-flex;align-items:center;gap:0.4rem;
      background:rgba(18,20,30,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:var(--radius);
      padding:0.4rem 0.7rem;color:var(--text);font:inherit;font-size:0.72rem;font-weight:600;
      cursor:pointer;max-width:160px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
    }
    .account-btn:hover{border-color:rgba(167,139,250,0.45)}
    .account-btn.signed-in{border-color:rgba(74,222,128,0.4)}
    .account-icon{font-size:0.85rem}

    /* Account modal */
    .acct-modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
    .acct-modal[hidden]{display:none}
    .acct-card{width:min(380px,100%);background:rgba(18,20,30,0.96);border:1px solid var(--border);border-radius:14px;padding:1rem 1.1rem;display:flex;flex-direction:column;gap:0.75rem;max-height:90vh;overflow:auto}
    .acct-head{display:flex;align-items:center;justify-content:space-between;gap:0.5rem;border-bottom:1px solid var(--border);padding-bottom:0.6rem}
    .acct-tabs{display:flex;gap:0.25rem}
    .acct-tab{background:transparent;border:1px solid var(--border);color:var(--dim);font:inherit;font-size:0.72rem;font-weight:600;padding:0.35rem 0.6rem;border-radius:8px;cursor:pointer}
    .acct-tab.active{color:var(--text);background:rgba(167,139,250,0.15);border-color:rgba(167,139,250,0.4)}
    .acct-close{background:transparent;border:0;color:var(--dim);font-size:1.05rem;cursor:pointer;padding:0.2rem 0.4rem}
    .acct-close:hover{color:var(--text)}
    .acct-form{display:flex;flex-direction:column;gap:0.4rem}
    .acct-form[hidden]{display:none}
    .acct-label{font-size:0.65rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em;margin-top:0.25rem}
    .acct-input{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:8px;padding:0.55rem 0.65rem;color:var(--text);font:inherit;font-size:0.85rem;outline:none}
    .acct-input:focus{border-color:rgba(167,139,250,0.6)}
    .acct-error{font-size:0.7rem;color:#fb7185;min-height:1em;font-weight:600}
    .acct-btn{padding:0.6rem 0.9rem;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text);font:inherit;font-size:0.8rem;font-weight:700;cursor:pointer}
    .acct-btn:disabled{opacity:0.5;cursor:not-allowed}
    .acct-btn.primary{background:linear-gradient(135deg,#7c3aed,#a78bfa);border-color:transparent;color:#fff}
    .acct-btn.ghost{background:transparent;color:var(--dim);font-size:0.7rem}
    .acct-foot{display:flex;justify-content:center;border-top:1px solid var(--border);padding-top:0.6rem}
    .acct-foot:empty,.acct-foot .acct-btn[hidden]{display:none}
      .build-panel, .god-panel {
        padding: 1rem;
        min-width: 280px;
        max-width: 95vw;
      }
      .build-grid, .god-grid {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 0.5rem;
      }
      .build-item, .god-item {
        padding: 0.5rem;
      }
      .build-icon, .god-icon {
        font-size: 1.5rem;
        margin-bottom: 0.3rem;
      }
      .build-name, .god-name {
        font-size: 0.75rem;
        margin-bottom: 0.2rem;
      }
      .build-cost, .god-cost {
        font-size: 0.65rem;
      }
      .build-desc, .god-desc {
        font-size: 0.6rem;
        margin-top: 0.15rem;
      }
    }

    .build-panel, .god-panel, .income-panel, .job-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(18, 20, 30, 0.95);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      z-index: 100;
      display: none;
      min-width: 320px;
      max-width: 90vw;
    }
    .build-panel.open, .god-panel.open, .income-panel.open, .job-panel.open { display: block; }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
    }
    .panel-close {
      font-size: 1.5rem;
      color: var(--dim);
      cursor: pointer;
      line-height: 1;
    }
    .panel-close:hover { color: var(--text); }
    .build-grid, .god-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }
    .build-item, .god-item {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .build-item:hover, .god-item:hover {
      background: rgba(167, 139, 250, 0.1);
      border-color: var(--bright);
    }
    .build-item.selected, .god-item.selected {
      background: rgba(167, 139, 250, 0.2);
      border-color: var(--bright);
    }
    .build-icon, .god-icon {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .build-name, .god-name {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 0.25rem;
    }
    .build-cost, .god-cost {
      font-size: 0.75rem;
      color: var(--gold);
      text-align: center;
      font-weight: 600;
    }
    .build-desc, .god-desc {
      font-size: 0.7rem;
      color: var(--dim);
      text-align: center;
      margin-top: 0.25rem;
    }
    .mode-indicator {
      position: fixed;
      top: calc(8px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(167, 139, 250, 0.9);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 700;
      z-index: 50;
      display: none;
    }
    .mode-indicator.open { display: block; }
    .income-info, .job-info {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .income-building-name, .job-building-name {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
      text-align: center;
    }
    .income-amount, .job-pay, .job-duration {
      font-size: 0.85rem;
      color: var(--dim);
      text-align: center;
    }
    .income-amount span, .job-pay span {
      color: var(--gold);
      font-weight: 700;
    }
    .income-rate {
      font-size: 0.75rem;
      color: var(--dim);
      text-align: center;
    }
    .income-rate span {
      color: var(--bright);
      font-weight: 600;
    }
    .income-collect-btn, .job-start-btn {
      background: linear-gradient(135deg, var(--purple), var(--bright));
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .income-collect-btn:hover, .job-start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
    }
    .income-collect-btn:disabled, .job-start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .job-progress-wrap {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .job-progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .job-progress-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--bright));
      border-radius: 4px;
      transition: width 0.1s linear;
    }
    .job-progress-text {
      font-size: 0.75rem;
      color: var(--dim);
      text-align: center;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">FACELESS <span>ANIMAL</span></div>
  <div style="font-size:0.7rem;color:var(--dim);font-weight:700;letter-spacing:0.15em;text-transform:uppercase">The World</div>
  <div class="loading-bar-wrap"><div class="loading-bar" id="loadingBar"></div></div>
  <div class="loading-text" id="loadingText">Generating world...</div>

}

  { type: 'treasure', name: 'Treasure Found', icon: '\u{1F4B0}', desc: 'Treasure appeared!', radius: 2, duration: 10, effect: 'reward' },
  { type: 'portal', name: 'Portal Opened', icon: '\u{1F300}', desc: 'A mysterious portal opened...', radius: 2, duration: 15, effect: 'teleport' },
  { type: 'blessing', name: 'Divine Blessing', icon: '\u2728', desc: 'The gods smile upon this land', radius: 5, duration: 20, effect: 'buff' },
  { type: 'earthquake', name: 'Earthquake', icon: '\u{1F30B}', desc: 'The ground shakes!', radius: 8, duration: 3, effect: 'chaos' },
]

function seededRandom(seed) {
  let s = seed
  return function() {
    s = (s * 16807 + 0) % 2147483647
    return (s - 1) / 2147483646
  }
}

function noise2D(x, y, seed) {
  const rng = seededRandom(Math.abs(x * 374761393 + y * 668265263 + seed * 1013904223) % 2147483647 || 1)
  return rng()
}

function smoothNoise(x, y, seed, scale) {
  const sx = x / scale, sy = y / scale
  const ix = Math.floor(sx), iy = Math.floor(sy)
  const fx = sx - ix, fy = sy - iy
  const a = noise2D(ix, iy, seed)
  const b = noise2D(ix + 1, iy, seed)
  const c = noise2D(ix, iy + 1, seed)
  const d = noise2D(ix + 1, iy + 1, seed)
  const ux = fx * fx * (3 - 2 * fx)
  const uy = fy * fy * (3 - 2 * fy)
  return a * (1 - ux) * (1 - uy) + b * ux * (1 - uy) + c * (1 - ux) * uy + d * ux * uy
}

function getTerrainAt(wx, wy) {
  const seed = 42
  const e = smoothNoise(wx, wy, seed, 40) * 0.5
          + smoothNoise(wx, wy, seed + 100, 20) * 0.3
          + smoothNoise(wx, wy, seed + 200, 10) * 0.2
  const m = smoothNoise(wx, wy, seed + 500, 30)

  const cx = WORLD_SIZE / 2, cy = WORLD_SIZE / 2
  const dist = Math.sqrt((wx - cx) ** 2 + (wy - cy) ** 2) / (WORLD_SIZE * 0.4)

  if (dist > 0.85 + e * 0.2) return TERRAIN.DEEP_WATER
  if (dist > 0.75 + e * 0.15) return TERRAIN.WATER
  if (e < 0.28) return TERRAIN.SAND
  if (e < 0.45) return m > 0.5 ? TERRAIN.DARK_GRASS : TERRAIN.GRASS
  if (e < 0.6) return m > 0.6 ? TERRAIN.FOREST : TERRAIN.DARK_GRASS
  if (e < 0.72) return TERRAIN.STONE
  return TERRAIN.DIRT
}

function generateChunk(cx, cy) {
  const key = `${cx},${cy}`
  if (state.chunks.has(key)) return state.chunks.get(key)
  const tiles = []
  for (let ly = 0; ly < CHUNK_SIZE; ly++) {
    const row = []
    for (let lx = 0; lx < CHUNK_SIZE; lx++) {
      const wx = cx * CHUNK_SIZE + lx
      const wy = cy * CHUNK_SIZE + ly
      row.push(getTerrainAt(wx, wy))
    }
    tiles.push(row)
  }
  const chunk = { cx, cy, tiles }
  state.chunks.set(key, chunk)
  return chunk
}

function generateRoads() {
  const cx = Math.floor(WORLD_SIZE / 2)
  const cy = Math.floor(WORLD_SIZE / 2)
  for (let i = -20; i <= 20; i++) {
    for (const off of [-2, -1, 0, 1, 2]) {
      const h1 = getTerrainAt(cx + i, cy + off)
      if (h1 !== TERRAIN.WATER && h1 !== TERRAIN.DEEP_WATER) {
        const ck = chunkKey(cx + i, cy + off)
        if (state.chunks.has(ck)) {
          const c = state.chunks.get(ck)
          c.tiles[(cy + off) % CHUNK_SIZE][(cx + i) % CHUNK_SIZE] = TERRAIN.ROAD
        }
      }
      const v1 = getTerrainAt(cx + off, cy + i)
      if (v1 !== TERRAIN.WATER && v1 !== TERRAIN.DEEP_WATER) {
        const ck = chunkKey(cx + off, cy + i)
        if (state.chunks.has(ck)) {
          const c = state.chunks.get(ck)
          c.tiles[(cy + i) % CHUNK_SIZE][(cx + off) % CHUNK_SIZE] = TERRAIN.ROAD
        }
      }
    }
  }
}

function chunkKey(wx, wy) {
  return `${Math.floor(wx / CHUNK_SIZE)},${Math.floor(wy / CHUNK_SIZE)}`
}

function generateNPCs() {
  const rng = seededRandom(777)
  const routineKeys = Object.keys(NPC_ROUTINES)
  const npcTypes = ['walker', 'vendor', 'guard', 'merchant', 'wanderer', 'worker']
  const npcColors = ['#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#ec4899','#8b5cf6','#14b8a6']
  
  for (let i = 0; i < 50; i++) {
    const angle = rng() * Math.PI * 2
    const dist = 5 + rng() * 35
    const nx = WORLD_SIZE / 2 + Math.cos(angle) * dist
    const ny = WORLD_SIZE / 2 + Math.sin(angle) * dist
    const t = getTerrainAt(Math.floor(nx), Math.floor(ny))
    if (t >= TERRAIN.SAND && t <= TERRAIN.DIRT) {
      const routine = routineKeys[Math.floor(rng() * routineKeys.length)]
      const type = npcTypes[Math.floor(rng() * npcTypes.length)]
      const homeX = nx, homeY = ny
      
      state.npcs.push({
        x: nx, y: ny, tx: nx, ty: ny,
        homeX, homeY,
        speed: 0.3 + rng() * 0.6,
        color: npcColors[Math.floor(rng() * npcColors.length)],
        name: ['Citizen','Walker','Drifter','Runner','Lurker','Stranger','Trader','Guard','Worker','Villager'][Math.floor(rng() * 10)] + ' ' + (i + 1),
        moveTimer: rng() * 5,
        type: type,
        routine: routine,
        routineData: NPC_ROUTINES[routine],
        state: 'idle',
        stateTimer: 0,
        mood: 0.5 + rng() * 0.5,
        energy: 0.8 + rng() * 0.2,
        targetBuilding: null,
        carrying: rng() > 0.7 ? ['\u{1F4E6}','\u{1F33D}','\u{1F4B0}','\u2694\uFE0F'][Math.floor(rng() * 4)] : null,
        direction: 0,
        animFrame: 0,
        animTimer: 0
      })
    }
  }
}

function updateNPCRoutine(npc, dt) {
  const t = state.time
  const r = npc.routineData
  
  let shouldBe = 'idle'
  if (t >= r.sleepStart || t < r.sleepEnd) {
    shouldBe = 'sleeping'
  } else if (t >= r.workStart && t < r.workEnd) {
    shouldBe = 'working'
  } else {
    shouldBe = 'leisure'
  }
  
  if (shouldBe !== npc.state) {
    npc.state = shouldBe
    npc.stateTimer = 0
    
    if (shouldBe === 'sleeping') {
      npc.tx = npc.homeX
      npc.ty = npc.homeY
      npc.speed = 0.4
    } else if (shouldBe === 'working') {
      if (npc.type === 'vendor' || npc.type === 'merchant') {
        npc.tx = npc.homeX + (Math.random() - 0.5) * 3
        npc.ty = npc.homeY + (Math.random() - 0.5) * 3
      } else {
        const angle = Math.random() * Math.PI * 2
        const dist = 5 + Math.random() * 10
        npc.tx = Math.max(2, Math.min(WORLD_SIZE - 3, npc.homeX + Math.cos(angle) * dist))
        npc.ty = Math.max(2, Math.min(WORLD_SIZE - 3, npc.homeY + Math.sin(angle) * dist))
      }
      npc.speed = 0.5 + Math.random() * 0.4
    } else if (shouldBe === 'leisure') {
      const angle = Math.random() * Math.PI * 2
      const dist = 2 + Math.random() * 8
      npc.tx = Math.max(2, Math.min(WORLD_SIZE - 3, npc.homeX + Math.cos(angle) * dist))
      npc.ty = Math.max(2, Math.min(WORLD_SIZE - 3, npc.homeY + Math.sin(angle) * dist))
      npc.speed = 0.2 + Math.random() * 0.3
    }
  }
  
  if (npc.state === 'sleeping') {
    npc.energy = Math.min(1, npc.energy + dt * 0.1)
  } else {
    npc.energy = Math.max(0.1, npc.energy - dt * 0.01)
  }
}

function updateNPCs(dt) {
  for (const npc of state.npcs) {
    updateNPCRoutine(npc, dt)
    
    npc.stateTimer += dt
    npc.animTimer += dt
    if (npc.animTimer > 0.3) {
      npc.animTimer = 0
      npc.animFrame = (npc.animFrame + 1) % 4
    }
    
    if (npc.state === 'sleeping') {
      const ddx = npc.tx - npc.x, ddy = npc.ty - npc.y
      const dd = Math.sqrt(ddx * ddx + ddy * ddy)
      if (dd < 0.5) {
        npc.moveTimer = 999
        continue
      }
    }
    
    npc.moveTimer -= dt
    if (npc.moveTimer <= 0 && npc.state !== 'sleeping') {
      npc.moveTimer = 2 + Math.random() * 5
      
      if (npc.state === 'working') {
        if (npc.type === 'vendor' || npc.type === 'merchant') {
          npc.tx = npc.homeX + (Math.random() - 0.5) * 4
          npc.ty = npc.homeY + (Math.random() - 0.5) * 4
        } else {
          const angle = Math.random() * Math.PI * 2
          const dist = 3 + Math.random() * 8
          npc.tx = Math.max(2, Math.min(WORLD_SIZE - 3, npc.x + Math.cos(angle) * dist))
          npc.ty = Math.max(2, Math.min(WORLD_SIZE - 3, npc.y + Math.sin(angle) * dist))
        }
      } else if (npc.state === 'leisure') {
        const angle = Math.random() * Math.PI * 2
        const dist = 2 + Math.random() * 6
        npc.tx = Math.max(2, Math.min(WORLD_SIZE - 3, npc.x + Math.cos(angle) * dist))
        npc.ty = Math.max(2, Math.min(WORLD_SIZE - 3, npc.y + Math.sin(angle) * dist))
      }
      
      const t = getTerrainAt(Math.floor(npc.tx), Math.floor(npc.ty))
      if (t === TERRAIN.DEEP_WATER || t === TERRAIN.WATER) {
        npc.tx = npc.x
        npc.ty = npc.y
      }
    }
    
    const ddx = npc.tx - npc.x, ddy = npc.ty - npc.y
    const dd = Math.sqrt(ddx * ddx + ddy * ddy)
    if (dd > 0.2) {
      const speedMult = npc.state === 'sleeping' ? 0.5 : (npc.state === 'leisure' ? 0.7 : 1)
      const weatherMult = state.weather.type === 'storm' ? 0.6 : (state.weather.type === 'rain' ? 0.8 : 1)
      const actualSpeed = npc.speed * speedMult * weatherMult * dt
      npc.x += (ddx / dd) * actualSpeed
      npc.y += (ddy / dd) * actualSpeed
      npc.direction = Math.atan2(ddy, ddx)
    }
  }
}

function updateWeather(dt) {
  const w = state.weather
  w.timer += dt
  
  if (w.timer >= w.nextChange) {
    w.timer = 0
    w.nextChange = 20 + Math.random() * 40
    
    const roll = Math.random()
    if (roll < 0.4) w.type = 'clear'
    else if (roll < 0.65) w.type = 'cloudy'
    else if (roll < 0.85) w.type = 'rain'
    else if (roll < 0.95) w.type = 'storm'
    else w.type = 'fog'
    
    w.targetIntensity = w.type === 'clear' ? 0 : (w.type === 'cloudy' ? 0.3 : (w.type === 'fog' ? 0.5 : 0.7 + Math.random() * 0.3))
    
    if (w.type === 'storm' || w.type === 'rain') {
      w.wind.x = (Math.random() - 0.5) * 2
      w.wind.y = 0.5 + Math.random() * 0.5
    }
    
    if (w.type === 'fog') {
      w.fogDensity = 0.3 + Math.random() * 0.4
    } else {
      w.fogDensity = 0
    }
  }
  
  w.intensity += (w.targetIntensity - w.intensity) * dt * 0.5
  
  if (w.type === 'storm' && Math.random() < 0.005) {
    w.lightning = 1
  }
  if (w.lightning > 0) {
    w.lightning = Math.max(0, w.lightning - dt * 3)
  }
}

function updateParticles(dt) {
  const w = state.weather
  
  if ((w.type === 'rain' || w.type === 'storm') && w.intensity > 0.1) {
    const count = Math.floor(w.intensity * 10)
    for (let i = 0; i < count; i++) {
      state.particles.push({
        x: state.player.x + (Math.random() - 0.5) * 40,
        y: state.player.y + (Math.random() - 0.5) * 40,
        vx: w.wind.x * 2,
        vy: 3 + Math.random() * 2,
        life: 1,
        type: 'rain'
      })
    }
  }
  
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i]
    p.x += p.vx * dt
    p.y += p.vy * dt
    p.life -= dt * (p.type === 'rain' ? 2 : 1)
    
    if (p.life <= 0) {
      state.particles.splice(i, 1)
    }
  }
  
  if (state.particles.length > 500) {
    state.particles.splice(0, state.particles.length - 500)
  }
}

function updateEvents(dt) {
  state.eventTimer += dt
  
  if (state.eventTimer >= state.nextEvent) {
    state.eventTimer = 0
    state.nextEvent = 45 + Math.random() * 75
    
    const template = WORLD_EVENTS[Math.floor(Math.random() * WORLD_EVENTS.length)]
    const ex = state.player.x + (Math.random() - 0.5) * 30
    const ey = state.player.y + (Math.random() - 0.5) * 30
    
    const evt = {
      ...template,
      x: Math.max(2, Math.min(WORLD_SIZE - 3, ex)),
      y: Math.max(2, Math.min(WORLD_SIZE - 3, ey)),
      timer: template.duration,
      startTime: performance.now()
    }
    
    state.events.push(evt)
    showToast(evt.icon + ' ' + evt.name, evt.desc)
    addChatMessage('', `${evt.icon} ${evt.name} â€” ${evt.desc}`, true)
  }
  
  for (let i = state.events.length - 1; i >= 0; i--) {
    state.events[i].timer -= dt
    if (state.events[i].timer <= 0) {
      state.events.splice(i, 1)
    }
  }
}

function drawWeatherEffects(w, h) {
  const weather = state.weather
  
  if (weather.type !== 'clear') {
    const colors = WEATHER_COLORS[weather.type]
    if (colors.sky) {
      ctx.fillStyle = colors.sky
      ctx.fillRect(0, 0, w, h)
    }
  }
  
  if (weather.fogDensity > 0) {
    const gradient = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w * 0.7)
    gradient.addColorStop(0, `rgba(200,200,220,0)`)
    gradient.addColorStop(1, `rgba(200,200,220,${weather.fogDensity * 0.5})`)
    ctx.fillStyle = gradient
    ctx.fillRect(0, 0, w, h)
  }
  
  for (const p of state.particles) {
    if (p.type === 'rain') {
      const s = worldToScreen(p.x, p.y)
      if (s.x < 0 || s.x > w || s.y < 0 || s.y > h) continue
      ctx.strokeStyle = `rgba(150,180,220,${p.life * 0.6})`
      ctx.lineWidth = 1
      ctx.beginPath()
      ctx.moveTo(s.x, s.y)
      ctx.lineTo(s.x + p.vx * 2, s.y + p.vy * 2)
      ctx.stroke()
    }
  }
  
  if (weather.lightning > 0) {
    ctx.fillStyle = `rgba(255,255,255,${weather.lightning * 0.4})`
    ctx.fillRect(0, 0, w, h)
  }
}

function drawWorldEvents() {
  for (const evt of state.events) {
    const s = worldToScreen(evt.x, evt.y)
    const pulse = Math.sin(performance.now() * 0.005) * 0.3 + 0.7
    const radius = evt.radius * TILE_W * state.camera.zoom * 0.5
    
    ctx.beginPath()
    ctx.arc(s.x, s.y, radius, 0, Math.PI * 2)
    const gradient = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, radius)
    
    if (evt.type === 'meteor') {
      gradient.addColorStop(0, `rgba(255,100,0,${0.4 * pulse})`)
      gradient.addColorStop(1, 'rgba(255,50,0,0)')
    } else if (evt.type === 'treasure') {
      gradient.addColorStop(0, `rgba(255,215,0,${0.5 * pulse})`)
      gradient.addColorStop(1, 'rgba(255,180,0,0)')
    } else if (evt.type === 'portal') {
      gradient.addColorStop(0, `rgba(138,43,226,${0.5 * pulse})`)
      gradient.addColorStop(1, 'rgba(75,0,130,0)')
    } else if (evt.type === 'blessing') {
      gradient.addColorStop(0, `rgba(255,255,200,${0.4 * pulse})`)
      gradient.addColorStop(1, 'rgba(255,255,150,0)')
    } else {
      gradient.addColorStop(0, `rgba(200,100,50,${0.3 * pulse})`)
      gradient.addColorStop(1, 'rgba(150,50,0,0)')
    }
    
    ctx.fillStyle = gradient
    ctx.fill()
    
    ctx.font = `${Math.max(16, 24 * state.camera.zoom)}px Inter`
    ctx.textAlign = 'center'
    ctx.fillStyle = `rgba(255,255,255,${pulse})`
    ctx.fillText(evt.icon, s.x, s.y - 10 * state.camera.zoom)
  }
}

function worldToScreen(wx, wy) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2)
  const logicalWidth = canvas.width / dpr
  const logicalHeight = canvas.height / dpr
  const iso_x = (wx - wy) * (TILE_W / 2)
  const iso_y = (wx + wy) * (TILE_H / 2)
  return {
    x: (iso_x - state.camera.x) * state.camera.zoom + logicalWidth / 2,
    y: (iso_y - state.camera.y) * state.camera.zoom + logicalHeight / 2
  }
}

function screenToWorld(sx, sy) {
  const dpr = Math.min(window.devicePixelRatio || 1, 2)
  const logicalWidth = canvas.width / dpr
  const logicalHeight = canvas.height / dpr
  const rx = (sx - logicalWidth / 2) / state.camera.zoom + state.camera.x
  const ry = (sy - logicalHeight / 2) / state.camera.zoom + state.camera.y
  const wx = (rx / (TILE_W / 2) + ry / (TILE_H / 2)) / 2
  const wy = (ry / (TILE_H / 2) - rx / (TILE_W / 2)) / 2
  return { x: wx, y: wy }
}

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2)
  canvas.width = window.innerWidth * dpr
  canvas.height = window.innerHeight * dpr
  canvas.style.width = window.innerWidth + 'px'
  canvas.style.height = window.innerHeight + 'px'
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
}

function getDaylightColor() {
  const t = state.time
  if (t < 0.2 || t > 0.8) return { r: 10, g: 10, b: 40, a: 0.45 }
  if (t < 0.3) {
    const f = (t - 0.2) / 0.1
    return { r: 10 + f * 240, g: 10 + f * 200, b: 40 + f * 100, a: 0.45 * (1 - f) }
  }
  if (t > 0.7) {
    const f = (0.8 - t) / 0.1
    return { r: 10 + f * 240, g: 10 + f * 200, b: 40 + f * 100, a: 0.45 * (1 - f) }
  }
  if (t < 0.35) {
    const f = (t - 0.3) / 0.05
    return { r: 250 - f * 240, g: 210 - f * 195, b: 140 - f * 100, a: 0.08 * (1 - f) }
  }
  return { r: 0, g: 0, b: 0, a: 0 }
}

function getTimeIcon() {
  const t = state.time
  if (t < 0.2 || t > 0.8) return '\u{1F319}'
  if (t < 0.3 || t > 0.7) return '\u{1F305}'
  return '\u2600\uFE0F'
}

function getTimeString() {
  const hours = Math.floor(state.time * 24)
  const mins = Math.floor((state.time * 24 - hours) * 60)
  return `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}`
}

function drawTile(x, y, terrain) {
  const s = worldToScreen(x, y)
  const hw = (TILE_W / 2) * state.camera.zoom
  const hh = (TILE_H / 2) * state.camera.zoom

  if (s.x < -hw * 2 || s.x > canvas.width + hw * 2 || s.y < -hh * 4 || s.y > canvas.height + hh * 4) return

  const colors = TERRAIN_COLORS[terrain] || TERRAIN_COLORS[TERRAIN.GRASS]
  const topColor = colors[0]
  const sideColor = colors[1]

  ctx.beginPath()
  ctx.moveTo(s.x, s.y - hh)
  ctx.lineTo(s.x + hw, s.y)
  ctx.lineTo(s.x, s.y + hh)
  ctx.lineTo(s.x - hw, s.y)
  ctx.closePath()
  ctx.fillStyle = topColor
  ctx.fill()

  if (terrain === TERRAIN.BUILDING || terrain === TERRAIN.FOREST) {
    const elev = terrain === TERRAIN.BUILDING ? 12 : 6
    const eh = elev * state.camera.zoom
    ctx.beginPath()
    ctx.moveTo(s.x - hw, s.y)
    ctx.lineTo(s.x, s.y + hh)
    ctx.lineTo(s.x, s.y + hh - eh)
    ctx.lineTo(s.x - hw, s.y - eh)
    ctx.closePath()
    ctx.fillStyle = sideColor
    ctx.fill()

    ctx.beginPath()
    ctx.moveTo(s.x + hw, s.y)
    ctx.lineTo(s.x, s.y + hh)
    ctx.lineTo(s.x, s.y + hh - eh)
    ctx.lineTo(s.x + hw, s.y - eh)
    ctx.closePath()
    const rc = parseInt(sideColor.slice(1), 16)
    const r = Math.min(255, ((rc >> 16) & 0xff) + 20)
    const g = Math.min(255, ((rc >> 8) & 0xff) + 20)
    const b = Math.min(255, (rc & 0xff) + 20)
    ctx.fillStyle = `rgb(${r},${g},${b})`
    ctx.fill()

    ctx.beginPath()
    ctx.moveTo(s.x, s.y - hh - eh)
    ctx.lineTo(s.x + hw, s.y - eh)
    ctx.lineTo(s.x, s.y + hh - eh)
    ctx.lineTo(s.x - hw, s.y - eh)
    ctx.closePath()
    ctx.fillStyle = topColor
    ctx.fill()
  }

  ctx.beginPath()
  ctx.moveTo(s.x, s.y - hh)
  ctx.lineTo(s.x + hw, s.y)
  ctx.lineTo(s.x, s.y + hh)
  ctx.lineTo(s.x - hw, s.y)
  ctx.closePath()
  ctx.strokeStyle = 'rgba(0,0,0,0.08)'
  ctx.lineWidth = 0.5
  ctx.stroke()
}

function drawBuilding(building) {
  const type = BUILDING_TYPES[building.building_type]
  if (!type) return
  
  const s = worldToScreen(building.tile_x, building.tile_y)
  const hw = (TILE_W / 2) * state.camera.zoom
  const hh = (TILE_H / 2) * state.camera.zoom
  const elev = type.height * state.camera.zoom
  
  if (s.x < -hw * 2 || s.x > canvas.width + hw * 2 || s.y < -hh * 4 - elev || s.y > canvas.height + hh * 4) return
  
  const condition = building.condition || 100
  const conditionMult = condition / 100
  const baseColor = type.color
  
  const rc = parseInt(baseColor.slice(1), 16)
  const r = Math.floor(((rc >> 16) & 0xff) * conditionMult)
  const g = Math.floor(((rc >> 8) & 0xff) * conditionMult)
  const b = Math.floor((rc & 0xff) * conditionMult)
  
  const topColor = `rgb(${r},${g},${b})`
  const sideColor = `rgb(${Math.floor(r * 0.7)},${Math.floor(g * 0.7)},${Math.floor(b * 0.7)})`
  const lightColor = `rgb(${Math.min(255, Math.floor(r * 1.2))},${Math.min(255, Math.floor(g * 1.2))},${Math.min(255, Math.floor(b * 1.2))})`
  
  ctx.beginPath()
  ctx.moveTo(s.x - hw, s.y)
  ctx.lineTo(s.x, s.y + hh)
  ctx.lineTo(s.x, s.y + hh - elev)
  ctx.lineTo(s.x - hw, s.y - elev)
  ctx.closePath()
  ctx.fillStyle = sideColor
  ctx.fill()
  
  ctx.beginPath()
  ctx.moveTo(s.x + hw, s.y)
  ctx.lineTo(s.x, s.y + hh)
  ctx.lineTo(s.x, s.y + hh - elev)
  ctx.lineTo(s.x + hw, s.y - elev)
  ctx.closePath()
  ctx.fillStyle = lightColor
  ctx.fill()
  
  ctx.beginPath()
  ctx.moveTo(s.x, s.y - hh - elev)
  ctx.lineTo(s.x + hw, s.y - elev)
  ctx.lineTo(s.x, s.y + hh - elev)
  ctx.lineTo(s.x - hw, s.y - elev)
  ctx.closePath()
  ctx.fillStyle = topColor
  ctx.fill()
  
  if (building.owner_id && state.camera.zoom > 0.6) {
    ctx.strokeStyle = 'rgba(167,139,250,0.6)'
    ctx.lineWidth = 2
    ctx.beginPath()
    ctx.moveTo(s.x, s.y - hh - elev)
    ctx.lineTo(s.x + hw, s.y - elev)
    ctx.lineTo(s.x, s.y + hh - elev)
    ctx.lineTo(s.x - hw, s.y - elev)
    ctx.closePath()
    ctx.stroke()
  }
  
  if (condition < 50 && state.camera.zoom > 0.5) {
    ctx.font = `${8 * state.camera.zoom}px Inter`
    ctx.textAlign = 'center'
    ctx.fillStyle = condition < 25 ? '#ef4444' : '#f59e0b'
    ctx.fillText(condition < 25 ? '\u26A0' : '\u{1F6A7}', s.x, s.y - elev - 5 * state.camera.zoom)
  }
}

function drawDistrict(district) {
  const s = worldToScreen(district.center_x, district.center_y)
  const radius = district.radius * TILE_W * state.camera.zoom * 0.3
  
  if (s.x < -radius || s.x > canvas.width + radius || s.y < -radius || s.y > canvas.height + radius) return
  
  ctx.beginPath()
  ctx.arc(s.x, s.y, radius, 0, Math.PI * 2)
  ctx.strokeStyle = 'rgba(167,139,250,0.3)'
  ctx.lineWidth = 2
  ctx.setLineDash([5, 5])
  ctx.stroke()
  ctx.setLineDash([])
  
  if (state.camera.zoom > 0.4) {
    ctx.font = `bold ${12 * state.camera.zoom}px Inter`
    ctx.textAlign = 'center'
    ctx.fillStyle = 'rgba(0,0,0,0.5)'
    ctx.fillText(district.name, s.x + 1, s.y - radius - 9)
    ctx.fillStyle = 'rgba(167,139,250,0.9)'
    ctx.fillText(district.name, s.x, s.y - radius - 10)
  }
}

function drawEntity(wx, wy, color, name, isPlayer) {
  const s = worldToScreen(wx, wy)
  const sz = (isPlayer ? 10 : 7) * state.camera.zoom

  if (s.x < -30 || s.x > canvas.width + 30 || s.y < -50 || s.y > canvas.height + 30) return

  ctx.beginPath()
  ctx.ellipse(s.x, s.y + 2 * state.camera.zoom, sz * 0.6, sz * 0.3, 0, 0, Math.PI * 2)
  ctx.fillStyle = 'rgba(0,0,0,0.25)'
  ctx.fill()

  ctx.beginPath()
  ctx.arc(s.x, s.y - sz, sz, 0, Math.PI * 2)
  ctx.fillStyle = color
  ctx.fill()
  ctx.strokeStyle = isPlayer ? '#fff' : 'rgba(255,255,255,0.3)'
  ctx.lineWidth = isPlayer ? 2 : 1
  ctx.stroke()

  if (isPlayer) {
    ctx.beginPath()
    ctx.arc(s.x, s.y - sz, sz + 3, 0, Math.PI * 2)
    ctx.strokeStyle = 'rgba(167,139,250,0.4)'
    ctx.lineWidth = 1.5
    ctx.stroke()
  }

  if (name && state.camera.zoom > 0.5) {
    ctx.font = `${Math.max(9, 11 * state.camera.zoom)}px Inter, sans-serif`
    ctx.textAlign = 'center'
    ctx.fillStyle = 'rgba(0,0,0,0.6)'
    ctx.fillText(name, s.x + 1, s.y - sz * 2 + 1)
    ctx.fillStyle = isPlayer ? '#fff' : 'rgba(255,255,255,0.7)'
    ctx.fillText(name, s.x, s.y - sz * 2)
  }
}

function drawMinimap() {
  if (!state.minimapOpen) return
  const mw = miniCanvas.width, mh = miniCanvas.height
  miniCtx.fillStyle = '#0a0b10'
  miniCtx.fillRect(0, 0, mw, mh)

  const scale = mw / WORLD_SIZE
  for (let y = 0; y < WORLD_SIZE; y += 2) {
    for (let x = 0; x < WORLD_SIZE; x += 2) {
      const t = getTerrainAt(x, y)
      miniCtx.fillStyle = TERRAIN_COLORS[t][0]
      miniCtx.fillRect(x * scale, y * scale, scale * 2 + 1, scale * 2 + 1)
    }
  }

  for (const [, p] of state.otherPlayers) {
    miniCtx.fillStyle = '#a78bfa'
    miniCtx.fillRect(p.x * scale - 2, p.y * scale - 2, 4, 4)
  }

  miniCtx.fillStyle = '#fff'
  miniCtx.fillRect(state.player.x * scale - 3, state.player.y * scale - 3, 6, 6)
  miniCtx.strokeStyle = 'rgba(167,139,250,0.6)'
  miniCtx.lineWidth = 1.5
  miniCtx.strokeRect(state.player.x * scale - 3, state.player.y * scale - 3, 6, 6)

  const vw = (canvas.width / state.camera.zoom / (TILE_W * WORLD_SIZE * 0.5)) * mw
  const vh = (canvas.height / state.camera.zoom / (TILE_H * WORLD_SIZE * 0.5)) * mh
  miniCtx.strokeStyle = 'rgba(255,255,255,0.25)'
  miniCtx.lineWidth = 1
  miniCtx.strokeRect(
    state.player.x * scale - vw / 2,
    state.player.y * scale - vh / 2,
    vw, vh
  )
}

function render() {
  const w = canvas.width / (Math.min(window.devicePixelRatio || 1, 2))
  const h = canvas.height / (Math.min(window.devicePixelRatio || 1, 2))

  ctx.fillStyle = '#0a0b10'
  ctx.fillRect(0, 0, w, h)

  const px = Math.floor(state.player.x)
  const py = Math.floor(state.player.y)
  const viewRange = Math.ceil(Math.max(w, h) / (TILE_H * state.camera.zoom)) + 4

  const minCX = Math.floor((px - viewRange) / CHUNK_SIZE)
  const maxCX = Math.floor((px + viewRange) / CHUNK_SIZE)
  const minCY = Math.floor((py - viewRange) / CHUNK_SIZE)
  const maxCY = Math.floor((py + viewRange) / CHUNK_SIZE)

  for (let cy = minCY; cy <= maxCY; cy++) {
    for (let cx = minCX; cx <= maxCX; cx++) {
      generateChunk(cx, cy)
    }
  }

  const drawOrder = []
  for (const [key, chunk] of state.chunks) {
    for (let ly = 0; ly < CHUNK_SIZE; ly++) {
      for (let lx = 0; lx < CHUNK_SIZE; lx++) {
        const wx = chunk.cx * CHUNK_SIZE + lx
        const wy = chunk.cy * CHUNK_SIZE + ly
        if (wx < 0 || wy < 0 || wx >= WORLD_SIZE || wy >= WORLD_SIZE) continue
        const s = worldToScreen(wx, wy)
        if (s.x < -TILE_W * state.camera.zoom || s.x > w + TILE_W * state.camera.zoom ||
            s.y < -TILE_H * state.camera.zoom * 4 || s.y > h + TILE_H * state.camera.zoom * 4) continue
        drawOrder.push({ type: 'tile', x: wx, y: wy, terrain: chunk.tiles[ly][lx], sort: wx + wy })
      }
    }
  }

  drawOrder.push({ type: 'player', x: state.player.x, y: state.player.y, sort: state.player.x + state.player.y })
  for (const [, p] of state.otherPlayers) {
    drawOrder.push({ type: 'other', x: p.x, y: p.y, sort: p.x + p.y, data: p })
  }
  for (const npc of state.npcs) {
    drawOrder.push({ type: 'npc', x: npc.x, y: npc.y, sort: npc.x + npc.y, data: npc })
  }
  for (const building of state.buildings) {
    drawOrder.push({ type: 'building', x: building.tile_x, y: building.tile_y, sort: building.tile_x + building.tile_y, data: building })
  }

  drawOrder.sort((a, b) => a.sort - b.sort)

  for (const district of state.districts) {
    drawDistrict(district)
  }

  for (const item of drawOrder) {
    if (item.type === 'tile') drawTile(item.x, item.y, item.terrain)
    else if (item.type === 'building') drawBuilding(item.data)
    else if (item.type === 'player') drawEntity(item.x, item.y, state.player.color, state.player.name, true)
    else if (item.type === 'other') drawEntity(item.x, item.y, '#8b5cf6', item.data.name, false)
    else if (item.type === 'npc') {
      const npc = item.data
      drawEntity(item.x, item.y, npc.color, npc.name, false)
      
      if (state.camera.zoom > 0.6) {
        const s = worldToScreen(item.x, item.y)
        
        if (npc.type === 'vendor' || npc.type === 'merchant') {
          ctx.font = `${10 * state.camera.zoom}px Inter`
          ctx.textAlign = 'center'
          ctx.fillText('\u{1F3EA}', s.x, s.y - 22 * state.camera.zoom)
        }
        
        if (npc.state === 'sleeping') {
          ctx.font = `${8 * state.camera.zoom}px Inter`
          ctx.textAlign = 'center'
          ctx.fillStyle = 'rgba(150,150,255,0.7)'
          const zzz = Math.sin(performance.now() * 0.003) > 0 ? 'Z' : 'z'
          ctx.fillText(zzz + 'z' + 'z', s.x + 8 * state.camera.zoom, s.y - 18 * state.camera.zoom)
        } else if (npc.state === 'working' && npc.carrying) {
          ctx.font = `${8 * state.camera.zoom}px Inter`
          ctx.textAlign = 'center'
          ctx.fillText(npc.carrying, s.x + 10 * state.camera.zoom, s.y - 12 * state.camera.zoom)
        }
        
        if (npc.type === 'guard') {
          ctx.font = `${8 * state.camera.zoom}px Inter`
          ctx.textAlign = 'center'
          ctx.fillText('\u2694\uFE0F', s.x - 10 * state.camera.zoom, s.y - 12 * state.camera.zoom)
        }
      }
    }
  }

  const dl = getDaylightColor()
  if (dl.a > 0.01) {
    ctx.fillStyle = `rgba(${dl.r},${dl.g},${dl.b},${dl.a})`
    ctx.fillRect(0, 0, w, h)
  }

  drawWeatherEffects(w, h)
  drawWorldEvents()

  drawMinimap()

  document.getElementById('coordBadge').textContent = `${Math.floor(state.player.x)}, ${Math.floor(state.player.y)}`
  document.getElementById('timeIcon').innerHTML = getTimeIcon()
  document.getElementById('timeText').textContent = getTimeString()
  
  const weatherIcons = { clear: '\u2600\uFE0F', cloudy: '\u2601\uFE0F', rain: '\u{1F327}\uFE0F', storm: '\u26C8\uFE0F', fog: '\u{1F32B}\uFE0F' }
  document.getElementById('weatherIcon').textContent = weatherIcons[state.weather.type] || ''
}

function update(dt) {
  if (state.serverTime !== undefined) {
    state.time += (state.serverTime - state.time) * 0.05
  } else {
    state.time = (state.time + state.timeSpeed * dt) % 1
  }

  let dx = 0, dy = 0
  if (state.joystick.active) {
    dx = state.joystick.dx
    dy = state.joystick.dy
  } else {
    if (state.keys.has('w') || state.keys.has('arrowup')) dy -= 1
    if (state.keys.has('s') || state.keys.has('arrowdown')) dy += 1
    if (state.keys.has('a') || state.keys.has('arrowleft')) dx -= 1
    if (state.keys.has('d') || state.keys.has('arrowright')) dx += 1
  }

  if (dx !== 0 || dy !== 0) {
    const len = Math.sqrt(dx * dx + dy * dy)
    dx /= len; dy /= len
    const isoDx = (dx - dy) * 0.707
    const isoDy = (dx + dy) * 0.707
    const nx = state.player.x + isoDx * state.player.speed * dt
    const ny = state.player.y + isoDy * state.player.speed * dt
    const t = getTerrainAt(Math.floor(nx), Math.floor(ny))
    if (t !== TERRAIN.DEEP_WATER && t !== TERRAIN.WATER && nx >= 0 && ny >= 0 && nx < WORLD_SIZE && ny < WORLD_SIZE) {
      state.player.x = nx
      state.player.y = ny
    }
  }

  const targetIsoX = (state.player.x - state.player.y) * (TILE_W / 2)
  const targetIsoY = (state.player.x + state.player.y) * (TILE_H / 2)
  state.camera.x += (targetIsoX - state.camera.x) * 0.15
  state.camera.y += (targetIsoY - state.camera.y) * 0.15
  state.camera.zoom += (state.camera.targetZoom - state.camera.zoom) * 0.1

  updateNPCs(dt)
  updateWeather(dt)
  updateParticles(dt)
  updateEvents(dt)

  for (const npc of state.npcs) {
    if (npc._serverX !== undefined) {
      npc.x += (npc._serverX - npc.x) * 0.1
      npc.y += (npc._serverY - npc.y) * 0.1
      if (npc._serverState) npc.state = npc._serverState
      if (npc._serverDir !== undefined) npc.direction = npc._serverDir
    }
  }

  for (const [, p] of state.otherPlayers) {
    if (p._interp) {
      const elapsed = (performance.now() - p._interpStart) / (p._interpDuration || 200)
      if (elapsed < 1) {
        p.x = p._fromX + (p.tx - p._fromX) * elapsed
        p.y = p._fromY + (p.ty - p._fromY) * elapsed
      } else {
        p.x = p.tx; p.y = p.ty
        p._interp = false
      }
    }
  }

  const maxDist = (WORLD_SIZE / CHUNK_SIZE) * TILE_W
  const pruneKeys = []
  for (const [key] of state.chunks) {
    const [cx, cy] = key.split(',').map(Number)
    const chunkCenterX = (cx + 0.5) * CHUNK_SIZE
    const chunkCenterY = (cy + 0.5) * CHUNK_SIZE
    const dist = Math.sqrt((chunkCenterX - state.player.x) ** 2 + (chunkCenterY - state.player.y) ** 2)
    if (dist > maxDist * 0.7) pruneKeys.push(key)
  }
  for (const key of pruneKeys) state.chunks.delete(key)
}

let lastTime = performance.now()
function gameLoop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.1)
  lastTime = now
  if (state.loaded) {
    update(dt)
    render()
  }
  requestAnimationFrame(gameLoop)
}

function setupKeyboard() {
  window.addEventListener('keydown', e => {
    if (document.activeElement === document.getElementById('chatInput')) return
    state.keys.add(e.key.toLowerCase())
    if (e.key === '+' || e.key === '=') state.camera.targetZoom = Math.min(3, state.camera.targetZoom * 1.2)
    if (e.key === '-') state.camera.targetZoom = Math.max(0.3, state.camera.targetZoom / 1.2)
  })
  window.addEventListener('keyup', e => {
    state.keys.delete(e.key.toLowerCase())
  })

function setupMouse() {
  canvas.addEventListener('mousedown', e => {
    if (e.button === 2 || e.button === 1) {
      state.mouse.down = true
      state.mouse.lastX = e.clientX
      state.mouse.lastY = e.clientY
      state.mouse.dragging = true
      e.preventDefault()
    }
  })
  canvas.addEventListener('mousemove', e => {
    if (state.mouse.dragging) {
      const dx = e.clientX - state.mouse.lastX
      const dy = e.clientY - state.mouse.lastY
      state.camera.x -= dx
      state.camera.y -= dy
      state.mouse.lastX = e.clientX
      state.mouse.lastY = e.clientY
    }
  })
  canvas.addEventListener('mouseup', () => {
    state.mouse.down = false
    state.mouse.dragging = false
  })
  canvas.addEventListener('contextmenu', e => e.preventDefault())

  canvas.addEventListener('wheel', e => {
    e.preventDefault()
    const factor = e.deltaY > 0 ? 0.9 : 1.1
    state.camera.targetZoom = Math.max(0.3, Math.min(3, state.camera.targetZoom * factor))
  }, { passive: false })

  canvas.addEventListener('dblclick', e => {
    const world = screenToWorld(e.clientX, e.clientY)
    state.player.tx = Math.max(0, Math.min(WORLD_SIZE - 1, world.x))
    state.player.ty = Math.max(0, Math.min(WORLD_SIZE - 1, world.y))
  })

  canvas.addEventListener('click', e => {
    if (state.mouse.dragging) return
    
    const world = screenToWorld(e.clientX, e.clientY)
    
    if (state.buildMode && state.buildType) {
      placeBuildingAt(world.x, world.y)
    } else if (state.godMode && state.godPower) {
      triggerGodPower(world.x, world.y)
    } else {
      const clickedBuilding = state.buildings.find(b => {
        const dx = Math.abs(b.tile_x - world.x)
        const dy = Math.abs(b.tile_y - world.y)
        return dx < 1 && dy < 1
      })
      
      if (clickedBuilding) {
        if (clickedBuilding.owner_id === state.userId) {
          openIncomePanel(clickedBuilding.id)
        } else {
          const payRates = { shop: 2, club: 3, warehouse: 1, hide: 5 }
          if (payRates[clickedBuilding.building_type]) {
            openJobPanel(clickedBuilding.id)
          }
        }
      }
    }
  })
}

function setupTouch() {
  const zone = document.getElementById('joystickZone')
  const knob = document.getElementById('joystickKnob')
  const baseR = 65
  const knobR = 26
  let touchId = null
  let centerX = 0, centerY = 0

  zone.addEventListener('touchstart', e => {
    e.preventDefault()
    const touch = e.changedTouches[0]
    touchId = touch.identifier
    const rect = zone.getBoundingClientRect()
    centerX = rect.left + rect.width / 2
    centerY = rect.top + rect.height / 2
    state.joystick.active = true
  }, { passive: false })

  window.addEventListener('touchmove', e => {
    for (const touch of e.changedTouches) {
      if (touch.identifier === touchId) {
        let dx = touch.clientX - centerX
        let dy = touch.clientY - centerY
        const dist = Math.sqrt(dx * dx + dy * dy)
        const maxDist = baseR - knobR
        if (dist > maxDist) {
          dx = (dx / dist) * maxDist
          dy = (dy / dist) * maxDist
        }
        state.joystick.dx = dx / maxDist
        state.joystick.dy = dy / maxDist
        knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`
      }
    }
  }, { passive: false })

  const endJoystick = e => {
    for (const touch of e.changedTouches) {
      if (touch.identifier === touchId) {
        touchId = null
        state.joystick.active = false
        state.joystick.dx = 0
        state.joystick.dy = 0
        knob.style.transform = 'translate(-50%, -50%)'
      }
    }
  }
  window.addEventListener('touchend', endJoystick)
  window.addEventListener('touchcancel', endJoystick)

  let pinchDist = 0
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX
      const dy = e.touches[0].clientY - e.touches[1].clientY
      pinchDist = Math.sqrt(dx * dx + dy * dy)
    }
  }, { passive: true })
  canvas.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX
      const dy = e.touches[0].clientY - e.touches[1].clientY
      const newDist = Math.sqrt(dx * dx + dy * dy)
      if (pinchDist > 0) {
        const scale = newDist / pinchDist
        state.camera.targetZoom = Math.max(0.3, Math.min(3, state.camera.targetZoom * scale))
      }
      pinchDist = newDist
      e.preventDefault()
    }
  }, { passive: false })
}

let currentIncomeBuilding = null
let currentJobBuilding = null
let jobTimer = null

function openIncomePanel(buildingId) {
  const building = state.buildings.find(b => b.id === buildingId)
  if (!building) return
  
  currentIncomeBuilding = building
  const type = BUILDING_TYPES[building.building_type]
  
  document.getElementById('incomeBuildingName').textContent = type.name
  document.getElementById('incomeRate').textContent = building.income_rate
  
  const accumulated = calculateAccumulatedIncome(building)
  document.getElementById('incomeAmount').textContent = accumulated
  
  document.getElementById('incomePanel').classList.add('open')
}

function closeIncomePanel() {
  document.getElementById('incomePanel').classList.remove('open')
  currentIncomeBuilding = null
}

function calculateAccumulatedIncome(building) {
  if (!building.last_collected) return 0
  const now = Date.now()
  const elapsed = now - building.last_collected
  const maxMs = 24 * 60 * 60 * 1000
  const cappedElapsed = Math.min(elapsed, maxMs)
  const minutes = cappedElapsed / 60000
  let income = building.income_rate * minutes
  if (building.in_district) {
    income *= 1.2
  }
  return Math.floor(income)
}

async function collectIncome() {
  if (!currentIncomeBuilding) return
  
  try {
    const res = await fetch('/api/world/income/collect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        userId: state.userId,
        buildingId: currentIncomeBuilding.id
      })
    })
    
    // Check if response is JSON
    const contentType = res.headers.get('content-type')
    if (!contentType || !contentType.includes('application/json')) {
      showToast('Server Offline', 'World API unavailable. Running in offline mode.')
      return
    }
    
    const data = await res.json()
    if (data.ok) {
      if (data.coinsCollected > 0) {
        state.coins = data.newBalance
        state.rep = data.reputation
        document.getElementById('statCoins').textContent = state.coins
        document.getElementById('statRep').textContent = state.rep
        currentIncomeBuilding.last_collected = Date.now()
        showToast('Income Collected', `+${data.coinsCollected} coins`)
        closeIncomePanel()
      } else {
        showToast('No Income', 'Nothing to collect yet')
      }
    } else {
      console.error('[WORLD] collectIncome failed:', res.status, data)
      showToast('Error', data.error || 'Failed to collect income')
    }
  } catch (e) {
    console.error('[WORLD] collectIncome exception:', e)
    showToast('Error', 'Failed to collect income')
  }
}

function startJobProgress() {
  const duration = 30000
  const startTime = state.jobStartTime
  const endTime = startTime + duration
  
  jobTimer = setInterval(() => {
    const now = Date.now()
    const elapsed = now - startTime
    const remaining = Math.max(0, duration - elapsed)
    const progress = Math.min(100, (elapsed / duration) * 100)
    
    document.getElementById('jobProgressInner').style.width = progress + '%'
    document.getElementById('jobProgressText').textContent = `${Math.floor(elapsed / 1000)}s / 30s`
    
    if (remaining <= 0) {
      clearInterval(jobTimer)
      jobTimer = null
      completeJob()
    }
  }, 100)
}

  body.innerHTML = ''
  const me = document.createElement('div')
  me.className = 'player-entry'
  me.innerHTML = `<span class="player-dot" style="background:#a78bfa"></span><span class="player-name">${state.username} (you)</span>`
  body.appendChild(me)

  for (const [, p] of state.otherPlayers) {
    const div = document.createElement('div')
    div.className = 'player-entry'
    div.innerHTML = `<span class="player-dot" style="background:#8b5cf6"></span><span class="player-name">${p.name}</span>`
    body.appendChild(div)
  }
}

function showToast(title, desc) {
  const toast = document.getElementById('toast')
  document.getElementById('toastTitle').textContent = title
  document.getElementById('toastDesc').textContent = desc
  toast.classList.add('show')
  setTimeout(() => toast.classList.remove('show'), 3000)
}

// Account modal helpers
function openAcctModal(tab = 'signin') {
  const m = document.getElementById('acctModal')
  if (!m) return
  m.hidden = false
  setAcctTab(tab)
  const first = m.querySelector('.acct-form:not([hidden]) input')
  if (first) setTimeout(() => first.focus(), 50)
}
function closeAcctModal() {
  const m = document.getElementById('acctModal')
  if (m) m.hidden = true
  document.getElementById('acct-signin-error').textContent = ''
  document.getElementById('acct-create-error').textContent = ''
}
function setAcctTab(tab) {
  document.querySelectorAll('.acct-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab))
  document.querySelectorAll('.acct-form').forEach(f => f.hidden = (f.dataset.tab !== tab))
  document.getElementById('acct-signin-error').textContent = ''
  document.getElementById('acct-create-error').textContent = ''
}
function updateAccountBadge() {
  const nameEl = document.getElementById('accountName')
  const btn = document.getElementById('btnAccount')
  if (!nameEl || !btn) return
  const stored = (function(){ try { return JSON.parse(localStorage.getItem('fas_user')||'null') } catch(e){ return null } })()
  if (stored && stored.username) {
    nameEl.textContent = stored.display || stored.username
    btn.classList.add('signed-in')
    btn.title = Signed in as  — click to manage
  } else {
    nameEl.textContent = 'Guest'
    btn.classList.remove('signed-in')
    btn.title = 'Sign in or create an account'
  }
}
async function handleSignIn(e) {
  e.preventDefault()
  const idEl = document.getElementById('acct-signin-id')
  const pwEl = document.getElementById('acct-signin-pw')
  const btn = document.getElementById('acct-signin-btn')
  const errEl = document.getElementById('acct-signin-error')
  errEl.textContent = ''
  btn.disabled = true
  try {
    const { success, error, session } = await signIn(idEl.value.trim(), pwEl.value)
    if (!success) { errEl.textContent = error || 'Sign-in failed.' ; return }
    state.userId = session.account_id || session.username
    state.username = session.display || session.username
    state.player.name = state.username
    if (typeof fetchPlayerState === 'function') await fetchPlayerState()
    updateAccountBadge()
    closeAcctModal()
    showToast('Signed In', Welcome back, )
  } catch (err) {
    console.error('[WORLD] signIn exception:', err)
    errEl.textContent = err?.message || 'Sign-in failed.'
  } finally {
    btn.disabled = false
  }
}
async function handleCreate(e) {
  e.preventDefault()
  const uEl = document.getElementById('acct-create-username')
  const dEl = document.getElementById('acct-create-display')
  const pEl = document.getElementById('acct-create-pw')
  const btn = document.getElementById('acct-create-btn')
  const errEl = document.getElementById('acct-create-error')
  errEl.textContent = ''
  btn.disabled = true
  try {
    const username = uEl.value.trim().toLowerCase()
    const display = dEl.value.trim() || username
    const { success, error, session } = await createAccount(username, pEl.value, display)
    if (!success) { errEl.textContent = error || 'Account creation failed.' ; return }
    state.userId = session.account_id || session.username
    state.username = session.display || session.username
    state.player.name = state.username
    if (typeof fetchPlayerState === 'function') await fetchPlayerState()
    updateAccountBadge()
    closeAcctModal()
    showToast('Account Created', Welcome, )
  } catch (err) {
    console.error('[WORLD] createAccount exception:', err)
    errEl.textContent = err?.message || 'Account creation failed.'
  } finally {
    btn.disabled = false
  }
}
function handleSignOut() {
  clearStoredSession()
  state.userId = 'local_' + Math.random().toString(36).slice(2, 8)
  state.username = 'guest_' + state.userId.slice(6)
  state.player.name = state.username
  if (typeof fetchPlayerState === 'function') fetchPlayerState()
  updateAccountBadge()
  closeAcctModal()
  showToast('Signed Out', 'You are now playing as a guest.')
}

async function setupMultiplayer() {
  if (!SUPABASE_READY) {
    console.warn('[WORLD] Supabase not ready, running in offline mode')
    return
  }

  try {
    const stored = getStoredSession()
    if (stored && stored.username) {
      state.userId = stored.account_id || stored.username
      state.username = stored.display || stored.username
      state.player.name = state.username
    }
  } catch (e) {
    console.warn('[WORLD] Auth check failed:', e.message)
  }

  if (!state.userId) {
    state.userId = 'local_' + Math.random().toString(36).slice(2, 8)
    state.username = 'guest_' + state.userId.slice(6)
    state.player.name = state.username
  }

  const presenceChannel = supabase.channel('world-presence', {
    config: { presence: { key: state.userId } }
  })

  presenceChannel.on('presence', { event: 'sync' }, () => {
    const presenceState = presenceChannel.presenceState()
    const newPlayers = new Map()
    for (const [id, entries] of Object.entries(presenceState)) {
      if (id === state.userId) continue
      const entry = entries[0]
      if (entry) {
        const existing = state.otherPlayers.get(id)
        newPlayers.set(id, {
          ...entry,
          _interp: existing ? true : false,
          _fromX: existing?.x ?? entry.x,
          _fromY: existing?.y ?? entry.y,
          _interpStart: performance.now(),
          _interpDuration: 200,
        })
      }
    }
    state.otherPlayers = newPlayers
    updatePlayerList()
  })

  presenceChannel.on('presence', { event: 'join' }, ({ key, newPres }) => {
    if (key !== state.userId) {
      addChatMessage('', `${newPres.name || 'anon'} entered the world`, true)
    }
  })

  presenceChannel.on('presence', { event: 'leave' }, ({ key }) => {
    if (key !== state.userId) {
      const p = state.otherPlayers.get(key)
      if (p) addChatMessage('', `${p.name || 'anon'} left the world`, true)
      state.otherPlayers.delete(key)
      updatePlayerList()
    }
  })

  await presenceChannel.subscribe(async (status) => {
    if (status === 'SUBSCRIBED') {
      await presenceChannel.track({
        name: state.username,
        x: state.player.x,
        y: state.player.y,
        color: state.player.color,
        online_at: new Date().toISOString()
      })
    }
  })

  const chatChannel = supabase.channel('world-chat')
  chatChannel.on('broadcast', { event: 'chat' }, ({ payload }) => {
    if (payload.user !== state.username) {
      addChatMessage(payload.user, payload.msg, false)
    }
  })
  await chatChannel.subscribe()

  const serverChannel = supabase.channel('world-server-state')
  serverChannel.on('broadcast', { event: 'world_tick' }, ({ payload }) => {
    if (payload.time !== undefined) state.serverTime = payload.time
    if (payload.weather) {
      state.weather.type = payload.weather.type
      state.weather.intensity = payload.weather.intensity
      state.weather.lightning = payload.weather.lightning
      state.weather.fogDensity = payload.weather.fogDensity
    }
    if (payload.npcs) {
      for (const sn of payload.npcs) {
        const local = state.npcs.find(n => n.id === sn.id)
        if (local) {
          local._serverX = sn.x
          local._serverY = sn.y
          local._serverState = sn.state
          local._serverDir = sn.direction
        }
      }
    }
    if (payload.buildings) {
      state.buildings = payload.buildings
    }
    if (payload.districts) {
      state.districts = payload.districts
    }
    if (payload.events) {
      const existingIds = new Set(state.events.map(e => e.id))
      for (const se of payload.events) {
        if (!existingIds.has(se.id)) {
          const template = WORLD_EVENTS.find(t => t.type === se.type)
          if (template) {
            state.events.push({
              ...template,
              id: se.id,
              x: se.x, y: se.y,
              timer: se.timer,
              startTime: performance.now()
            })
            showToast(template.icon + ' ' + template.name, template.desc)
            addChatMessage('', `${template.icon} ${template.name} â€” ${template.desc}`, true)
          }
        }
      }
    }
  })
  await serverChannel.subscribe()

  setInterval(() => {
    presenceChannel.track({
      name: state.username,
      x: state.player.x,
      y: state.player.y,
      color: state.player.color,
      online_at: new Date().toISOString()
    })
  }, 1000)

  showToast('Connected', 'Welcome to The World')
}

async function fetchPlayerState() {
  if (!state.userId) return
  try {
    const res = await fetch(`/api/world/player/state?userId=${encodeURIComponent(state.userId)}`)
    
    // Check if response is JSON
    const contentType = res.headers.get('content-type')
    if (!contentType || !contentType.includes('application/json')) {
      console.warn('[WORLD] API returned non-JSON response, using offline mode')
      showToast('Server Offline', 'World API unavailable. Running in offline mode.')
      return
    }
    
    const data = await res.json()
    if (data.ok) {
      state.coins = data.coins
      state.rep = data.reputation
      state.repLevel = data.repLevel
      state.repLevelIndex = data.repLevelIndex
      state.repMin = data.repMin
      state.repMax = data.repMax
      state.repProgress = data.repProgress
      document.getElementById('statCoins').textContent = state.coins
      document.getElementById('statRep').textContent = state.rep
      updateRepBarUI()
    } else {
      console.warn('[WORLD] Player state fetch failed:', data.error)
    }
  } catch (e) {
    console.warn('[WORLD] Failed to fetch player state:', e.message)
    showToast('Connection Error', 'Failed to load player data. Using offline mode.')
  }
}

function updateRepBarUI() {
  document.getElementById('repLevelName').textContent = state.repLevel
  document.getElementById('repBarInner').style.width = state.repProgress + '%'
  if (state.repMax === null) {
    document.getElementById('repProgress').textContent = state.rep + '+'
  } else {
    document.getElementById('repProgress').textContent = state.rep + '/' + state.repMax
  }
}

async function init() {
  const bar = document.getElementById('loadingBar')
  const text = document.getElementById('loadingText')

  text.textContent = 'Setting up canvas...'
  bar.style.width = '10%'
  resize()
  window.addEventListener('resize', resize)

  text.textContent = 'Generating terrain...'
  bar.style.width = '30%'
  await new Promise(r => setTimeout(r, 100))

  const startCX = Math.floor((WORLD_SIZE / 2) / CHUNK_SIZE)
  const startCY = Math.floor((WORLD_SIZE / 2) / CHUNK_SIZE)
  const initRadius = 3
  let total = (initRadius * 2 + 1) ** 2
  let done = 0
  for (let dy = -initRadius; dy <= initRadius; dy++) {
    for (let dx = -initRadius; dx <= initRadius; dx++) {
      generateChunk(startCX + dx, startCY + dy)
      done++
      if (done % 5 === 0) {
        bar.style.width = (30 + (done / total) * 40) + '%'
        await new Promise(r => setTimeout(r, 10))
      }
    }
  }

  text.textContent = 'Building roads...'
  bar.style.width = '75%'
  generateRoads()
  await new Promise(r => setTimeout(r, 50))

  text.textContent = 'Spawning life...'
  bar.style.width = '85%'
  generateNPCs()
  await new Promise(r => setTimeout(r, 50))

  text.textContent = 'Connecting to world...'
  bar.style.width = '95%'

  setupKeyboard()
  setupMouse()
  setupTouch()
  setupUI()

  await setupMultiplayer()
  await fetchPlayerState()

  bar.style.width = '100%'
  text.textContent = 'Welcome to The World'
  await new Promise(r => setTimeout(r, 400))

  state.loaded = true
  document.getElementById('loadingScreen').classList.add('hidden')
  setTimeout(() => document.getElementById('loadingScreen').remove(), 600)

  requestAnimationFrame(gameLoop)
}

// Wire account modal
function wireAccountUI() {
  document.getElementById('btnAccount')?.addEventListener('click', () => openAcctModal('signin'))
  document.getElementById('acctClose')?.addEventListener('click', closeAcctModal)
  document.querySelectorAll('.acct-tab').forEach(b => b.addEventListener('click', () => setAcctTab(b.dataset.tab)))
  document.getElementById('acct-signin-form')?.addEventListener('submit', handleSignIn)
  document.getElementById('acct-create-form')?.addEventListener('submit', handleCreate)
  document.getElementById('acctSignOut')?.addEventListener('click', handleSignOut)
  document.getElementById('acctModal')?.addEventListener('click', (e) => { if (e.target.id === 'acctModal') closeAcctModal() })
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAcctModal() })
  window.addEventListener('storage', (e) => { if (e.key === 'fas_user') updateAccountBadge() })
  updateAccountBadge()
}

init()
wireAccountUI()
</script>
